<!-- Studio version sync: when iframed by the studio (same-origin) we
     mirror its <meta name="version"> value into the header + browser
     title so spatial + studio + player all report the same number.
     Opened directly as a standalone file, falls back to "standalone".
     Runs synchronously before the React app renders so the initial
     paint already has the right version. -->
<script>
// True when the spatial editor is running inside an iframe (studio,
// the spatial-runtime test host, or any future embedder). Used to
// gate the 💾 Save button — a standalone load has no parent to post
// the journey to, so we hide the button instead of failing silently.
const IS_IFRAMED = (() => { try { return window.parent && window.parent !== window; } catch (_) { return false; } })();
const STUDIO_VERSION = (() => {
  try {
    if (window.parent && window.parent !== window) {
      const meta = window.parent.document.querySelector('meta[name="version"]');
      if (meta && meta.content) return 'v' + meta.content;
    }
  } catch (_) { /* cross-origin or restricted — fall through */ }
  return 'standalone';
})();
document.title = '4E Spatial · ' + STUDIO_VERSION;
</script>

/* ═══════════════════════════════════════════════════════════
   MOBILE SPATIAL EDITOR — CSS-only layout override
   ═══════════════════════════════════════════════════════════
   The React component tree is IDENTICAL to the desktop version.
   This CSS restructures the layout for mobile:
   - Viewport fills the screen (always visible)
   - Header becomes compact
   - Left + right sidebars become a bottom sheet
   No React code changes needed — pure CSS repositioning.
   ═══════════════════════════════════════════════════════════ */

/* Root container: the App's outermost div */
#root > div {
  display: flex !important;
  flex-direction: column !important;
  height: 100dvh !important;
}

/* Header bar — compact, single row */
#root > div > div:first-child {
  height: 40px !important;
  padding: 4px 8px !important;
  gap: 4px !important;
  font-size: 10px !important;
  flex-shrink: 0 !important;
  overflow-x: auto !important;
  overflow-y: hidden !important;
  flex-wrap: nowrap !important;
  -webkit-overflow-scrolling: touch;
}
#root > div > div:first-child button {
  font-size: 10px !important;
  padding: 4px 8px !important;
  white-space: nowrap;
  flex-shrink: 0;
}
#root > div > div:first-child span {
  flex-shrink: 0;
}

/* Main content area (the three-column flex row) — stack vertically */
#root > div > div:nth-child(2) {
  flex: 1 !important;
  flex-direction: column !important;
  position: relative !important;
}

/* LEFT SIDEBAR → bottom sheet overlay, starts hidden */
#root > div > div:nth-child(2) > div:first-child {
  position: fixed !important;
  left: 0 !important;
  right: 0 !important;
  bottom: 0 !important;
  top: auto !important;
  width: 100% !important;
  max-height: 55dvh !important;
  z-index: 80 !important;
  border-radius: 16px 16px 0 0 !important;
  border-right: none !important;
  border-top: 1px solid rgba(0,229,255,0.15) !important;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.22,.61,.36,1);
  box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
  padding-top: 8px !important;
}
#root > div > div:nth-child(2) > div:first-child.sheet-open {
  transform: translateY(0);
}

/* VIEWPORT — fills all available space */
#root > div > div:nth-child(2) > div:nth-child(2) {
  flex: 1 !important;
  position: relative !important;
}

/* RIGHT SIDEBAR (inspector) → bottom sheet overlay, starts hidden */
#root > div > div:nth-child(2) > div:nth-child(3) {
  position: fixed !important;
  left: 0 !important;
  right: 0 !important;
  bottom: 0 !important;
  top: auto !important;
  width: 100% !important;
  max-height: 60dvh !important;
  z-index: 80 !important;
  border-radius: 16px 16px 0 0 !important;
  border-left: none !important;
  border-top: 1px solid rgba(139,92,246,0.2) !important;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.22,.61,.36,1);
  box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
  padding-top: 8px !important;
}
#root > div > div:nth-child(2) > div:nth-child(3).sheet-open {
  transform: translateY(0);
}

/* PLAYBACK BAR — fixed at bottom, above sheets */
#root > div > div:last-child {
  position: fixed !important;
  left: 0 !important;
  right: 0 !important;
  bottom: 0 !important;
  z-index: 70 !important;
  padding: 4px 8px !important;
  padding-bottom: env(safe-area-inset-bottom, 4px) !important;
  background: rgba(6,8,16,0.95) !important;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(0,229,255,0.08) !important;
}
#root > div > div:last-child button {
  min-height: 36px;
}

/* ─── Floating toggle buttons ──────────────────────────── */
.mob-sheet-btn {
  position: fixed;
  z-index: 90;

<!-- Minimal SkeletonUtils.clone (inlined — based on the official r128
     examples/jsm/utils/SkeletonUtils.js). The default .clone(true) on
     a rigged GLB shares the source skeleton, so cloned SkinnedMeshes
     render at the source's transform and ignore the clone's scale.
     This version clones the skeleton and re-binds properly. -->
<script>
THREE.SkeletonUtils = {
  clone: function(source) {
    const sourceLookup = new Map();
    const cloneLookup = new Map();
    const clone = source.clone();
    parallelTraverse(source, clone, function(sourceNode, clonedNode) {
      sourceLookup.set(clonedNode, sourceNode);
      cloneLookup.set(sourceNode, clonedNode);
    });
    clone.traverse(function(node) {
      if (!node.isSkinnedMesh) return;
      const sourceMesh = sourceLookup.get(node);
      node.skeleton = sourceMesh.skeleton.clone();
      node.bindMatrix.copy(sourceMesh.bindMatrix);
      node.skeleton.bones = sourceMesh.skeleton.bones.map(function(bone) {
        return cloneLookup.get(bone);
      });
      node.bind(node.skeleton, node.bindMatrix);
    });
    return clone;
    function parallelTraverse(a, b, callback) {
      callback(a, b);
      for (let i = 0; i < a.children.length; i++) {
        parallelTraverse(a.children[i], b.children[i], callback);
      }
    }
  }
};
</script>

// ═══════════════════════════════════════════════════════════
// Studio handshake (Milestone 3b)
// ═══════════════════════════════════════════════════════════
// When iframed by the studio, announce ourselves and receive the
// current project's targets + objects. Stored on window.STUDIO_PROJECT
// so later milestones (anchor-target dropdown, traveller-object
// dropdown) can read it without restructuring React state.
//
// Cross-origin-safe: if opened standalone (not iframed by studio),
// every postMessage call silently no-ops and STUDIO_PROJECT stays null.
window.STUDIO_PROJECT = null;
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || typeof d !== 'object') return;
  if (d.type === '4e-spatial-select') {
    // Studio hierarchy → spatial: select the matching anchor
    const anchorId = d.anchorId;
    if (anchorId) {
      window.dispatchEvent(new CustomEvent('studio-select-anchor', { detail: anchorId }));
    }
    return;
  }
  if (d.type === '4e-spatial-project') {
    window.STUDIO_PROJECT = d.project || null;
    // Notify in-app React subscribers so open inspectors re-render
    // against the new targets / objects without needing the user to
    // reselect the anchor. AnchorInspector / PathInspector listen
    // for this event and bump an internal tick.
    window.dispatchEvent(new CustomEvent('studio-project-update', { detail: d.project }));
    console.log('[Spatial] received project data:',
      'targets=' + (d.project?.targets?.length || 0),
      'objects=' + (d.project?.objects?.length || 0));
  }
});
// Tell the parent studio we're ready for project data. Studio responds
// with `4e-spatial-project`. Sent after a microtask so the listener
// above is registered even if the studio replies synchronously.
queueMicrotask(() => {
  try {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: '4e-spatial-ready' }, '*');
    }
  } catch (_) { /* cross-origin or standalone — ignore */ }
});
