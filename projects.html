<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4E AR Studio — Projects</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--bg2:#0f1424;--bg3:#141a2e;--bg4:#1a2038;
  --border:#1e2844;--border2:#2a3456;
  --text:#d4daf0;--muted:#6b7a9e;--faint:#3a4568;
  --purple:#8b5cf6;--purple2:#a78bfa;--purple3:rgba(139,92,246,0.12);
  --cyan:#22d3ee;--green:#34d399;--red:#f87171;--orange:#fb923c;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow:hidden}
.header{display:flex;align-items:center;padding:12px 24px;border-bottom:1px solid var(--border);gap:12px;height:56px}
.header img{height:24px;opacity:.85}
.header h1{font-size:18px;font-weight:700;color:var(--purple2);font-family:'Space Mono',monospace}
.header .nav{margin-left:auto;display:flex;gap:4px}
.header .nav a{color:var(--muted);text-decoration:none;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;transition:all .15s}
.header .nav a:hover{color:var(--text);background:var(--bg3)}
.header .nav a.active{color:var(--purple2);background:var(--purple3)}
.main{display:grid;grid-template-columns:360px 1fr;height:calc(100vh - 56px)}
/* Left panel — project list */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:14px}
.sidebar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:6px 4px 10px;display:flex;align-items:center;justify-content:space-between}
.sidebar-title .new-btn{font-size:10px;color:var(--purple2);text-decoration:none;padding:3px 8px;border:1px solid var(--purple);border-radius:4px;transition:all .15s}
.sidebar-title .new-btn:hover{background:var(--purple3)}
.project-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.project-card:hover{border-color:var(--border2);background:var(--bg4)}
.project-card.active{border-color:var(--purple);background:var(--purple3)}
.pc-name{font-size:14px;font-weight:700;margin-bottom:2px}
.pc-meta{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;display:flex;gap:8px;margin-top:4px}
.pc-meta span{opacity:.8}
/* Right panel — detail + assets */
.detail{overflow-y:auto;padding:24px 32px}
.empty{text-align:center;padding:80px 20px;color:var(--faint)}
.empty .big{font-size:56px;margin-bottom:12px}
.empty p{font-size:14px;color:var(--muted)}
.detail-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.detail-head h2{font-size:22px;font-weight:700}
.detail-head .pd-id{font-family:'Space Mono',monospace;font-size:11px;color:var(--faint);margin-top:4px}
.detail-head .actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.btn:hover{border-color:var(--purple);background:var(--purple3)}
.btn.primary{background:var(--purple);border-color:var(--purple);color:#fff}
.btn.primary:hover{background:var(--purple2);border-color:var(--purple2)}
.btn.danger{color:var(--red);border-color:transparent}
.btn.danger:hover{border-color:var(--red);background:rgba(248,113,113,0.1)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:20px}
.info-item{font-size:12px}
.info-item .lbl{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.info-item .val{color:var(--text);font-weight:600}
/* Assets section */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.section-header h3{font-size:14px;font-weight:700;color:var(--purple2);display:flex;align-items:center;gap:6px}
.section-header .stats{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace}
.assets-list{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.asset-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px;transition:background .1s}
.asset-row:last-child{border-bottom:none}
.asset-row:hover{background:var(--bg3)}
.asset-row.orphan{background:rgba(251,146,60,0.04)}
.asset-row.orphan:hover{background:rgba(251,146,60,0.1)}
.asset-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.asset-info{flex:1;min-width:0}
.asset-name{font-family:'Space Mono',monospace;font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asset-meta{font-size:10px;color:var(--muted);display:flex;gap:8px;margin-top:2px}
.asset-meta .orphan-badge{color:var(--orange);font-weight:700}
.asset-meta .used-badge{color:var(--green)}
.asset-actions{display:flex;gap:4px;flex-shrink:0}
.asset-actions a,.asset-actions button{padding:3px 8px;font-size:10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;text-decoration:none;transition:all .15s}
.asset-actions a:hover{color:var(--purple2);border-color:var(--purple)}
.asset-actions button:hover{color:var(--red);border-color:var(--red)}
.loading-row{padding:24px;text-align:center;color:var(--faint);font-size:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;transition:opacity .3s;opacity:0;pointer-events:none;background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.toast.show{opacity:1}.toast.ok{border-color:var(--green);color:var(--green)}.toast.err{border-color:var(--red);color:var(--red)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;max-width:440px;width:90%}
.modal h3{font-size:16px;margin-bottom:10px;color:var(--purple2)}
.modal p{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal label{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;margin:10px 0}
.token-notice{padding:12px 14px;background:var(--bg2);border:1px solid var(--orange);border-radius:8px;margin-bottom:20px;font-size:12px;color:var(--orange)}
</style>
</head>
<body>

<div class="header">
  <img src="samples/logo_WHT.png" alt="4E" onerror="this.style.display='none'">
  <h1>AR Studio</h1>
  <div class="nav">
    <a href="builder.html">Quick Build</a>
    <a href="studio/index.html">Studio</a>
    <a href="projects.html" class="active">Projects</a>
  </div>
</div>

<div class="main">
  <!-- Left: project list -->
  <aside class="sidebar">
    <div class="sidebar-title">
      <span>Projects</span>
      <a class="new-btn" href="studio/index.html">+ New</a>
    </div>
    <div id="project-list">
      <div class="loading-row">Loading…</div>
    </div>
  </aside>

  <!-- Right: selected project details + assets -->
  <section class="detail" id="detail">
    <div class="empty">
      <div class="big">📁</div>
      <p>Pick a project on the left to see its details and stored assets.</p>
    </div>
  </section>
</div>

<!-- Confirm delete modal -->
<div class="overlay hidden" id="confirm-modal">
  <div class="modal">
    <h3 id="confirm-title">Delete?</h3>
    <p id="confirm-msg">Are you sure?</p>
    <label id="confirm-extra" style="display:none">
      <input type="checkbox" id="confirm-delete-assets" checked> Also delete GitHub-hosted files for this project
    </label>
    <div class="modal-actions">
      <button class="btn" onclick="closeConfirm()">Cancel</button>
      <button class="btn danger" id="confirm-btn">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// Lightweight GitHub client — mirrors studio/modules/github.js
// (projects.html doesn't load the studio's modules)
// ═══════════════════════════════════════════════════════════
const TOKEN_KEY = '4e-ar-gh-token';
function ghConfig() {
  const cfg = Object.assign({}, (window.AR_GITHUB_CONFIG || {}));
  cfg.token = localStorage.getItem(TOKEN_KEY) || cfg.token || '';
  return cfg;
}
async function ghList(path) {
  const cfg = ghConfig();
  if (!cfg.token) throw new Error('GitHub token not set');
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}?ref=${cfg.branch}`;
  const resp = await fetch(url, { headers: { Authorization: 'Bearer ' + cfg.token, Accept: 'application/vnd.github+json' } });
  if (resp.status === 404) return [];
  if (!resp.ok) throw new Error('List failed: ' + resp.status);
  const items = await resp.json();
  return Array.isArray(items) ? items : [items];
}
async function ghListRecursive(path) {
  const items = await ghList(path);
  const files = [];
  for (const item of items) {
    if (item.type === 'dir') files.push(...await ghListRecursive(item.path));
    else files.push(item);
  }
  return files;
}
async function ghDelete(path) {
  const cfg = ghConfig();
  if (!cfg.token) throw new Error('GitHub token not set');
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
  const h = { Authorization: 'Bearer ' + cfg.token, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' };
  // Get SHA
  const check = await fetch(url + '?ref=' + cfg.branch, { headers: h });
  if (check.status === 404) return { notFound: true };
  if (!check.ok) throw new Error('Lookup failed: ' + check.status);
  const existing = await check.json();
  if (Array.isArray(existing)) {
    for (const item of existing) await ghDelete(item.path);
    return { deleted: true, directory: true };
  }
  const body = { message: 'Dashboard delete: ' + path, branch: cfg.branch, sha: existing.sha };
  const resp = await fetch(url, { method: 'DELETE', headers: h, body: JSON.stringify(body) });
  if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.message || 'Delete failed'); }
  return { deleted: true };
}
function ghPagesUrl(path) {
  const cfg = ghConfig();
  return `https://${cfg.owner}.github.io/${cfg.repo}/${path}`;
}

// ═══════════════════════════════════════════════════════════
// Dashboard state
// ═══════════════════════════════════════════════════════════
const el = id => document.getElementById(id);
function toast(msg, type='') {
  const t = el('toast'); t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(t._t); t._t = setTimeout(() => t.className = 'toast', 3200);
}

let db = null;
let allProjects = [];
let selectedId = null;
let pendingConfirm = null;

(function init() {
  const cfg = window.AR_FIREBASE_CONFIG;
  if (!cfg || !cfg.apiKey || cfg.apiKey.includes('YOUR_')) {
    el('project-list').innerHTML = '<div class="loading-row">Firebase not configured</div>';
    return;
  }
  try {
    firebase.initializeApp(cfg);
    db = firebase.firestore();
    loadProjects();
  } catch(e) { toast('Firebase error: '+e.message, 'err'); }
})();

async function loadProjects() {
  try {
    const snap = await db.collection('ar_apps').orderBy('updatedAt','desc').get();
    allProjects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderProjectList();
    if (selectedId) renderDetail(allProjects.find(p => p.id === selectedId));
  } catch(e) {
    el('project-list').innerHTML = `<div class="loading-row" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

function renderProjectList() {
  const list = el('project-list');
  if (!allProjects.length) {
    list.innerHTML = `<div class="loading-row">No projects yet.<br><a href="studio/index.html" style="color:var(--purple2);margin-top:8px;display:inline-block">Open Studio →</a></div>`;
    return;
  }
  list.innerHTML = allProjects.map(p => {
    const name = esc(p.name || 'Untitled');
    const date = (p.updatedAt?.toDate?.() || p.createdAt?.toDate?.())?.toLocaleDateString?.() || '—';
    const mode = p.trackingMode || 'image';
    const objCount = p.objects ? p.objects.length : (p.glbUrl ? 1 : 0);
    const active = p.id === selectedId ? ' active' : '';
    return `<div class="project-card${active}" onclick="selectProject('${p.id}')">
      <div class="pc-name">${name}</div>
      <div class="pc-meta"><span>${modeIcon(mode)} ${mode}</span><span>${objCount} obj</span><span>${date}</span></div>
    </div>`;
  }).join('');
}

function modeIcon(mode) {
  return { image:'📷', slam:'🌐', face:'👤', hand:'✋' }[mode] || '•';
}
function esc(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function formatBytes(b) {
  if (!b) return '—';
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(1) + ' MB';
}

function selectProject(id) {
  selectedId = id;
  renderProjectList();
  renderDetail(allProjects.find(p => p.id === id));
}

function renderDetail(p) {
  if (!p) return;
  const playerUrl = (window.AR_BASE_URL || location.origin) + '/player-v2.html?id=' + p.id;
  const name = esc(p.name || 'Untitled');
  const mode = p.trackingMode || 'image';
  const objCount = p.objects ? p.objects.length : (p.glbUrl ? 1 : 0);
  const tgtCount = p.targets ? p.targets.length : 0;
  const hasLegacyTgt = !!(p.target?.mindUrl || p.mindUrl);
  const date = (p.updatedAt?.toDate?.() || p.createdAt?.toDate?.())?.toLocaleString?.() || '—';

  el('detail').innerHTML = `
    <div class="detail-head">
      <div>
        <h2>${name}</h2>
        <div class="pd-id">${p.id}</div>
      </div>
      <div class="actions">
        <a class="btn primary" href="studio/index.html?edit=${p.id}">Open in Studio</a>
        <a class="btn" href="${playerUrl}" target="_blank">Preview</a>
        <button class="btn" onclick="copy('${playerUrl}')">Copy URL</button>
        <button class="btn danger" onclick="askDeleteProject('${p.id}')">Delete Project</button>
      </div>
    </div>

    <div class="info-grid">
      <div class="info-item"><div class="lbl">Tracking</div><div class="val">${modeIcon(mode)} ${mode}</div></div>
      <div class="info-item"><div class="lbl">Objects</div><div class="val">${objCount}</div></div>
      <div class="info-item"><div class="lbl">Image targets</div><div class="val">${tgtCount}${hasLegacyTgt ? ' (+ legacy)' : ''}</div></div>
      <div class="info-item"><div class="lbl">Updated</div><div class="val">${date}</div></div>
    </div>

    <div class="section-header">
      <h3>📦 Stored Assets</h3>
      <span class="stats" id="asset-stats"></span>
    </div>
    <div class="assets-list" id="assets-list">
      <div class="loading-row">Loading from GitHub…</div>
    </div>
  `;

  loadAssets(p);
}

async function loadAssets(p) {
  const list = el('assets-list');
  const cfg = ghConfig();
  if (!cfg.token) {
    list.innerHTML = `<div class="token-notice" style="margin:0;border-radius:10px">GitHub token not set. Save a project in the studio to enter one, or add it to localStorage under key <code>${TOKEN_KEY}</code>.</div>`;
    return;
  }
  try {
    const files = await ghListRecursive('assets/' + p.id);
    if (!files.length) {
      list.innerHTML = '<div class="loading-row">No assets stored on GitHub for this project.</div>';
      el('asset-stats').textContent = '0 files';
      return;
    }
    // Build a set of referenced URLs from the project state
    const referenced = new Set();
    if (p.objects) p.objects.forEach(o => {
      if (o.glbUrl) referenced.add(o.glbUrl);
      const xr = o.xrComponents || {};
      Object.values(xr).forEach(c => {
        if (c && typeof c === 'object') {
          [c.src, c.video, c.image].forEach(u => {
            if (u && typeof u === 'string' && !u.startsWith('#')) referenced.add(u);
          });
        }
      });
    });
    if (p.glbUrl) referenced.add(p.glbUrl);
    if (p.media) p.media.forEach(m => m.url && referenced.add(m.url));
    if (p.targets) p.targets.forEach(t => {
      [t.originalUrl, t.luminanceUrl, t.thumbnailUrl].forEach(u => u && referenced.add(u));
    });
    if (p.target) [p.target.mindUrl, p.target.imageUrl].forEach(u => u && referenced.add(u));
    if (p.splash?.logoUrl) referenced.add(p.splash.logoUrl);
    if (p.pwa) [p.pwa.icon192Url, p.pwa.icon512Url, p.pwa.appleIconUrl].forEach(u => u && referenced.add(u));

    let orphanCount = 0, totalBytes = 0;
    const rows = files.map(f => {
      const url = ghPagesUrl(f.path);
      const used = referenced.has(url);
      if (!used) orphanCount++;
      totalBytes += f.size || 0;
      const icon = assetIcon(f.name);
      return `<div class="asset-row${used ? '' : ' orphan'}">
        <div class="asset-icon">${icon}</div>
        <div class="asset-info">
          <div class="asset-name">${esc(f.path.replace('assets/' + p.id + '/', ''))}</div>
          <div class="asset-meta">
            <span>${formatBytes(f.size)}</span>
            ${used ? '<span class="used-badge">✓ in use</span>' : '<span class="orphan-badge">⚠ orphan</span>'}
          </div>
        </div>
        <div class="asset-actions">
          <a href="${url}" target="_blank">View</a>
          <button onclick="askDeleteAsset('${esc(f.path)}','${p.id}')">Delete</button>
        </div>
      </div>`;
    }).join('');

    list.innerHTML = rows;
    el('asset-stats').innerHTML = `${files.length} files · ${formatBytes(totalBytes)}` +
      (orphanCount ? ` · <span style="color:var(--orange)">${orphanCount} orphan${orphanCount>1?'s':''}</span> <button class="btn danger" style="padding:2px 8px;font-size:10px;margin-left:6px" onclick="askCleanOrphans('${p.id}')">Clean up</button>` : '');
  } catch(e) {
    list.innerHTML = `<div class="loading-row" style="color:var(--red)">Failed to load assets: ${esc(e.message)}</div>`;
  }
}

function assetIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  return ({
    glb:'🗿', gltf:'🗿',
    png:'🖼', jpg:'🖼', jpeg:'🖼', webp:'🖼', gif:'🖼',
    mp4:'🎬', webm:'🎬', mov:'🎬',
    mp3:'🎵', wav:'🎵', ogg:'🎵',
    mind:'🎯',
    json:'📄', html:'📄',
  })[ext] || '📎';
}

function copy(url) { navigator.clipboard.writeText(url); toast('URL copied','ok'); }

// ── Confirm dialog ──
function openConfirm({ title, message, extra, onConfirm }) {
  el('confirm-title').textContent = title;
  el('confirm-msg').innerHTML = message;
  el('confirm-extra').style.display = extra ? '' : 'none';
  pendingConfirm = onConfirm;
  el('confirm-modal').classList.remove('hidden');
}
function closeConfirm() { el('confirm-modal').classList.add('hidden'); pendingConfirm = null; }
el('confirm-btn').onclick = async () => {
  if (!pendingConfirm) return closeConfirm();
  const fn = pendingConfirm;
  pendingConfirm = null;
  el('confirm-modal').classList.add('hidden');
  try { await fn(); } catch(e) { toast('Error: ' + e.message, 'err'); }
};

// ── Delete actions ──
function askDeleteProject(id) {
  const p = allProjects.find(x => x.id === id);
  if (!p) return;
  openConfirm({
    title: 'Delete project?',
    message: `This permanently removes <strong>${esc(p.name || 'Untitled')}</strong> from Firestore.`,
    extra: true,
    onConfirm: () => deleteProject(id)
  });
}
async function deleteProject(id) {
  const alsoAssets = el('confirm-delete-assets').checked;
  // Firestore first
  await db.collection('ar_apps').doc(id).delete();
  toast('Project deleted', 'ok');
  // Then GitHub folder if requested
  if (alsoAssets) {
    try {
      await ghDelete('assets/' + id);
      toast('Assets folder deleted', 'ok');
    } catch(e) {
      // 404 is fine (no folder existed); report anything else
      if (!String(e.message).includes('404')) toast('GitHub cleanup: ' + e.message, 'err');
    }
  }
  if (selectedId === id) {
    selectedId = null;
    el('detail').innerHTML = '<div class="empty"><div class="big">📁</div><p>Project deleted. Pick another one.</p></div>';
  }
  loadProjects();
}

function askDeleteAsset(path, projectId) {
  openConfirm({
    title: 'Delete asset?',
    message: `Permanently delete <code>${esc(path)}</code> from the GitHub repo. This can break the published app if the asset is still referenced.`,
    onConfirm: () => deleteAsset(path, projectId)
  });
}
async function deleteAsset(path, projectId) {
  await ghDelete(path);
  toast('Asset deleted', 'ok');
  const p = allProjects.find(x => x.id === projectId);
  if (p) loadAssets(p);
}

function askCleanOrphans(projectId) {
  openConfirm({
    title: 'Clean up orphans?',
    message: 'Delete all orphaned assets for this project (files not referenced anywhere in the project data).',
    onConfirm: () => cleanOrphans(projectId)
  });
}
async function cleanOrphans(projectId) {
  const p = allProjects.find(x => x.id === projectId);
  if (!p) return;
  const rows = document.querySelectorAll('.asset-row.orphan');
  // Extract paths from delete buttons
  const paths = Array.from(rows).map(r => {
    const btn = r.querySelector('.asset-actions button[onclick*="askDeleteAsset"]');
    if (!btn) return null;
    const m = btn.getAttribute('onclick').match(/askDeleteAsset\('([^']+)'/);
    return m ? m[1] : null;
  }).filter(Boolean);
  let ok = 0, fail = 0;
  for (const path of paths) {
    try { await ghDelete(path); ok++; }
    catch(e) { fail++; console.warn('clean orphan failed:', path, e); }
  }
  toast(`Cleaned ${ok} file${ok!==1?'s':''}` + (fail ? `, ${fail} failed` : ''), fail ? 'err' : 'ok');
  loadAssets(p);
}
</script>
</body>
</html>
