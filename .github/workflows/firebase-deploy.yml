name: Deploy Player + Studio to Firebase Hosting
on:
  push:
    branches: [main]
    # Firebase serves the player shell AND the studio. Previously the
    # studio was on GitHub Pages, but GH Pages' Fastly CDN layer holds
    # `Cache-Control: max-age=600` with no way to force revalidation —
    # users can get stuck several versions behind with no recovery
    # short of waiting out the TTL at every intermediate edge. Firebase
    # Hosting sends `no-cache, no-store, must-revalidate` for all HTML
    # and JS (firebase.json), so updates reach users on the next load.
    #
    # Asset uploads via the GitHub Contents API produce commits that
    # ONLY touch assets/, splash-logo.png, etc. — those are still
    # ignored (assets/** stays in firebase.json ignore) so asset
    # commits don't trigger a deploy and don't count against the
    # Hosting storage quota.
    paths:
      - 'player-v2.html'
      - 'player.html'
      - 'config.js'
      - 'sw.js'
      - 'samples/**'
      - 'studio/**'
      - 'firebase.json'
      - 'firestore.rules'
      - '.github/workflows/firebase-deploy.yml'
  # Manual re-run in case a deploy is ever needed without a file change
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_AR_STUDIO_4E }}'
          channelId: live
          projectId: ar-studio-4e
