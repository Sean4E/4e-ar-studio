name: Firebase Hosting Cleanup
# One-shot workflow to force-delete old Hosting versions and free
# storage. Authenticates via the existing service-account secret
# (same one used by the deploy workflow), lists all versions, keeps
# the N newest, deletes the rest via the Hosting REST API.
#
# Trigger via the Actions tab → "Run workflow" (keep = 2 by default).
# Delete this workflow file once storage is back under quota.

on:
  workflow_dispatch:
    inputs:
      keep:
        description: "Number of most-recent versions to keep"
        required: true
        default: "2"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Install cryptography for JWT signing
        run: pip install cryptography --quiet

      - name: Prune old Firebase Hosting versions
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AR_STUDIO_4E }}
          KEEP: ${{ inputs.keep }}
        run: |
          python3 <<'PYEOF'
          import json, time, base64, os, sys, urllib.request, urllib.parse

          sa = json.loads(os.environ["SA_JSON"])
          site = "ar-studio-4e"
          keep = int(os.environ["KEEP"])

          # ── 1. Exchange service-account JWT for an access token ──
          def b64url(b): return base64.urlsafe_b64encode(b).rstrip(b"=").decode()
          now = int(time.time())
          claims = {
              "iss": sa["client_email"],
              "scope": "https://www.googleapis.com/auth/firebase "
                       "https://www.googleapis.com/auth/cloud-platform",
              "aud": "https://oauth2.googleapis.com/token",
              "iat": now, "exp": now + 3600,
          }
          header = b64url(json.dumps({"alg":"RS256","typ":"JWT"}).encode())
          payload = b64url(json.dumps(claims).encode())
          signing_input = (header + "." + payload).encode()

          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import padding
          pk = serialization.load_pem_private_key(sa["private_key"].encode(), password=None)
          sig = pk.sign(signing_input, padding.PKCS1v15(), hashes.SHA256())
          jwt = header + "." + payload + "." + b64url(sig)

          req = urllib.request.Request(
              "https://oauth2.googleapis.com/token",
              data=urllib.parse.urlencode({
                  "grant_type": "urn:ietf:params:oauth:grant-type:jwt-bearer",
                  "assertion": jwt,
              }).encode(),
          )
          with urllib.request.urlopen(req) as r:
              token = json.loads(r.read())["access_token"]
          print("Access token obtained.")

          # ── 2. List versions ──
          auth = {"Authorization": f"Bearer {token}"}
          all_versions = []
          page = ""
          while True:
              url = f"https://firebasehosting.googleapis.com/v1beta1/sites/{site}/versions?pageSize=100"
              if page:
                  url += f"&pageToken={page}"
              r = urllib.request.Request(url, headers=auth)
              with urllib.request.urlopen(r) as resp:
                  data = json.loads(resp.read())
              all_versions.extend(data.get("versions", []))
              page = data.get("nextPageToken", "")
              if not page:
                  break
          print(f"Fetched {len(all_versions)} total versions on site '{site}'.")

          # ── 3. Sort by createTime (newest first), keep top N, delete rest ──
          all_versions.sort(key=lambda v: v.get("createTime", ""), reverse=True)
          to_delete = all_versions[keep:]
          print(f"Keeping newest {keep} versions.")
          print(f"Deleting {len(to_delete)} older versions…")

          failed = 0
          for i, v in enumerate(to_delete, 1):
              name = v["name"]             # 'sites/X/versions/Y'
              status = v.get("status", "?")
              r = urllib.request.Request(
                  f"https://firebasehosting.googleapis.com/v1beta1/{name}",
                  headers=auth, method="DELETE",
              )
              try:
                  urllib.request.urlopen(r).read()
                  if i <= 5 or i % 10 == 0:
                      print(f"  [{i}/{len(to_delete)}] deleted {name} ({status})")
              except Exception as e:
                  failed += 1
                  print(f"  [{i}/{len(to_delete)}] FAILED {name} ({status}): {e}")
          print(f"Done. Deleted {len(to_delete) - failed} / {len(to_delete)}.")
          sys.exit(1 if failed and failed == len(to_delete) else 0)
          PYEOF
