<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a18">
<!-- Baseline favicon shown before applyPWA() runs and as a fallback for
     projects that haven't generated PWA icons yet. applyPWA() upserts
     these to the project's logo once Firestore data resolves. -->
<link rel="icon" type="image/png" sizes="192x192" href="samples/logo_WHT.png">
<link rel="apple-touch-icon" sizes="180x180" href="samples/logo_WHT.png">
<title>4E AR Player</title>
<meta name="version" content="3.10.20">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<script src="config.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<!-- 8th Wall Engine + 8-Frame (modified A-Frame) + XR Extras -->
<script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1.0.0-alpha.0/dist/xrextras.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam,face"></script>
<!-- Animation mixer for GLB animations -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#060a18;--purple:#8b5cf6;--text:#e2e8f0;--muted:#8899b0}
body{background:var(--navy);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;height:100vh;width:100vw}
/* Single-layer splash — NEVER has its DOM structure changed after first
   paint. applySplash() only updates text content and the logo's
   background-image URL (browsers swap bg-images seamlessly, unlike
   <img src> which goes blank during the swap). Colors transition via
   CSS custom properties. This avoids any layout reflow or frame drop
   during 8th Wall camera init. */
:root{--sp-bg:#060a18;--sp-text:#e2e8f0;--sp-accent:#8b5cf6}
/* Shorter opacity fade so the splash→AR handoff is cleaner — long
   fades look jittery because the scene / camera feed starts
   rendering before the splash is fully invisible. */
#splash{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:opacity .25s ease,background .3s ease;background:var(--sp-bg);color:var(--sp-text)}
#splash.hidden{opacity:0;pointer-events:none}
#sp-logo{width:140px;height:56px;margin-bottom:14px;background-image:url(samples/logo_WHT.png);background-size:contain;background-position:center;background-repeat:no-repeat;opacity:.85}
#sp-title{font-size:20px;font-weight:700;font-family:'Syne',system-ui,sans-serif;text-align:center;padding:0 20px;line-height:1.3;min-height:26px}
#sp-subtitle{opacity:.4;font-size:12px;margin-top:6px;text-align:center;display:none}
#sp-spinner-row{margin-top:20px;display:flex;align-items:center;gap:6px}
#sp-spinner{width:16px;height:16px;border:2px solid transparent;border-top-color:var(--sp-accent);border-right-color:color-mix(in srgb,var(--sp-accent) 30%,transparent);border-bottom-color:color-mix(in srgb,var(--sp-accent) 30%,transparent);border-left-color:color-mix(in srgb,var(--sp-accent) 30%,transparent);border-radius:50%;animation:spin .8s linear infinite}
#sp-status{opacity:.3;font-size:11px}
#sp-branding{position:absolute;bottom:14px;font-size:10px;opacity:.45}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85}}
#error-screen{position:fixed;inset:0;background:var(--navy);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:40px;text-align:center}
#error-screen.show{display:flex}
.err-title{font-size:20px;font-weight:700;color:#f87171;margin-bottom:8px}
.err-msg{font-size:14px;color:var(--muted);max-width:320px}
#ar-ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:none}
#ar-ui.show{display:block}
.ar-top{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;pointer-events:auto;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent)}
.ar-title{font-size:14px;font-weight:700}
.ar-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer}
#scan-hint{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;padding:7px 18px;border-radius:18px;font-size:12px;white-space:nowrap;transition:opacity .3s}
#scan-hint.hidden{opacity:0}
#anim-bar{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:auto}
.anim-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 13px;border-radius:18px;font-size:11px;font-family:'Syne',sans-serif;cursor:pointer}
.anim-pill.active{background:var(--purple);border-color:var(--purple)}
</style>
<script>
// ─── Sync splash primer ─────────────────────────────────
// Runs BEFORE <body> paints. Reads cached splash config and sets CSS
// custom properties + a background-image preload, so the very first
// paint already has the project's branded colors and logo. No DOM
// mutation after this point = no layout shift during camera init.
(function() {
  try {
    var id = new URLSearchParams(location.search).get('id');
    if (!id) return;
    var cached = localStorage.getItem('4e-splash-' + id);
    if (!cached) return;
    var sp = JSON.parse(cached);
    var r = document.documentElement.style;
    if (sp.bgColor) r.setProperty('--sp-bg', sp.bgColor);
    if (sp.textColor) r.setProperty('--sp-text', sp.textColor);
    if (sp.accentColor) r.setProperty('--sp-accent', sp.accentColor);
    // Preload logo bytes so the background-image swap on paint is instant
    if (sp.logoUrl) { var img = new Image(); img.src = sp.logoUrl; }
    // Stash for body-phase script (title/subtitle/toggles/logo URL)
    window.__4E_CACHED_SPLASH = sp;
  } catch(e) {}
})();
</script>
</head>
<body>

<div id="splash">
  <!-- Single source of truth: this splash is ALWAYS the project's
       splash (as configured in the studio's splash editor). The
       studio editor defaults to 4E-style values, so uncustomized
       projects render a 4E-themed splash; customized projects render
       their own. There is no separate "default vs custom" flow. These
       stable-ID elements are populated from localStorage cache (first
       paint on repeat visits) and from Firestore (first-time visits)
       — applySplash() updates them in place without touching the DOM
       structure. -->
  <div id="sp-logo" role="img" aria-label="Logo"></div>
  <div id="sp-title"></div>
  <div id="sp-subtitle"></div>
  <div id="sp-spinner-row">
    <div id="sp-spinner"></div>
    <span id="sp-status" class="splash-status-text">Starting AR experience…</span>
  </div>
  <div id="sp-branding">Powered by 4E AR Studio</div>
</div>
<script>
// Apply cached splash content to stable-ID elements. Runs immediately
// after the splash DOM parses — before Firestore, before 8th Wall.
// Mutates text content / bg-image URL only; no structure change.
(function() {
  var sp = window.__4E_CACHED_SPLASH;
  if (!sp) return;
  var setText = function(id, v) { var e = document.getElementById(id); if (e && v) e.textContent = v; };
  var setShown = function(id, v) { var e = document.getElementById(id); if (!e) return; e.style.display = v ? '' : 'none'; };
  // Title: user-set title OR project name (matches applySplash fallback)
  setText('sp-title', sp.title || sp.name);
  if (sp.subtitle) { setText('sp-subtitle', sp.subtitle); setShown('sp-subtitle', true); }
  if (sp.logoUrl) {
    var logo = document.getElementById('sp-logo');
    if (logo) logo.style.backgroundImage = "url('" + sp.logoUrl.replace(/'/g, "\\'") + "')";
  }
  if (sp.showLogo === false) setShown('sp-logo', false);
  if (sp.showTitle === false) setShown('sp-title', false);
  if (sp.showSpinner === false) setShown('sp-spinner-row', false);
  if (sp.showBranding === false) setShown('sp-branding', false);
  // Apply gradient (fully opaque — never reveals the camera feed)
  if (sp.gradient && sp.bgColor) {
    var splashEl = document.getElementById('splash');
    var acc = sp.accentColor || '#8b5cf6';
    if (splashEl) splashEl.style.background =
      'linear-gradient(145deg,' + sp.bgColor + ',color-mix(in srgb,' + sp.bgColor + ' 72%,' + acc + '))';
  }
})();
</script>

<div id="error-screen">
  <div style="font-size:48px;margin-bottom:16px">⚠️</div>
  <div class="err-title" id="err-title">Error</div>
  <div class="err-msg" id="err-msg"></div>
</div>

<div id="ar-ui">
  <div class="ar-top">
    <span class="ar-title" id="ar-title">AR</span>
    <button class="ar-close" onclick="location.reload()">✕</button>
  </div>
  <div id="scan-hint">Point camera at target</div>
  <div id="anim-bar"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
// Single source of truth: <meta name="version"> in the <head>. Reading
// it from the DOM keeps the number displayed on the splash in lock-step
// with whatever was actually deployed — no risk of bumping meta while
// forgetting to bump this constant (and vice versa).
const PLAYER_VERSION = (document.querySelector('meta[name="version"]')?.content) || 'dev';
const SPLASH_START = performance.now();
const el = id => document.getElementById(id);

// When running in an iframe (e.g. the studio's Preview tab), forward
// errors + console.error calls up to the parent window so they land
// in the studio's console panel. Helps developers see what broke in
// the published player without having to open browser DevTools.
if (window.parent && window.parent !== window) {
  const _postErr = (msg) => {
    try { window.parent.postMessage({ type: '4e-player-error', message: String(msg) }, '*'); }
    catch (e) {}
  };
  const _postLog = (msg) => {
    try { window.parent.postMessage({ type: '4e-player-log', message: String(msg) }, '*'); }
    catch (e) {}
  };
  window.addEventListener('error', (e) => {
    _postErr((e.message || 'error') + (e.filename ? ' @ ' + e.filename.split('/').pop() + ':' + e.lineno : ''));
  });
  window.addEventListener('unhandledrejection', (e) => {
    _postErr('Unhandled promise rejection: ' + (e.reason?.message || e.reason));
  });
  // Also intercept console.error so A-Frame's schema/component
  // warnings (which are logged, not thrown) surface in the studio.
  const _origErr = console.error.bind(console);
  console.error = function(...args) {
    _origErr(...args);
    _postErr(args.map(a => (a && a.message) || String(a)).join(' '));
  };
  const _origWarn = console.warn.bind(console);
  console.warn = function(...args) {
    _origWarn(...args);
    _postLog('[warn] ' + args.map(a => (a && a.message) || String(a)).join(' '));
  };
}
// Stamp version on the splash branding line as soon as JS runs, so we
// never ship the splash with a stale or missing version string.
(function() {
  const b = document.getElementById('sp-branding');
  if (b) b.textContent = 'Powered by 4E AR Studio v' + PLAYER_VERSION;
})();
let APP = null, arScene = null;

// Direct audio control — simple <audio> elements, controlled by image targets
// or as global ambient. Pauses/plays based on 8th Wall xrimagefound/xrimagelost
// or scene loaded events.
if (typeof AFRAME !== 'undefined') {

  // Ambient audio — registered, plays when iOS audio is unlocked
  AFRAME.registerComponent('ambient-audio-direct', {
    schema: {
      src: { type: 'string', default: '' },
      volume: { type: 'number', default: 0.5 },
      loop: { type: 'boolean', default: true }
    },
    init() {
      const src = this.data.src;
      if (!src) return;
      this._audio = document.createElement('audio');
      this._audio.src = src;
      this._audio.loop = this.data.loop;
      this._audio.volume = this.data.volume;
      this._audio.muted = true;  // start muted (matches button default)
      this._audio.preload = 'auto';
      this._audio.crossOrigin = 'anonymous';
      this._audio.autoplay = false;
      document.body.appendChild(this._audio);
      if (window._4E_AUDIO) window._4E_AUDIO.ambient.push(this._audio);
    },
    remove() { if (this._audio) { this._audio.pause(); this._audio.remove(); } }
  });

  AFRAME.registerComponent('target-audio-direct', {
    schema: {
      src: { type: 'string', default: '' },
      volume: { type: 'number', default: 0.8 },
      loop: { type: 'boolean', default: true },
      fadeIn: { type: 'number', default: 0.5 },
      fadeOut: { type: 'number', default: 1.0 },
      pauseOnLost: { type: 'boolean', default: true },
      resumeOnFound: { type: 'boolean', default: true }
    },
    init() {
      const src = this.data.src;
      if (!src) return;

      // Create <audio> element — paused, no autoplay, muted by default
      this._audio = document.createElement('audio');
      this._audio.src = src;
      this._audio.loop = this.data.loop;
      this._audio.volume = 0;
      this._audio.muted = true;  // start muted (matches button default)
      this._audio.preload = 'auto';
      this._audio.crossOrigin = 'anonymous';
      this._audio.autoplay = false;
      document.body.appendChild(this._audio);

      // Register so the global mute button can control it
      if (window._4E_AUDIO) window._4E_AUDIO.onTarget.push(this._audio);

      this._fadeId = null;
      this._isPlaying = false;

      // Find our target name from parent
      const targetEl = this.el.closest('xrextras-named-image-target');
      const tName = targetEl?.getAttribute('name') || '';
      this._targetName = tName;

      const onFound = (e) => {
        const n = e?.detail?.name || '';
        if (tName && n !== tName) return;
        this._play();
      };
      const onLost = (e) => {
        const n = e?.detail?.name || '';
        if (tName && n !== tName) return;
        // Image→SLAM anchoring: once the entity is locked in world
        // space, "image lost" no longer means "object isn't here" —
        // the object IS here, just the marker isn't visible. Keep the
        // audio playing regardless of the pauseOnLost toggle.
        if (this.el.hasAttribute('image-to-slam')) return;
        if (this.data.pauseOnLost) this._stop();
      };

      // Wait for scene to be ready before listening
      const sceneEl = this.el.sceneEl;
      const attach = () => {
        sceneEl.addEventListener('xrimagefound', onFound);
        sceneEl.addEventListener('xrimagelost', onLost);
      };
      if (sceneEl.hasLoaded) attach();
      else sceneEl.addEventListener('loaded', attach);
    },
    _play() {
      if (!this._audio || this._isPlaying) return;
      this._isPlaying = true;
      // resumeOnFound=false → restart from 0 on every re-find
      if (!this.data.resumeOnFound) { try { this._audio.currentTime = 0; } catch(e){} }
      this._audio.play().catch(err => {
        console.warn('[target-audio-direct] play failed:', err);
        this._isPlaying = false;
      });
      this._fadeTo(this.data.volume, this.data.fadeIn);
    },
    _stop() {
      if (!this._audio || !this._isPlaying) return;
      this._fadeTo(0, this.data.fadeOut, () => {
        this._audio.pause();
        this._isPlaying = false;
      });
    },
    _fadeTo(target, dur, done) {
      if (this._fadeId) clearInterval(this._fadeId);
      if (!this._audio || dur <= 0) {
        if (this._audio) this._audio.volume = target;
        if (done) done();
        return;
      }
      const start = this._audio.volume;
      const steps = Math.max(1, Math.round(dur * 20));
      let i = 0;
      this._fadeId = setInterval(() => {
        i++;
        this._audio.volume = Math.max(0, Math.min(1, start + (target - start) * (i / steps)));
        if (i >= steps) {
          clearInterval(this._fadeId);
          this._fadeId = null;
          this._audio.volume = target;
          if (done) done();
        }
      }, dur * 1000 / steps);
    },
    remove() {
      if (this._fadeId) clearInterval(this._fadeId);
      if (this._audio) { this._audio.pause(); this._audio.remove(); }
    }
  });

  // ─── video-on-target ────────────────────────────────────
  // Attaches a child <a-plane> with a video texture to the host entity.
  // Plane is auto-sized to the video's natural aspect ratio (width stays
  // fixed, height = width × videoHeight/videoWidth). The video plays
  // when the target is found and fades out when lost. Muted by default
  // so it joins the global audio button's control list — tapping the
  // button unmutes all target media at once (iOS gesture-unlock).
  AFRAME.registerComponent('video-on-target', {
    schema: {
      src: { type: 'string', default: '' },
      volume: { type: 'number', default: 1.0 },
      loop: { type: 'boolean', default: true },
      fadeIn: { type: 'number', default: 0.5 },
      fadeOut: { type: 'number', default: 1.0 },
      pauseOnLost: { type: 'boolean', default: true },
      resumeOnFound: { type: 'boolean', default: true },
      muted: { type: 'boolean', default: false },
      width: { type: 'number', default: 1.0 },        // plane width in metres
      chromaKey: { type: 'color', default: '' }        // optional green-screen (future)
    },
    init() {
      const src = this.data.src;
      if (!src) return;

      // Resolve #asset-id reference (created by buildAssets) or build one
      let video;
      if (src.charAt(0) === '#') {
        video = document.querySelector(src);
      }
      if (!video) {
        video = document.createElement('video');
        video.src = src;
        video.crossOrigin = 'anonymous';
        video.setAttribute('playsinline', '');
        video.setAttribute('webkit-playsinline', '');
        video.preload = 'auto';
        document.body.appendChild(video);
      }
      video.loop = this.data.loop;
      // Always start muted (iOS autoplay requirement). If muted:false in
      // the studio, register with _4E_AUDIO so the global button can
      // unmute it. If muted:true, it stays silent — visual-only.
      video.muted = true;
      video.volume = 0;
      video.autoplay = false;
      this._video = video;

      // Register for global mute-button control (same list as audio)
      if (window._4E_AUDIO && !this.data.muted) window._4E_AUDIO.onTarget.push(video);

      // Determine where the video texture should render. If the host
      // entity is already a plane (<a-plane>), apply the video material
      // to it directly and resize it. Otherwise (Empty, GLB, etc.)
      // create a child plane so the video has something to render on.
      const width = this.data.width || 1;
      const initialHeight = width * 9 / 16;
      const isHostPlane = this.el.tagName.toLowerCase() === 'a-plane';

      if (isHostPlane) {
        this._plane = this.el;
        this._ownsPlane = false;
        this._plane.setAttribute('width', width);
        this._plane.setAttribute('height', initialHeight);
      } else {
        this._plane = document.createElement('a-plane');
        this._ownsPlane = true;
        this._plane.setAttribute('width', width);
        this._plane.setAttribute('height', initialHeight);
        // Child plane lies flat on the image target by default (image
        // target's Y axis is the normal, so -90° on X makes the plane
        // coplanar with the image).
        this._plane.setAttribute('rotation', '-90 0 0');
        this.el.appendChild(this._plane);
      }

      // Apply video texture using A-Frame's material component — passing
      // the video element directly (not a selector) bypasses the loading
      // race condition that was causing the white plane. A-Frame then
      // creates the VideoTexture internally and keeps it in sync.
      const applyMaterial = () => {
        this._plane.setAttribute('material', {
          shader: 'flat',
          src: video,
          side: 'double',
          transparent: true,
          opacity: 0,
          npot: true
        });
        // Grab the mesh reference for direct opacity updates during fade
        this._mesh = this._plane.getObject3D('mesh');
      };

      if (this._plane.hasLoaded) applyMaterial();
      else this._plane.addEventListener('loaded', applyMaterial, { once: true });

      // Auto-resize to match video's true aspect ratio
      const syncAspect = () => {
        const vw = video.videoWidth, vh = video.videoHeight;
        if (vw > 0 && vh > 0) {
          this._plane.setAttribute('height', width * (vh / vw));
        }
      };
      if (video.readyState >= 1) syncAspect();
      else video.addEventListener('loadedmetadata', syncAspect, { once: true });

      this._fadeId = null;
      this._opacityFadeId = null;
      this._isPlaying = false;

      // Scope to this entity's own target (in multi-target scenes)
      const targetEl = this.el.closest('xrextras-named-image-target');
      const tName = targetEl ? targetEl.getAttribute('name') : '';
      this._targetName = tName;

      const onFound = (e) => {
        const n = e && e.detail && e.detail.name || '';
        if (tName && n !== tName) return;
        this._play();
      };
      const onLost = (e) => {
        const n = e && e.detail && e.detail.name || '';
        if (tName && n !== tName) return;
        // Image→SLAM anchoring overrides pauseOnLost: once the entity
        // is locked in world space, the marker leaving the frame
        // doesn't mean the object's gone, so don't pause/fade.
        if (this.el.hasAttribute('image-to-slam')) return;
        if (this.data.pauseOnLost) this._stop();
      };

      const sceneEl = this.el.sceneEl;
      const attach = () => {
        sceneEl.addEventListener('xrimagefound', onFound);
        sceneEl.addEventListener('xrimagelost', onLost);
      };
      if (sceneEl.hasLoaded) attach();
      else sceneEl.addEventListener('loaded', attach);
    },
    _play() {
      if (!this._video || this._isPlaying) return;
      this._isPlaying = true;
      if (!this.data.resumeOnFound) { try { this._video.currentTime = 0; } catch(e){} }
      const p = this._video.play();
      if (p && p.catch) p.catch(err => {
        console.warn('[video-on-target] play failed:', err && err.message);
        this._isPlaying = false;
      });
      this._fadeVolume(this.data.volume, this.data.fadeIn);
      this._fadePlane(1, this.data.fadeIn);
    },
    _stop() {
      if (!this._video || !this._isPlaying) return;
      this._fadeVolume(0, this.data.fadeOut);
      this._fadePlane(0, this.data.fadeOut, () => {
        try { this._video.pause(); } catch(e){}
        this._isPlaying = false;
      });
    },
    _fadeVolume(target, dur) {
      if (this._fadeId) clearInterval(this._fadeId);
      if (!this._video || dur <= 0) {
        if (this._video) this._video.volume = target;
        return;
      }
      const start = this._video.volume;
      const steps = Math.max(1, Math.round(dur * 20));
      let i = 0;
      this._fadeId = setInterval(() => {
        i++;
        this._video.volume = Math.max(0, Math.min(1, start + (target - start) * (i / steps)));
        if (i >= steps) { clearInterval(this._fadeId); this._fadeId = null; }
      }, dur * 1000 / steps);
    },
    _fadePlane(target, dur, done) {
      if (this._opacityFadeId) clearInterval(this._opacityFadeId);
      if (!this._plane) { if (done) done(); return; }
      const setOp = (o) => this._plane.setAttribute('material', 'opacity', o);
      if (dur <= 0) { setOp(target); if (done) done(); return; }
      const mat = this._plane.getAttribute('material') || {};
      const start = mat.opacity != null ? mat.opacity : 0;
      const steps = Math.max(1, Math.round(dur * 20));
      let i = 0;
      this._opacityFadeId = setInterval(() => {
        i++;
        const o = Math.max(0, Math.min(1, start + (target - start) * (i / steps)));
        setOp(o);
        if (i >= steps) {
          clearInterval(this._opacityFadeId);
          this._opacityFadeId = null;
          if (done) done();
        }
      }, dur * 1000 / steps);
    },
    remove() {
      if (this._fadeId) clearInterval(this._fadeId);
      if (this._opacityFadeId) clearInterval(this._opacityFadeId);
      if (this._video) { try { this._video.pause(); } catch(e){} }
      // Only remove the plane if we created it ourselves (child of Empty/GLB).
      // If the host entity IS the plane, leave it alone — it belongs to the scene.
      if (this._ownsPlane && this._plane && this._plane.parentNode) {
        this._plane.parentNode.removeChild(this._plane);
      }
    }
  });

  // ─── ar-hider-material ───────────────────────────────────
  // Mirrors 8th Wall's ECS `material:{type:"hider"}` behaviour
  // exactly (see the dunnasifairy1 BoxHider reference project):
  //   - MeshStandardMaterial with colorWrite=false (invisible in AR,
  //     shows the camera feed through, but writes depth so it
  //     occludes virtual content behind)
  //   - Applied to every sub-mesh of the entity (GLBs have an
  //     invisible group root + the actual render meshes as
  //     children — the native A-Frame material component only sets
  //     the root, so we must traverse)
  //   - Re-applies on model-loaded (GLBs load async)
  //
  // Usage:
  //   <a-entity gltf-model="#boxhider.glb" ar-hider-material></a-entity>
  // Or on a primitive:
  //   <a-box ar-hider-material></a-box>
  // Inner content (fairies, foliage, etc.) goes as CHILDREN of the
  // hider entity so the hider's depth clips them to its bounds.
  AFRAME.registerComponent('ar-hider-material', {
    schema: {
      // 'front' (default) is the classic occluder / boolean cutter —
      // the front face writes depth at its own Z, so anything behind
      // the mesh is culled. Works out of the box on any mesh with
      // outward-facing normals (primitive cubes, standard GLBs).
      // 'back' is the portal effect — front faces cull away, only the
      // back face writes depth, so content between near and far faces
      // stays visible. Use for windows / interior-reveals. 'double'
      // renders both sides.
      side:          { type: 'string',  default: 'front' }, // 'front' | 'back' | 'double'
      // If true, reverses triangle winding on every mesh under this
      // entity — equivalent to modelling with inverted normals. Use
      // for GLBs not authored that way when `side` is 'front'.
      invertNormals: { type: 'boolean', default: false },
    },
    init() {
      this._apply = this._apply.bind(this);
      this._flipped = new WeakSet();  // meshes already flipped to avoid double-flip on re-apply
      // Strip A-Frame's built-in material component so it can't race us.
      // When `<a-box color="#...">` is parsed, A-Frame attaches `material`
      // to the entity and calls `mesh.material = ...` on every update
      // cycle. Our component does the same. Without removing it, the
      // last writer wins — sometimes ours, sometimes A-Frame's. Removing
      // it once on init leaves ar-hider-material as the sole owner.
      if (this.el.components && this.el.components.material) {
        this.el.removeAttribute('material');
      }
      this._apply();
      this.el.addEventListener('model-loaded', this._apply);
      this.el.addEventListener('object3dset', this._apply);
    },
    update() { this._apply(); },
    _apply() {
      const root = this.el.object3D;
      if (!root) return;
      const sideMap = {
        front: THREE.FrontSide, back: THREE.BackSide, double: THREE.DoubleSide,
      };
      const mat = new THREE.MeshStandardMaterial();
      mat.colorWrite = false;
      mat.side = sideMap[this.data.side] != null ? sideMap[this.data.side] : THREE.BackSide;
      root.traverse(node => {
        if (!node.isMesh) return;
        if (this.data.invertNormals && !this._flipped.has(node) && node.geometry && node.geometry.index) {
          const idx = node.geometry.index.array;
          for (let i = 0; i < idx.length; i += 3) {
            const tmp = idx[i + 1]; idx[i + 1] = idx[i + 2]; idx[i + 2] = tmp;
          }
          node.geometry.index.needsUpdate = true;
          node.geometry.computeVertexNormals();
          this._flipped.add(node);
        }
        node.material = mat;
      });
    },
    remove() {
      this.el.removeEventListener('model-loaded', this._apply);
      this.el.removeEventListener('object3dset', this._apply);
    },
  });

  // ─── ar-material ────────────────────────────────────────
  // Studio-friendly material component that mirrors what the
  // inspector exposes (color / metalness / roughness / opacity /
  // shader) and APPLIES IT PROPERLY to every sub-mesh. A-Frame's
  // built-in `material` component only sets on the entity's root
  // Object3D, which is fine for primitives but useless for GLBs
  // (where the root is an invisible group containing the rendered
  // meshes as children). We traverse and set every mesh, matching
  // how xrextras-hider-material handles the same problem.
  AFRAME.registerComponent('ar-material', {
    schema: {
      shader:    { type: 'string',  default: 'standard' }, // 'standard' | 'flat'
      color:     { type: 'color',   default: '#ffffff' },
      opacity:   { type: 'number',  default: 1.0 },
      metalness: { type: 'number',  default: 0.0 },
      roughness: { type: 'number',  default: 0.5 },
    },
    init() {
      this._apply = this._apply.bind(this);
      // Same rationale as ar-hider-material: strip A-Frame's built-in
      // material component so it can't race us for mesh.material.
      if (this.el.components && this.el.components.material) {
        this.el.removeAttribute('material');
      }
      this._apply();
      // Re-apply on model-loaded (GLBs load async)
      this.el.addEventListener('model-loaded', this._apply);
      this.el.addEventListener('object3dset', this._apply);
    },
    update() { this._apply(); },
    remove() {
      this.el.removeEventListener('model-loaded', this._apply);
      this.el.removeEventListener('object3dset', this._apply);
      // Note: don't restore original material here — the entity is
      // being torn down, the Three.js cleanup handles disposal.
    },
    _build() {
      const d = this.data;
      const transparent = d.opacity < 1;
      if (d.shader === 'flat') {
        return new THREE.MeshBasicMaterial({
          color: new THREE.Color(d.color),
          opacity: d.opacity,
          transparent,
        });
      }
      return new THREE.MeshStandardMaterial({
        color: new THREE.Color(d.color),
        metalness: d.metalness,
        roughness: d.roughness,
        opacity: d.opacity,
        transparent,
      });
    },
    _apply() {
      const mat = this._build();
      const root = this.el.object3D;
      if (!root) return;
      root.traverse(node => {
        if (node.isMesh) node.material = mat;
      });
    },
  });

  // ─── image-to-slam ──────────────────────────────────────
  // 8th Wall's recommended pattern (per their forum + xrextras source):
  // do NOT make the entity a child of <xrextras-named-image-target>,
  // because that component sets visible=false on xrimagelost and re-
  // snaps position on every xrimageupdated. Instead, place the entity
  // at scene root, snapshot its initial transform as a "local offset
  // relative to image", listen for xrimagefound directly on the scene,
  // compose image_pose * local_offset into the world transform, apply
  // once. After the first lock the entity is in SLAM space — it stays
  // put even when the image leaves view, and gesture components keep
  // working on it (since SLAM/world tracking is also active).
  AFRAME.registerComponent('image-to-slam', {
    schema: {
      targetName: { type: 'string', default: '' }   // empty = match first image found
    },
    init() {
      const sceneEl = this.el.sceneEl;
      const tName = this.data.targetName;
      this._promoted = false;

      // Snapshot the user's intended LOCAL offset from the image
      const obj3d = this.el.object3D;
      const localPos = obj3d.position.clone();
      const localQuat = obj3d.quaternion.clone();
      const localScale = obj3d.scale.clone();

      // Hide until the image is first detected — avoids a flash at
      // origin while the user hasn't found the marker yet.
      obj3d.visible = false;

      const onFound = (e) => {
        const d = e && e.detail;
        if (!d) return;
        if (tName && d.name !== tName) return;
        if (this._promoted) return;

        // Compose: world = image_pose * local_offset. detail.scale is a
        // uniform scalar (the real-world size factor of the image), so
        // apply it as a Vector3 of (s,s,s) when building the matrix.
        const imgM = new THREE.Matrix4().compose(
          new THREE.Vector3().copy(d.position),
          new THREE.Quaternion().copy(d.rotation),
          new THREE.Vector3(d.scale, d.scale, d.scale)
        );
        const localM = new THREE.Matrix4().compose(localPos, localQuat, localScale);
        imgM.multiply(localM).decompose(obj3d.position, obj3d.quaternion, obj3d.scale);

        obj3d.visible = true;
        this._promoted = true;
      };

      const attach = () => sceneEl.addEventListener('xrimagefound', onFound);
      if (sceneEl.hasLoaded) attach();
      else sceneEl.addEventListener('loaded', attach);
    }
  });

  // ─── tap-to-spawn ──────────────────────────────────────
  // Wraps the SLAM scene's objects. On init, hides itself and shows a
  // "tap to place" hint. On the first tap of the ground entity, moves
  // its position to the tap's hit point and reveals all children. The
  // children's relative positions to each other (as designed in the
  // studio) are preserved because we move the parent, not the kids.
  AFRAME.registerComponent('tap-to-spawn', {
    schema: {
      surface: { type: 'string', default: 'ground' }   // 'ground' (future: 'wall')
    },
    init() {
      const sceneEl = this.el.sceneEl;
      const obj3d = this.el.object3D;

      obj3d.visible = false;
      this._placed = false;

      // Repurpose the existing scan-hint element for a placement prompt
      const hint = document.getElementById('scan-hint');
      if (hint) {
        hint.textContent = 'Tap a surface to place the scene';
        hint.classList.remove('hidden');
      }

      const onTap = (e) => {
        if (this._placed) return;
        // A-Frame cursor click events expose the THREE.Intersection on
        // event.detail.intersection — point is a world-space Vector3.
        const intersection = e && e.detail && e.detail.intersection;
        if (!intersection || !intersection.point) return;
        obj3d.position.copy(intersection.point);
        obj3d.visible = true;
        this._placed = true;
        if (hint) hint.classList.add('hidden');
      };

      const attach = () => {
        const ground = sceneEl.querySelector('#ground');
        if (ground) ground.addEventListener('click', onTap);
      };
      if (sceneEl.hasLoaded) attach();
      else sceneEl.addEventListener('loaded', attach);
    }
  });

  // ─── ground-clamp ──────────────────────────────────────
  // Keeps an entity's bounding-box bottom at or above a ground plane.
  // Auto-applied to image-to-slam entities so a plane (whose pivot is
  // at its centre) doesn't sink halfway through the floor when the
  // user drags it via xrextras-hold-drag — hold-drag positions the
  // PIVOT at the ground intersection, so a vertical plane would have
  // its bottom half below ground without this clamp.
  //
  // Strategy: compute the bbox once geometry is ready, store the
  // pivot-to-bottom offset, then on every tick ensure
  //   entity.position.y >= groundY + (pivot - bottom)
  // This lets hold-drag move the entity freely on X/Z but constrains
  // Y so the bottom always rests on the ground.
  AFRAME.registerComponent('ground-clamp', {
    schema: {
      groundY: { type: 'number', default: 0 },
      enabled: { type: 'boolean', default: true }
    },
    init() {
      this._pivotToBottom = null;   // cached: distance from pivot to bbox bottom
      this._wasVisible = false;
      this._lastScaleY = null;
      this._scratch = new THREE.Box3();

      // Recompute when a child mesh is set/replaced (video-on-target's
      // plane geometry resizes when video metadata arrives, so we
      // can't snapshot once and forget).
      const recompute = () => this._compute();
      this.el.addEventListener('object3dset', recompute);
      this.el.addEventListener('loaded', recompute);
      setTimeout(recompute, 0);
      setTimeout(recompute, 500);
      setTimeout(recompute, 1500);
    },
    _compute() {
      const obj = this.el.object3D;
      // Only compute when the entity is actually visible — image-to-
      // slam hides the entity until the marker is found and may also
      // change scale during promotion. Computing on an invisible/
      // unscaled entity gives a stale offset.
      if (!obj.visible) return;
      this._scratch.makeEmpty();
      this._scratch.setFromObject(obj);
      const bottom = this._scratch.min.y;
      if (!isFinite(bottom)) return;
      this._pivotToBottom = obj.position.y - bottom;
      this._lastScaleY = obj.scale.y;
    },
    tick() {
      if (!this.data.enabled) return;
      const obj = this.el.object3D;

      // First-time recompute: image-to-slam promotion makes the entity
      // visible AND may change scale at the same moment. Catch that
      // transition here so the clamp distance reflects the final size.
      if (!this._wasVisible && obj.visible) {
        this._wasVisible = true;
        this._compute();
      }
      // Scale changed materially (video aspect resolved late, etc.) →
      // recompute once so the offset tracks the new bbox.
      else if (this._lastScaleY != null && Math.abs(obj.scale.y - this._lastScaleY) > 0.001) {
        this._compute();
      }

      if (this._pivotToBottom == null) return;
      const minY = this.data.groundY + this._pivotToBottom;
      if (obj.position.y < minY) obj.position.y = minY;
    }
  });
}

function setSplashStatus(msg) {
  document.querySelectorAll('.splash-status-text').forEach(e => e.textContent = msg);
}

// Check if any object in the project uses audio or video components
function projectHasMedia() {
  if (!APP?.objects) return false;
  return APP.objects.some(o => {
    const xr = o.xrComponents || {};
    return Object.keys(xr).some(k =>
      k.includes('audio') || k.includes('Audio') || k.includes('sound') ||
      k.includes('Sound') || k.includes('video') || k.includes('Video'));
  });
}

function hideSplash() {
  // splash.duration is the MINIMUM total splash time measured from
  // page load (not from scene-loaded). If the scene loads quickly, the
  // splash dismisses as soon as the elapsed time has reached duration;
  // if the scene loads slowly, the splash hides immediately because
  // the user has already seen branding for plenty of time.
  const minDur = (APP?.splash?.duration ?? 3) * 1000;
  const elapsed = performance.now() - SPLASH_START;
  const remaining = Math.max(0, minDur - elapsed);
  setTimeout(() => {
    el('splash').classList.add('hidden');
    if (projectHasMedia()) showAudioButton();
  }, remaining);
}

// Global audio state — used by all audio components
window._4E_AUDIO = {
  unlocked: false,    // iOS AudioContext unlocked
  muted: false,       // global mute toggle
  ambient: [],        // ambient audio elements (autoplay)
  onTarget: [],       // image-target audio elements (paused until found)
};

// 🔊 button — three states:
//   1. Muted (default) — tap to enable audio (also unlocks iOS)
//   2. Unmuted — tap to mute
//   3. Re-mute → unmute again
function showAudioButton() {
  // Start muted by default
  window._4E_AUDIO.muted = true;

  const btn = document.createElement('button');
  btn.id = 'audio-btn';
  btn.textContent = '🔇';
  btn.style.cssText = 'position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:rgba(0,0,0,0.6);color:#fff;font-size:22px;cursor:pointer;z-index:100;backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;animation:pulse 2s infinite';

  const updateBtn = () => {
    if (window._4E_AUDIO.muted) {
      btn.textContent = '🔇';
      btn.title = 'Tap to enable audio';
      btn.style.borderColor = 'rgba(255,255,255,0.4)';
    } else {
      btn.textContent = '🔊';
      btn.title = 'Tap to mute';
      btn.style.borderColor = 'rgba(139,92,246,0.8)';
      btn.style.animation = 'none';
    }
  };

  btn.onclick = () => {
    window._4E_AUDIO.muted = !window._4E_AUDIO.muted;

    // Apply mute to all registered audios
    const allAudios = [...window._4E_AUDIO.ambient, ...window._4E_AUDIO.onTarget];
    allAudios.forEach(a => { a.muted = window._4E_AUDIO.muted; });

    // Unlock + start ambient on first unmute
    if (!window._4E_AUDIO.muted && !window._4E_AUDIO.unlocked) {
      window._4E_AUDIO.unlocked = true;
      window._4E_AUDIO.ambient.forEach(a => a.play().catch(() => {}));
    }
    updateBtn();
  };
  document.body.appendChild(btn);
  updateBtn();
}
function showError(t, m) { el('err-title').textContent = t; el('err-msg').textContent = m; el('error-screen').classList.add('show'); hideSplash(); }
function showARUI() { el('ar-ui').classList.add('show'); }

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  const appId = new URLSearchParams(location.search).get('id');
  if (!appId) { showError('No App ID', 'Scan a valid 4E AR QR code.'); return; }

  setSplashStatus('Connecting…');
  const cfg = window.AR_FIREBASE_CONFIG;
  if (!cfg?.apiKey) { showError('Config missing', 'Firebase not configured.'); return; }

  try {
    firebase.initializeApp(cfg);
    const db = firebase.firestore();
    setSplashStatus('Loading experience…');
    const doc = await db.collection('ar_apps').doc(appId).get();
    if (!doc.exists) { showError('Not found', 'Experience does not exist.'); return; }

    APP = doc.data();
    APP.id = appId;

    // PWA: inject per-project manifest + touch icon + theme color, register SW
    applyPWA(APP);

    // Custom splash
    applySplash(APP);

    // Preload assets in parallel during splash. CRITICAL: we split
    // assets into two categories:
    //   - BLOCKING: small files the scene build can't really proceed
    //     without (image target luminance PNGs — 8th Wall needs these
    //     for tracker init; GLB models; audio). Typically KBs each.
    //   - BACKGROUND: video files. These can be tens of MB. We DO
    //     kick off their download so the browser HTTP cache warms up
    //     while the user watches the splash, but we DON'T await them.
    //     When an image target is found and the <video> element loads,
    //     it reads from cache (often-fully-buffered or streaming).
    //     This keeps splash duration predictable regardless of video
    //     size, while still benefiting from early prefetch.
    setSplashStatus('Preloading assets…');
    const blocking = [];
    const bgPrefetch = [];

    // Image target luminance images — blocking (needed by tracker)
    if (APP.targets && APP.targets.length > 0) {
      APP.targets.forEach(t => {
        if (t.luminanceUrl) blocking.push(new Promise(res => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = img.onerror = () => res();
          img.src = t.luminanceUrl;
        }));
      });
    }

    // GLBs + audio = blocking; videos = background prefetch. Only
    // preload what's IN THIS SCENE. Prefabs that live in the
    // project's library but aren't instantiated shouldn't be
    // downloaded — that was a regression that slowed down every
    // cold launch by the size of every library prefab.
    //
    // Dedupe URLs so the same GLB isn't fetched multiple times when a
    // prefab is instantiated more than once (e.g. same model across
    // multiple image targets).
    const isVideoUrl = u => /\.(mp4|webm|mov|m4v)(\?|$)/i.test(u);
    const seen = new Set();
    const addBlocking = u => { if (u && !seen.has(u)) { seen.add(u); blocking.push(fetch(u, { mode: 'cors' }).catch(() => {})); } };
    const addBgVideo = u => { if (u && !seen.has(u)) { seen.add(u); bgPrefetch.push(u); } };
    (APP.objects || []).forEach(o => {
      addBlocking(o.glbUrl);
      const xr = o.xrComponents || {};
      Object.values(xr).forEach(cfg => {
        if (cfg && typeof cfg === 'object') {
          const url = cfg.src || cfg.video;
          if (url && typeof url === 'string' && !url.startsWith('#')) {
            if (isVideoUrl(url)) addBgVideo(url);
            else addBlocking(url);
          }
        }
      });
    });

    // Fire background video prefetches (non-awaited) — they warm the
    // HTTP cache in parallel with XR8 init without holding up splash.
    bgPrefetch.forEach(u => { fetch(u, { mode: 'cors' }).catch(() => {}); });

    if (blocking.length > 0) {
      setSplashStatus(`Preloading ${blocking.length} asset${blocking.length > 1 ? 's' : ''}…`);
      await Promise.all(blocking);
    }

    setSplashStatus('Waiting for AR engine…');
    await waitForXR8(12000);

    const mode = APP.trackingMode || 'image';
    setSplashStatus('Building scene…');

    if (mode === 'slam') buildSLAM();
    else if (mode === 'face') buildFace();
    else buildImage();

  } catch(e) { showError('Error', e.message); }
}

function waitForXR8(timeout=10000) {
  return new Promise(res => {
    if (window.XR8) { res(); return; }
    const t0 = Date.now();
    const check = () => {
      if (window.XR8 || Date.now()-t0 > timeout) { res(); return; }
      setTimeout(check, 100);
    };
    check();
  });
}

// ═══════════════════════════════════════════════════════════
// PWA — per-project manifest, apple-touch-icon, theme color, SW
// ═══════════════════════════════════════════════════════════
function applyPWA(app) {
  const sp = app.splash || {};
  const pwa = app.pwa || {};
  const name = sp.title || app.name || '4E AR';
  // For Chromium install prompt + iOS home-screen label. iOS truncates
  // visually anyway; passing the full name lets it pick the best fit
  // rather than getting a hard-cut "TeachCeoil_0".
  const shortName = name;
  const bg = sp.bgColor || '#060a18';
  const theme = sp.accentColor || '#8b5cf6';

  // Fall back to the default 4E logo when a project hasn't uploaded
  // PWA icons yet (e.g. saved before PWA generation, or upload failed).
  // Using the same logo on every slot keeps the icon consistent across
  // browser tab, iOS home screen, and Chromium install.
  const FALLBACK = 'samples/logo_WHT.png';
  const icon192 = pwa.icon192Url || FALLBACK;
  const icon512 = pwa.icon512Url || FALLBACK;
  const iconApple = pwa.appleIconUrl || FALLBACK;

  // Document title (browser tab + history)
  document.title = name;

  // Helper to upsert a meta or link tag by selector
  const upsertMeta = (name, content) => {
    let m = document.querySelector(`meta[name="${name}"]`);
    if (!m) { m = document.createElement('meta'); m.name = name; document.head.appendChild(m); }
    m.content = content;
  };
  const upsertLink = (selector, attrs) => {
    let l = document.querySelector(selector);
    if (!l) { l = document.createElement('link'); document.head.appendChild(l); }
    Object.entries(attrs).forEach(([k, v]) => l.setAttribute(k, v));
    return l;
  };

  // Theme color (browser chrome on mobile, status bar on PWA)
  upsertMeta('theme-color', bg);
  // iOS home-screen label
  upsertMeta('apple-mobile-web-app-title', name);

  // Browser tab favicon — covers desktop browsers and mobile tabs.
  // Use the 192px PNG; modern browsers handle scaling.
  upsertLink('link[rel="icon"]', { rel: 'icon', type: 'image/png', sizes: '192x192', href: icon192 });
  upsertLink('link[rel="shortcut icon"]', { rel: 'shortcut icon', type: 'image/png', href: icon192 });
  // iOS home screen icon (shown on Add to Home Screen)
  upsertLink('link[rel="apple-touch-icon"]', { rel: 'apple-touch-icon', sizes: '180x180', href: iconApple });
  // High-res variant (Chromium picks this for install prompt previews)
  upsertLink('link[rel="apple-touch-icon"][sizes="192x192"]', { rel: 'apple-touch-icon', sizes: '192x192', href: icon192 });

  // Build PWA manifest. Always emits at least one icon (fallback) so
  // Chromium's install prompt always has something to show.
  const icons = [];
  if (pwa.icon192Url) icons.push({ src: pwa.icon192Url, sizes: '192x192', type: 'image/png', purpose: 'any' });
  if (pwa.icon512Url) icons.push({ src: pwa.icon512Url, sizes: '512x512', type: 'image/png', purpose: 'any' });
  if (!icons.length) {
    // Resolve fallback to absolute URL so manifest icons work cross-origin
    const abs = new URL(FALLBACK, location.href).href;
    icons.push({ src: abs, sizes: '192x192', type: 'image/png', purpose: 'any' });
  }

  const manifest = {
    name,
    short_name: shortName,
    start_url: location.pathname + '?id=' + encodeURIComponent(app.id),
    scope: '/',
    display: 'standalone',
    orientation: 'portrait',
    background_color: bg,
    theme_color: theme,
    icons,
  };

  // Inject manifest via data URL — avoids a separate hosted JSON file
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  upsertLink('link[rel="manifest"]', { rel: 'manifest', href: URL.createObjectURL(manifestBlob) });

  // Service worker satisfies Chrome's install prompt criteria
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => {});
  }
}

function applySplash(app) {
  const sp = app.splash || {};
  const title = sp.title || app.name || 'AR Experience';
  const rootStyle = document.documentElement.style;

  // Update CSS custom properties — colors transition smoothly via CSS
  if (sp.bgColor) rootStyle.setProperty('--sp-bg', sp.bgColor);
  if (sp.textColor) rootStyle.setProperty('--sp-text', sp.textColor);
  if (sp.accentColor) rootStyle.setProperty('--sp-accent', sp.accentColor);

  // Optional gradient background — apply to splash element directly.
  // CRITICAL: gradient stops must be fully opaque so the splash covers
  // the camera feed / AR UI underneath. color-mix blends bg+accent to
  // give a subtle tinted gradient rather than fading to transparency.
  if (sp.gradient && sp.bgColor) {
    const accent = sp.accentColor || '#8b5cf6';
    el('splash').style.background =
      'linear-gradient(145deg,' + sp.bgColor + ',' +
      'color-mix(in srgb,' + sp.bgColor + ' 72%,' + accent + '))';
  } else {
    // Clear any inline gradient so CSS var-driven bg applies
    el('splash').style.background = '';
  }

  // Text content — update in place (no structural DOM change)
  const setText = (id, v) => { const e = el(id); if (e) e.textContent = v; };
  const setShown = (id, v) => { const e = el(id); if (e) e.style.display = v ? '' : 'none'; };

  setText('sp-title', title);
  setShown('sp-title', sp.showTitle !== false);

  if (sp.subtitle) {
    setText('sp-subtitle', sp.subtitle);
    setShown('sp-subtitle', sp.showSubtitle !== false);
  } else {
    setShown('sp-subtitle', false);
  }

  setShown('sp-logo', sp.showLogo !== false);
  setShown('sp-spinner-row', sp.showSpinner !== false);
  setShown('sp-branding', sp.showBranding !== false);

  // Logo — background-image swap is seamless (old image stays until new
  // one is decoded), so no blank frame / layout reflow.
  if (sp.logoUrl && sp.showLogo !== false) {
    const logoEl = el('sp-logo');
    if (logoEl) {
      const newBg = "url('" + sp.logoUrl.replace(/'/g, "\\'") + "')";
      if (logoEl.style.backgroundImage !== newBg) logoEl.style.backgroundImage = newBg;
    }
  }

  el('ar-title').textContent = title;

  // Cache for next visit — everything needed to render the splash in
  // its final form on first paint (head primer + body-phase script).
  try {
    localStorage.setItem('4e-splash-' + app.id, JSON.stringify({
      title: sp.title, subtitle: sp.subtitle,
      bgColor: sp.bgColor, textColor: sp.textColor, accentColor: sp.accentColor,
      logoUrl: sp.logoUrl, gradient: sp.gradient,
      showLogo: sp.showLogo, showTitle: sp.showTitle, showSubtitle: sp.showSubtitle,
      showSpinner: sp.showSpinner, showBranding: sp.showBranding,
      name: app.name,
    }));
  } catch(e) {}
}
function _esc(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════════════════
// OBJECT BUILDER (shared across all modes)
// ═══════════════════════════════════════════════════════════

// Resolve a model instance's GLB URL. Instances reference prefabs via
// prefabId; legacy projects embedded glbUrl on the object directly.
// Try prefab lookup first, fall back to the object's own glbUrl.
function resolveGlbUrl(obj) {
  if (obj.prefabId && APP.prefabs) {
    const pf = APP.prefabs.find(p => p.id === obj.prefabId);
    if (pf && pf.glbUrl) return pf.glbUrl;
  }
  return obj.glbUrl || '';
}

function getObjects() {
  if (APP.objects?.length) {
    // Decorate each model instance with its resolved glbUrl so the
    // rest of the pipeline (buildAssets, buildEntity, preload) keeps
    // working against o.glbUrl without caring about the prefab layer.
    APP.objects.forEach(o => {
      if (o.type !== 'primitive') {
        const url = resolveGlbUrl(o);
        if (url) o.glbUrl = url;
      }
    });
    return APP.objects.filter(o => (o.glbUrl || o.type === 'primitive') && o.visible !== false);
  }
  if (APP.glbUrl) return [{
    id:'legacy', glbUrl:APP.glbUrl,
    transform:{ position:{x:APP.posX||0,y:APP.posY||0,z:APP.posZ||0}, rotation:{x:APP.rotX||0,y:APP.rotY||0,z:APP.rotZ||0}, scale:{x:APP.scale||1,y:APP.scale||1,z:APP.scale||1} },
    defaultAnim:APP.defaultAnimation||'', loop:APP.loopMode||'repeat', clips:APP.animations||[], presets:{}, interactions:{}
  }];
  return [];
}

function buildAssets(objects) {
  let assets = '';
  let mediaIdx = 0;

  objects.forEach((o, i) => {
    // GLB model assets
    if (o.type !== 'primitive' && o.glbUrl) {
      assets += `<a-asset-item id="m${i}" src="${o.glbUrl}"></a-asset-item>\n`;
    }

    // Video/Audio assets from xrComponents
    const xr = o.xrComponents || {};
    Object.entries(xr).forEach(([key, config]) => {
      if (!config || typeof config !== 'object') return;

      // Video sources (xrextras-target-video-fade, xrextras-target-video-sound, xrextras-play-video, xrextras-video-material)
      const videoUrl = config.video || config.src;
      if (videoUrl && (key.includes('video') || key.includes('Video'))) {
        const vid = `vid-${i}-${mediaIdx++}`;
        assets += `<video id="${vid}" src="${videoUrl}" preload="auto" loop playsinline webkit-playsinline crossorigin="anonymous"></video>\n`;
        // Replace the URL with the asset ID so A-Frame can reference it
        if (config.video) config.video = `#${vid}`;
        if (config.src) config.src = `#${vid}`;
      }

      // Audio components create their own <audio> elements (target-audio-direct,
      // ambient-audio-direct). No asset needed here.
    });
  });

  return assets;
}

// Per-primitive geometry attributes (everything except position/rotation/
// scale/color, which are added by buildEntity). Used as the "base" attrs
// when emitting a primitive that's been routed through buildEntity.
// IMPORTANT: these dimensions MUST match the studio viewport's THREE
// geometries in viewport.js — otherwise primitives publish at a
// different size than the user authored. Previously `cube` was empty,
// relying on <a-box>'s 1m³ default, but the studio renders it at
// 0.3m — causing a 3.33× size jump on publish. Any future tweak to
// primitive sizes needs to be made in BOTH files at the same time.
const PRIMITIVE_GEOMETRY = {
  cube:     ' width="0.3" height="0.3" depth="0.3"',
  sphere:   ' radius="0.18"',
  cylinder: ' radius="0.15" height="0.35"',
  plane:    ' width="0.5" height="0.5"',
  cone:     ' radius-bottom="0.18" height="0.35"',
  torus:    ' radius="0.15" radius-tubular="0.05"',
};
const PRIMITIVE_TAG = {
  cube: 'a-box', sphere: 'a-sphere', cylinder: 'a-cylinder',
  plane: 'a-plane', cone: 'a-cone', torus: 'a-torus',
};

function buildEntity(obj, i) {
  // Single path for everything — primitives, empties, and GLBs all flow
  // through here so they all pick up presets, interactions, xrComponents,
  // image-to-slam, etc. The final element type is chosen at the end
  // based on obj.type / obj.primitiveType / obj.glbUrl.

  const t = obj.transform || {position:{x:0,y:0,z:0},rotation:{x:0,y:0,z:0},scale:{x:1,y:1,z:1}};
  const pos = `${t.position.x} ${t.position.y} ${t.position.z}`;
  const rot = `${t.rotation.x} ${t.rotation.y} ${t.rotation.z}`;
  const sc = `${t.scale.x} ${t.scale.y} ${t.scale.z}`;
  const color = obj.primitiveColor || '#8b5cf6';
  const isPrimitive = obj.type === 'primitive' && obj.primitiveType;
  const isEmpty = obj.primitiveType === 'empty';
  const hasVideoComp = obj.xrComponents && obj.xrComponents['video-on-target'];
  const isPlaneWithVideo = obj.primitiveType === 'plane' && hasVideoComp;

  // GLB animation
  let attrs = '';
  if (obj.defaultAnim && obj.loop !== 'none') {
    attrs += ` animation-mixer="clip: ${obj.defaultAnim}; loop: ${obj.loop||'repeat'}; crossFadeDuration: 0.4"`;
  } else if (obj.clips?.length) {
    attrs += ` animation-mixer="clip: *; loop: repeat"`;
  }

  // Preset animations
  const p = obj.presets || {};
  if (p.spin) {
    const dur = Math.round(2000/(p.spin.speed||1));
    const axis = p.spin.axis||'y';
    attrs += ` animation__spin="property: rotation.${axis}; from: ${t.rotation[axis]||0}; to: ${(parseFloat(t.rotation[axis])||0)+360}; dur: ${dur}; loop: true; easing: linear"`;
  }
  if (p.bob) {
    const h = p.bob.height||0.05, dur = Math.round(2000/(p.bob.speed||2));
    attrs += ` animation__bob="property: position.y; from: ${t.position.y-h}; to: ${t.position.y+h}; dur: ${dur}; loop: true; dir: alternate; easing: easeInOutSine"`;
  }
  if (p.pulse) {
    const a = p.pulse.amount||0.08, dur = Math.round(2000/(p.pulse.speed||3)), s = t.scale.x;
    attrs += ` animation__pulse="property: scale; from: ${s*(1-a)} ${s*(1-a)} ${s*(1-a)}; to: ${s*(1+a)} ${s*(1+a)} ${s*(1+a)}; dur: ${dur}; loop: true; dir: alternate; easing: easeInOutSine"`;
  }

  // Image → SLAM anchoring: on first xrimagefound for this target,
  // compose the image's world pose with the user's local offset and
  // lock the entity in world space. Entity must live at scene root
  // (not as a child of <xrextras-named-image-target>) for this to work
  // — buildImageNative handles the placement. Also pair with
  // ground-clamp so hold-drag can't sink the entity below the floor
  // (planes have center pivots; without the clamp, dragging a vertical
  // plane puts its bottom half below the ground).
  if (obj.imageToSlam) {
    const tgt = (APP?.targets || []).find(t => t.id === obj.targetId);
    const tName = tgt ? tgt.name : '';
    attrs += ` image-to-slam="targetName: ${tName}" ground-clamp`;
  }

  // 8th Wall native interactions from legacy interactions{} field
  const ix = obj.interactions || {};
  if (ix.holdDrag) attrs += ' xrextras-hold-drag';
  if (ix.pinchScale) attrs += ' xrextras-pinch-scale';
  if (ix.oneFingerRotate) attrs += ' xrextras-one-finger-rotate';
  if (ix.twoFingerRotate) attrs += ' xrextras-two-finger-rotate';
  if (ix.autoSpin) attrs += ' xrextras-spin';
  if (ix.faceCamera) attrs += ' look-at="[camera]"';
  if (ix.castShadow !== false) attrs += ' shadow="cast: true"';

  // xrComponents{} — convert to A-Frame attributes
  const xr = obj.xrComponents || {};
  Object.entries(xr).forEach(([key, config]) => {
    if (attrs.includes(key)) return;

    // Audio on target — uses raw <audio> element via target-audio-direct.
    // Skip A-Frame sound entirely (it's unreliable for pause/play on visibility).
    if (key === 'audio-on-target' && config && typeof config === 'object') {
      const src = config.src || '';
      if (src) {
        const vol = config.volume != null ? config.volume : 0.8;
        const loop = config.loop !== false;
        const fIn = config.fadeIn != null ? config.fadeIn : 0.5;
        const fOut = config.fadeOut != null ? config.fadeOut : 1.0;
        const pauseOnLost = config.pauseOnLost !== false;
        const resumeOnFound = config.resumeOnFound !== false;
        attrs += ` target-audio-direct="src: ${src}; volume: ${vol}; loop: ${loop}; fadeIn: ${fIn}; fadeOut: ${fOut}; pauseOnLost: ${pauseOnLost}; resumeOnFound: ${resumeOnFound}"`;
      }
      return;
    }

    // Ambient audio — direct element controlled by global mute state
    if (key === 'audio-ambient' && config && typeof config === 'object') {
      const src = config.src || '';
      if (src) {
        const vol = config.volume != null ? config.volume : 0.5;
        const loop = config.loop !== false;
        attrs += ` ambient-audio-direct="src: ${src}; volume: ${vol}; loop: ${loop}"`;
      }
      return;
    }

    // Hider material — emit our own ar-hider-material (mirrors the
    // 8th Wall ECS hider spec from projects like dunnasifairy1:
    // MeshStandardMaterial with colorWrite=false applied to every
    // sub-mesh). The studio-only toggles showWireframe/solidFill
    // live on the config for the editor preview and are stripped
    // before emission. Does NOT use xrextras-hider-material — we
    // control the full lifecycle so no external dependency can
    // regress behaviour.
    if (key === 'xrextras-hider-material') {
      // Only forward the player-relevant props. Studio-only preview
      // fields (if any existed) are meaningless here.
      const cfg = (config && typeof config === 'object') ? config : {};
      const side = cfg.side || 'front';
      const invert = !!cfg.invertNormals;
      const parts = [];
      // Skip side when it matches the component's own default so the
      // serialised attribute stays minimal.
      if (side && side !== 'front')        parts.push('side: ' + side);
      if (invert)                          parts.push('invertNormals: true');
      attrs += parts.length
        ? ` ar-hider-material="${parts.join('; ')}"`
        : ` ar-hider-material`;
      return;
    }

    // xrextras-basic-material / xrextras-pbr-material names in the
    // studio are a little misleading — the real xrextras components
    // with those names expect TEXTURE URL selectors (tex, metalness
    // map, roughness map, etc.), not scalar values. Passing our
    // scalar colour/metalness/roughness crashes them with "invalid
    // selector". Translate to our custom `ar-material` component
    // which accepts scalars and traverses sub-meshes correctly
    // (A-Frame's native `material` doesn't handle GLB sub-meshes).
    if ((key === 'xrextras-basic-material' || key === 'xrextras-pbr-material') &&
        config && typeof config === 'object') {
      const shader = key === 'xrextras-basic-material' ? 'flat' : 'standard';
      const parts = ['shader: ' + shader];
      if (config.color != null)     parts.push('color: ' + config.color);
      if (config.opacity != null)   parts.push('opacity: ' + config.opacity);
      if (config.metalness != null) parts.push('metalness: ' + config.metalness);
      if (config.roughness != null) parts.push('roughness: ' + config.roughness);
      attrs += ` ar-material="${parts.join('; ')}"`;
      return;
    }

    // Skip the legacy 'visible' xrComponent entirely. It was a
    // confusing duplicate of obj.visible / the hierarchy eye icon
    // and used to serialise as visible="value: true" which A-Frame
    // sometimes parsed as an invalid bool → hid the entity. The
    // hierarchy eye is now the only visibility control; this guard
    // prevents any pre-existing saved data from breaking rendering.
    if (key === 'visible') return;

    // All other components pass through as-is
    if (config === true) {
      attrs += ` ${key}`;
    } else if (config && typeof config === 'object') {
      const pairs = Object.entries(config).map(([k,v]) => `${k}: ${v}`).join('; ');
      if (pairs) {
        attrs += ` ${key}="${pairs}"`;
      } else {
        attrs += ` ${key}`;
      }
    }
  });

  // Plane primitive + video-on-target: render as <a-plane> so the video
  // component can apply its texture directly to the host mesh.
  if (isPlaneWithVideo) {
    return `<a-plane id="ent-${i}" class="cantap" position="${pos}" rotation="${rot}" scale="${sc}" width="1" height="1"${attrs}></a-plane>`;
  }

  // Empty primitive → invisible <a-entity> container for components
  if (isEmpty) {
    return `<a-entity id="ent-${i}" class="cantap" position="${pos}" rotation="${rot}" scale="${sc}"${attrs}></a-entity>`;
  }

  // Other primitives → emit <a-box>/<a-sphere>/etc. with full attrs
  // (color + geometry + presets + interactions + xrComponents + ...)
  if (isPrimitive) {
    const tag = PRIMITIVE_TAG[obj.primitiveType];
    if (tag) {
      const geom = PRIMITIVE_GEOMETRY[obj.primitiveType] || '';
      // Omit `color` when a material component owns the surface.
      // A-Frame maps `color` to its built-in material component, which
      // races ar-hider-material / ar-material for `mesh.material` and
      // can overwrite them on subsequent ticks (object3dset, etc.).
      // Our material components traverse and assign the material
      // themselves, so skipping color here leaves them uncontested.
      const hasOwnMaterial = attrs.includes('ar-hider-material') || attrs.includes('ar-material');
      const colorAttr = hasOwnMaterial ? '' : ` color="${color}"`;
      return `<${tag} id="ent-${i}" class="cantap" position="${pos}" rotation="${rot}" scale="${sc}"${colorAttr}${geom}${attrs}></${tag}>`;
    }
    return '';
  }

  // GLB model
  return `<a-gltf-model id="gltf-${i}" class="cantap" src="#m${i}" position="${pos}" rotation="${rot}" scale="${sc}"${attrs}></a-gltf-model>`;
}

// ═══════════════════════════════════════════════════════════
// SLAM / WORLD TRACKING
// ═══════════════════════════════════════════════════════════
function buildSLAM() {
  const objects = getObjects();
  if (!objects.length) { showError('Empty', 'No models in this experience.'); return; }

  const ambInt = APP.ambientIntensity ?? 0.5;
  const dirInt = APP.directIntensity ?? 0.8;
  const showShadow = APP.shadowCatcher !== false;

  // Spawn mode controls how objects appear:
  //   showOnStart — visible immediately at saved positions (default)
  //   tapToPlace  — hidden until user taps the ground; whole scene is
  //                 then anchored to the tap point (preserving the
  //                 relative positions designed in the studio)
  // We always wrap entities in a #spawn-anchor entity so the player
  // can move ALL of them as one unit on tap. Wrapping is harmless for
  // showOnStart (anchor stays at origin, identity transform).
  const spawnMode = APP.scene?.spawnMode || 'showOnStart';
  const spawnAttrs = spawnMode === 'tapToPlace'
    ? ' tap-to-spawn="surface: ground"'
    : '';

  const entities = objects.map((o,i) => buildEntity(o,i)).join('\n');

  const html = `
    <a-scene
      xrextras-gesture-detector
      xrweb="allowedDevices: any"
      renderer="colorManagement: true">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <!-- Camera starts at average eye height; SLAM tracking takes over
           the pose as soon as it's available. Previously this was set
           to (0, 8, 0) which placed the camera 8m above the ground —
           any object near the world origin would be far below the
           initial frame and appear "missing" until SLAM activates. -->
      <a-camera id="camera" position="0 1.6 0"
        raycaster="objects: .cantap"
        cursor="fuse: false; rayOrigin: mouse;">
      </a-camera>

      <!-- Directional light following camera with shadows -->
      <a-entity
        light="type: directional; intensity: ${dirInt}; castShadow: true;
          shadowMapHeight: 2048; shadowMapWidth: 2048;
          shadowCameraTop: 20; shadowCameraBottom: -20;
          shadowCameraRight: 20; shadowCameraLeft: -20;
          target: #camera"
        xrextras-attach="target: camera; offset: 8 15 4"
        shadow>
      </a-entity>

      <a-light type="ambient" intensity="${ambInt}"></a-light>

      <!-- Ground entity is needed for tap-to-spawn AND xrextras-hold-drag
           tap targets, regardless of whether shadow catching is on. The
           material differs: shadow shader when catching shadows; fully
           transparent (still raycastable) otherwise. -->
      <a-box id="ground" class="cantap"
        scale="1000 2 1000" position="0 -1 0"
        ${showShadow
          ? 'material="shader: shadow; transparent: true; opacity: 0.4" shadow'
          : 'material="transparent: true; opacity: 0"'}>
      </a-box>

      <a-entity id="spawn-anchor"${spawnAttrs}>
        ${entities}
      </a-entity>
    </a-scene>`;

  // Initial hint depends on spawn mode. tap-to-spawn component will
  // also update this text once it initializes; setting it here avoids
  // a flash of the wrong text between scene load and component init.
  const initialHint = spawnMode === 'tapToPlace'
    ? 'Tap a surface to place the scene'
    : 'Look around to detect surfaces';
  mountScene(html, objects, initialHint);
}

// ═══════════════════════════════════════════════════════════
// IMAGE TRACKING (8th Wall native or MindAR fallback)
// ═══════════════════════════════════════════════════════════
function buildImage() {
  const objects = getObjects();
  if (!objects.length) { showError('Empty', 'No models in scene.'); return; }

  // 8th Wall native image targets (primary and only path)
  if (APP.targets && APP.targets.length > 0) {
    buildImageNative(objects);
    return;
  }

  // Legacy single-target — try to use 8th Wall if we have image URLs
  if (APP.target?.imageUrl) {
    // Convert legacy target to native format
    APP.targets = [{
      id: 'legacy',
      name: 'target',
      type: 'PLANAR',
      luminanceUrl: APP.target.imageUrl,
      originalUrl: APP.target.imageUrl,
      thumbnailUrl: APP.target.imageUrl,
      properties: {},
      objectIds: objects.map(o => o.id),
    }];
    buildImageNative(objects);
    return;
  }

  showError('No target', 'No image target configured. Add a target in the studio.');
}

// ═══════════════════════════════════════════════════════════
// 8TH WALL NATIVE IMAGE TARGETS
// ═══════════════════════════════════════════════════════════
function buildImageNative(objects) {
  setSplashStatus('Configuring image targets…');

  // Build imageTargetData array for XR8
  const imageTargetData = APP.targets.map(t => ({
    imagePath: t.luminanceUrl,
    name: t.name,
    type: t.type || 'PLANAR',
    metadata: null,
    properties: t.properties || {},
    resources: {
      luminanceImage: t.luminanceUrl,
      originalImage: t.originalUrl || t.luminanceUrl,
      thumbnailImage: t.thumbnailUrl || t.luminanceUrl,
      croppedImage: t.luminanceUrl,
    },
    loadAutomatically: true,
    created: Date.now(),
    updated: Date.now(),
  }));

  // Configure XR8 with image targets
  const configureTargets = () => {
    XR8.XrController.configure({ imageTargetData });
  };
  if (window.XR8) configureTargets();
  else window.addEventListener('xrloaded', configureTargets);

  // Build A-Frame entities per target
  const ambInt = APP.scene?.ambientIntensity ?? APP.ambientIntensity ?? 0.8;
  const dirInt = APP.scene?.directIntensity ?? APP.directIntensity ?? 1.0;

  // Group objects by target. Objects with imageToSlam=true are emitted
  // at scene root (not inside <xrextras-named-image-target>) so 8th
  // Wall's named-image-target component doesn't auto-hide them on
  // xrimagelost or re-snap them on xrimageupdated. Their image-to-slam
  // component listens to xrimagefound directly and locks them in world
  // space — see the component definition for the math.
  let targetEntities = '';
  let slamRootEntities = '';
  APP.targets.forEach(target => {
    const targetObjs = objects.filter(o => {
      if (o.targetId === target.id) return true;
      if (!o.targetId && (target.objectIds || []).includes(o.id)) return true;
      return false;
    });
    // If no explicit assignment, put all unassigned objects on first target
    const useObjs = targetObjs.length > 0 ? targetObjs : (target === APP.targets[0] ? objects.filter(o => !o.targetId) : []);

    const trackedObjs = useObjs.filter(o => !o.imageToSlam);
    const slamObjs = useObjs.filter(o => o.imageToSlam);

    if (trackedObjs.length > 0) {
      const ents = trackedObjs.map(o => buildEntity(o, objects.indexOf(o))).join('\n');
      targetEntities += `
        <xrextras-named-image-target name="${target.name}">
          ${ents}
        </xrextras-named-image-target>`;
    }
    slamObjs.forEach(o => {
      slamRootEntities += '\n      ' + buildEntity(o, objects.indexOf(o));
    });
  });

  // World tracking must be enabled when any object uses image-to-SLAM
  // (the promotion to scene root requires SLAM to keep the entity in
  // place) or any drag-on-ground gesture (xrextras-hold-drag needs
  // SLAM plane detection to follow a finger). When none of these are
  // present, world tracking stays off for faster image-only init.
  const needsWorld = objects.some(o =>
    o.imageToSlam ||
    (o.interactions && o.interactions.holdDrag));
  const xrwebAttr = needsWorld
    ? 'allowedDevices: any'
    : 'disableWorldTracking: true; allowedDevices: any';

  // xrextras-hold-drag looks up an entity with id="ground" to drag
  // along. Always emit one when world tracking is enabled (invisible
  // shadow plane works for both purposes).
  const groundEl = needsWorld
    ? `<a-box id="ground" class="cantap" scale="1000 2 1000" position="0 -1 0" material="shader: shadow; transparent: true; opacity: 0" shadow></a-box>`
    : '';

  const html = `
    <a-scene
      xrextras-gesture-detector
      xrweb="${xrwebAttr}"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      style="width:100%;height:100vh">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"
        ${needsWorld ? 'raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;"' : ''}></a-camera>
      <a-light type="ambient" intensity="${ambInt}"></a-light>
      <a-light type="directional" intensity="${dirInt}" position="2 4 3"></a-light>
      ${groundEl}

      ${targetEntities}
      ${slamRootEntities}
    </a-scene>`;

  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0';
  container.innerHTML = html;
  document.body.appendChild(container);
  arScene = container.querySelector('a-scene');

  arScene.addEventListener('loaded', () => {
    hideSplash(); showARUI(); buildAnimBar(objects);
    // Wire target-audio-control on entities marked with data-audio-on-target
    arScene.querySelectorAll('[data-audio-on-target]').forEach(el => {
      const targetEl = el.closest('xrextras-named-image-target');
      const tName = targetEl?.getAttribute('name') || '';
      const fIn = parseFloat(el.getAttribute('data-fade-in')) || 0.5;
      const fOut = parseFloat(el.getAttribute('data-fade-out')) || 1.0;
      el.setAttribute('target-audio-control', `targetName: ${tName}; fadeIn: ${fIn}; fadeOut: ${fOut}`);
    });
  });

  // Listen for image target events
  const targetNames = APP.targets.map(t => t.name);
  const foundTargets = new Set();
  const hintEl = el('scan-hint');
  hintEl.textContent = 'Point camera at image target';

  arScene.addEventListener('loaded', () => {
    if (!window.XR8) return;
    const onFound = (e) => {
      foundTargets.add(e.detail?.name || e.name);
      hintEl.classList.add('hidden');
    };
    const onLost = (e) => {
      foundTargets.delete(e.detail?.name || e.name);
      if (foundTargets.size === 0) hintEl.classList.remove('hidden');
    };
    // XR8 engine events
    try {
      arScene.addEventListener('xrimagefound', onFound);
      arScene.addEventListener('xrimagelost', onLost);
    } catch(e) {}
  });
}

async function loadMindAR(objects, mindUrl) {
  try {
    setSplashStatus('Loading image tracker…');
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js';
    document.head.appendChild(s);
    await new Promise((res,rej) => { s.onload=res; s.onerror=rej; });
  } catch(e) { showError('Load failed', 'Could not load MindAR.'); return; }

  const entities = objects.map((o,i) => buildEntity(o,i)).join('\n');

  const html = `
    <a-scene
      mindar-image="imageTargetSrc: ${mindUrl}; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;
        filterMinCF: 0.001; filterBeta: 1000; missTolerance: 5; warmupTolerance: 5;"
      renderer="colorManagement: true; physicallyCorrectLights: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      style="width:100%;height:100vh">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-light type="ambient" intensity="${APP.ambientIntensity ?? 0.8}"></a-light>
      <a-light type="directional" intensity="${APP.directIntensity ?? 1.0}" position="2 4 3"></a-light>

      <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
        <a-entity rotation="90 0 0">
          ${entities}
        </a-entity>
      </a-entity>
    </a-scene>`;

  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0';
  container.innerHTML = html;
  document.body.appendChild(container);
  arScene = container.querySelector('a-scene');

  arScene.addEventListener('loaded', () => { hideSplash(); showARUI(); buildAnimBar(objects); });

  const target = arScene.querySelector('#ar-target');
  if (target) {
    target.addEventListener('targetFound', () => el('scan-hint').classList.add('hidden'));
    target.addEventListener('targetLost', () => el('scan-hint').classList.remove('hidden'));
  }
}

// ═══════════════════════════════════════════════════════════
// FACE TRACKING (8th Wall)
// ═══════════════════════════════════════════════════════════
function buildFace() {
  const objects = getObjects();
  if (!objects.length) { showError('Empty', 'No models.'); return; }

  const entities = objects.map((o,i) => {
    const facePoint = o.interactions?.facePoint || 'forehead';
    return `<a-entity xrextras-face-attachment="point: ${facePoint}">${buildEntity(o,i)}</a-entity>`;
  }).join('\n');

  const html = `
    <a-scene
      xrface="allowedDevices: any"
      xrextras-gesture-detector
      renderer="colorManagement: true">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-light type="ambient" intensity="1.0"></a-light>
      <a-light type="directional" intensity="0.6" position="0 2 2"></a-light>

      <a-entity xrextras-faceanchor="index: 0">
        ${entities}
      </a-entity>
    </a-scene>`;

  mountScene(html, objects, 'Position your face in camera');
}

// ═══════════════════════════════════════════════════════════
// MOUNT SCENE (shared for SLAM + Face)
// ═══════════════════════════════════════════════════════════
function mountScene(html, objects, hint) {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0';
  container.innerHTML = html;
  document.body.appendChild(container);
  arScene = container.querySelector('a-scene');
  el('scan-hint').textContent = hint;

  arScene.addEventListener('loaded', () => {
    hideSplash();
    showARUI();
    buildAnimBar(objects);
  });
}

// ═══════════════════════════════════════════════════════════
// ANIMATION BAR
// ═══════════════════════════════════════════════════════════
function buildAnimBar(objects) {
  const bar = el('anim-bar');
  bar.innerHTML = '';
  const first = objects[0];
  const clips = first?.clips || [];
  if (clips.length < 2) return;
  clips.forEach(name => {
    const pill = document.createElement('button');
    pill.className = 'anim-pill' + (name === first?.defaultAnim ? ' active' : '');
    pill.textContent = name;
    pill.onclick = () => {
      const m = arScene?.querySelector('a-gltf-model');
      if (m) m.setAttribute('animation-mixer', `clip: ${name}; loop: ${first.loop||'repeat'}; crossFadeDuration: 0.4`);
      bar.querySelectorAll('.anim-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    };
    bar.appendChild(pill);
  });
}
