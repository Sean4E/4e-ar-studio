<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>4E AR Player</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<script src="config.js"></script>
<!-- Firebase (metadata only) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<!-- 8th Wall Engine (SLAM, Image Targets, Face Effects — all devices) -->
<script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
<script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam,face"></script>
<!-- A-Frame Extras (animation-mixer for GLB animations) -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#060a18;--purple:#8b5cf6;--purple2:#a78bfa;--cyan:#22d3ee;--text:#e2e8f0;--muted:#8899b0}
body{background:var(--navy);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;height:100vh;width:100vw}
/* Splash */
#splash{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .4s}
#splash.hidden{opacity:0;pointer-events:none}
.splash-logo{font-size:48px;margin-bottom:16px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.splash-name{font-size:20px;font-weight:700;margin-bottom:8px}
.splash-status{font-size:13px;color:var(--muted)}
/* Error */
#error-screen{position:fixed;inset:0;background:var(--navy);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:40px;text-align:center}
#error-screen.show{display:flex}
.err-title{font-size:20px;font-weight:700;margin-bottom:8px;color:#f87171}
.err-msg{font-size:14px;color:var(--muted);max-width:320px}
/* AR UI Overlay */
#ar-ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:none}
#ar-ui.show{display:block}
.ar-top{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;pointer-events:auto;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent)}
.ar-title{font-size:14px;font-weight:700}
.ar-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer}
#scan-hint{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;white-space:nowrap}
/* Anim pills */
#anim-bar{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:auto}
.anim-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-family:'Syne',sans-serif;cursor:pointer}
.anim-pill.active{background:var(--purple);border-color:var(--purple)}
/* AR container */
#ar-container{position:fixed;inset:0;display:none}
#ar-container.show{display:block}
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <div class="splash-logo">◈</div>
  <div class="splash-name" id="splash-name">Loading…</div>
  <div class="splash-status" id="splash-status">Connecting…</div>
</div>

<!-- Error Screen -->
<div id="error-screen">
  <div style="font-size:48px;margin-bottom:16px">⚠️</div>
  <div class="err-title" id="err-title">Error</div>
  <div class="err-msg" id="err-msg">Something went wrong.</div>
</div>

<!-- AR UI Overlay -->
<div id="ar-ui">
  <div class="ar-top">
    <span class="ar-title" id="ar-title">AR Experience</span>
    <button class="ar-close" onclick="exitAR()">✕</button>
  </div>
  <div id="scan-hint">Point camera at target image</div>
  <div id="anim-bar"></div>
</div>

<!-- AR Scene Container -->
<div id="ar-container"></div>

<script>
const el = id => document.getElementById(id);
let APP = null, arScene = null;

function setSplashStatus(msg) { el('splash-status').textContent = msg; }
function hideSplash() { el('splash').classList.add('hidden'); }
function showError(title, msg) { el('err-title').textContent = title; el('err-msg').textContent = msg; el('error-screen').classList.add('show'); el('splash').classList.add('hidden'); }
function showARUI() { el('ar-ui').classList.add('show'); }
function exitAR() { location.reload(); }

function getFirebaseConfig() {
  const w = window.AR_FIREBASE_CONFIG;
  if (w && w.apiKey && !w.apiKey.includes('YOUR_')) return w;
  const ls = localStorage.getItem('4e-ar-fb');
  if (ls) try { return JSON.parse(ls); } catch(e){}
  return null;
}

// ─── Init ─────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);
  const appId = params.get('id');
  if (!appId) { showError('No App ID', 'Scan a valid 4E AR QR code.'); return; }

  setSplashStatus('Loading Firebase…');
  const cfg = getFirebaseConfig();
  if (!cfg) { showError('Not configured', 'Firebase credentials not found.'); return; }

  try {
    firebase.initializeApp(cfg);
    const db = firebase.firestore();
    setSplashStatus('Fetching experience…');
    const doc = await db.collection('ar_apps').doc(appId).get();
    if (!doc.exists) { showError('Not found', 'This experience does not exist.'); return; }

    APP = doc.data();
    APP.id = appId;
    el('splash-name').textContent = APP.name || 'AR Experience';
    el('ar-title').textContent = APP.name || 'AR Experience';

    const mode = APP.trackingMode || 'image';
    setSplashStatus('Starting AR…');

    // Wait for 8th Wall engine to load
    await waitForXR8();

    if (mode === 'image') {
      buildImageScene();
    } else if (mode === 'slam') {
      buildSLAMScene();
    } else if (mode === 'face') {
      buildFaceScene();
    } else {
      buildSLAMScene(); // Default to SLAM
    }

  } catch (e) {
    showError('Load error', e.message);
  }
}

function waitForXR8() {
  return new Promise((resolve) => {
    const check = () => {
      if (window.XR8) { resolve(); return; }
      setTimeout(check, 100);
    };
    check();
    setTimeout(() => resolve(), 15000); // 15s timeout
  });
}

// ─── Build Objects ────────────────────────────────────────
function getObjects() {
  if (APP.objects && APP.objects.length) {
    return APP.objects.filter(o => o.glbUrl && o.visible !== false);
  } else if (APP.glbUrl) {
    return [{
      id:'legacy', glbUrl:APP.glbUrl,
      transform:{ position:{x:APP.posX||0,y:APP.posY||0,z:APP.posZ||0}, rotation:{x:APP.rotX||0,y:APP.rotY||0,z:APP.rotZ||0}, scale:{x:APP.scale||1,y:APP.scale||1,z:APP.scale||1} },
      defaultAnim:APP.defaultAnimation||'', loop:APP.loopMode||'repeat', clips:APP.animations||[], presets:{}
    }];
  }
  return [];
}

function buildEntityHTML(objects) {
  let assets = '', entities = '';
  objects.forEach((obj, i) => {
    const t = obj.transform || {position:{x:0,y:0,z:0},rotation:{x:0,y:0,z:0},scale:{x:1,y:1,z:1}};
    const pos = `${t.position.x} ${t.position.y} ${t.position.z}`;
    const rot = `${t.rotation.x} ${t.rotation.y} ${t.rotation.z}`;
    const sc = `${t.scale.x} ${t.scale.y} ${t.scale.z}`;

    let animAttr = '';
    if (obj.defaultAnim && obj.loop !== 'none') {
      animAttr = `animation-mixer="clip: ${obj.defaultAnim}; loop: ${obj.loop||'repeat'}; crossFadeDuration: 0.4"`;
    } else if (obj.clips?.length) {
      animAttr = `animation-mixer="clip: *; loop: repeat; crossFadeDuration: 0.4"`;
    }

    // Preset animations
    let presetAttrs = '';
    const p = obj.presets || {};
    if (p.spin) {
      const dur = Math.round(2000/(p.spin.speed||1));
      const axis = p.spin.axis||'y';
      const from = t.rotation[axis]||0;
      presetAttrs += ` animation__spin="property: rotation.${axis}; from: ${from}; to: ${parseFloat(from)+360}; dur: ${dur}; loop: true; easing: linear"`;
    }
    if (p.bob) {
      const h = p.bob.height||0.05, dur = Math.round(2000/(p.bob.speed||2));
      presetAttrs += ` animation__bob="property: position.y; from: ${t.position.y-h}; to: ${t.position.y+h}; dur: ${dur}; loop: true; dir: alternate; easing: easeInOutSine"`;
    }
    if (p.pulse) {
      const a = p.pulse.amount||0.08, dur = Math.round(2000/(p.pulse.speed||3)), s = t.scale.x;
      presetAttrs += ` animation__pulse="property: scale; from: ${s*(1-a)} ${s*(1-a)} ${s*(1-a)}; to: ${s*(1+a)} ${s*(1+a)} ${s*(1+a)}; dur: ${dur}; loop: true; dir: alternate; easing: easeInOutSine"`;
    }

    // Interaction attributes
    let ixAttrs = '';
    const ix = obj.interactions || {};
    if (ix.faceCamera) ixAttrs += ' look-at="[camera]"';
    if (ix.castShadow !== false) ixAttrs += ' shadow="cast: true"';

    assets += `<a-asset-item id="m${i}" src="${obj.glbUrl}"></a-asset-item>\n`;
    entities += `<a-gltf-model id="gltf-${i}" class="clickable" src="#m${i}" position="${pos}" rotation="${rot}" scale="${sc}" ${animAttr}${presetAttrs}${ixAttrs} data-ix='${JSON.stringify(ix)}'></a-gltf-model>\n`;
  });
  return { assets, entities };
}

// ─── IMAGE TARGET (8th Wall) ──────────────────────────────
function buildImageScene() {
  const objects = getObjects();
  if (!objects.length) { showError('No models', 'No 3D models in this experience.'); return; }

  const mindUrl = APP.mindUrl || APP.target?.mindUrl || '';
  if (!mindUrl) { showError('No target', 'No image target configured.'); return; }

  const { assets, entities } = buildEntityHTML(objects);

  // For 8th Wall image targets, we use xrweb + xrimagefound events
  // But 8th Wall uses its own .8w image target format, not MindAR .mind
  // So for image target mode, we fall back to MindAR which uses .mind files
  // 8th Wall image targets would need recompilation in .8w format
  // For now: load MindAR dynamically for image mode
  loadMindARImageScene(mindUrl, assets, entities, objects);
}

async function loadMindARImageScene(mindUrl, assets, entities, objects) {
  // Load MindAR for image tracking (8th Wall uses different target format)
  try {
    // Replace 8-Frame with standard A-Frame for MindAR compatibility
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js';
    document.head.appendChild(script);
    await new Promise((res, rej) => { script.onload = res; script.onerror = rej; });
  } catch(e) {
    showError('Load failed', 'Could not load MindAR library.');
    return;
  }

  const html = `
    <a-scene
      mindar-image="imageTargetSrc: ${mindUrl}; autoStart: true; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.001; filterBeta: 1000; missTolerance: 5; warmupTolerance: 5;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      style="width:100%;height:100vh">
      <a-assets timeout="30000">${assets}</a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" intensity="1.0" position="2 4 3"></a-light>
      <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
        <a-entity rotation="90 0 0">${entities}</a-entity>
      </a-entity>
    </a-scene>`;

  const container = el('ar-container');
  container.innerHTML = html;
  container.classList.add('show');
  arScene = container.querySelector('a-scene');

  arScene.addEventListener('loaded', () => { hideSplash(); showARUI(); buildAnimBar(objects); setupInteractions(); });

  const target = arScene.querySelector('#ar-target');
  if (target) {
    target.addEventListener('targetFound', () => { el('scan-hint').classList.add('hidden'); });
    target.addEventListener('targetLost', () => { el('scan-hint').classList.remove('hidden'); });
  }
}

// ─── SLAM / WORLD TRACKING (8th Wall) ────────────────────
function buildSLAMScene() {
  const objects = getObjects();
  if (!objects.length) { showError('No models', 'No 3D models in this experience.'); return; }

  const { assets, entities } = buildEntityHTML(objects);
  const ambInt = APP.ambientIntensity ?? 0.8;
  const dirInt = APP.directIntensity ?? 1.0;
  const showShadow = APP.shadowCatcher !== false;

  const html = `
    <a-scene
      xrweb="allowedDevices: any; disableWorldTracking: false"
      renderer="colorManagement: true; physicallyCorrectLights: true; shadowMapEnabled: true"
      style="width:100%;height:100vh">
      <a-assets timeout="30000">${assets}</a-assets>
      <a-camera id="camera" position="0 4 4" raycaster="objects: .clickable" cursor="fuse: false; rayOrigin: mouse;"></a-camera>
      <a-light type="ambient" intensity="${ambInt}"></a-light>
      <a-light type="directional" intensity="${dirInt}" position="2 5 3" castShadow="true"
               shadow="mapSize: 2048 2048; camera: top 20; bottom -20; left -20; right 20"
               xrextras-attach="target: camera; offset: 2 5 3"></a-light>
      ${showShadow ? '<a-box id="shadow-catcher" class="ground" scale="1000 0.01 1000" position="0 -0.005 0" material="shader: shadow; transparent: true; opacity: 0.3" shadow="receive: true"></a-box>' : ''}
      <a-entity id="model-container">${entities}</a-entity>
    </a-scene>`;

  const container = el('ar-container');
  container.innerHTML = html;
  container.classList.add('show');
  arScene = container.querySelector('a-scene');

  arScene.addEventListener('loaded', () => {
    hideSplash();
    showARUI();
    el('scan-hint').textContent = 'Look around to detect surfaces';
    buildAnimBar(objects);
  });
}

// ─── FACE TRACKING (8th Wall) ─────────────────────────────
function buildFaceScene() {
  const objects = getObjects();
  if (!objects.length) { showError('No models', 'No 3D models in this experience.'); return; }

  const { assets, entities } = buildEntityHTML(objects);

  const html = `
    <a-scene
      xrface="allowedDevices: any"
      renderer="colorManagement: true; physicallyCorrectLights: true;"
      style="width:100%;height:100vh">
      <a-assets timeout="30000">${assets}</a-assets>
      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-light type="ambient" intensity="1.0"></a-light>
      <a-light type="directional" intensity="0.8" position="0 2 2"></a-light>
      <a-entity xrextras-face-anchor="index: 0" id="face-anchor">
        ${entities}
      </a-entity>
    </a-scene>`;

  const container = el('ar-container');
  container.innerHTML = html;
  container.classList.add('show');
  arScene = container.querySelector('a-scene');

  arScene.addEventListener('loaded', () => {
    hideSplash();
    showARUI();
    el('scan-hint').textContent = 'Position your face in the camera';
    buildAnimBar(objects);
  });
}

// ─── Animation Bar ────────────────────────────────────────
function buildAnimBar(objects) {
  const bar = el('anim-bar');
  bar.innerHTML = '';
  const first = objects[0];
  const clips = first?.clips || [];
  const defaultClip = first?.defaultAnim || '';
  if (clips.length < 2) return;

  clips.forEach(name => {
    const pill = document.createElement('button');
    pill.className = 'anim-pill' + (name === defaultClip ? ' active' : '');
    pill.textContent = name;
    pill.onclick = () => {
      playAnim(name, first.loop);
      bar.querySelectorAll('.anim-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    };
    bar.appendChild(pill);
  });
}

function playAnim(clipName, loopMode) {
  if (!arScene) return;
  const model = arScene.querySelector('a-gltf-model');
  if (!model) return;
  const loop = loopMode === 'once' ? 'once' : 'repeat';
  model.setAttribute('animation-mixer', `clip: ${clipName}; loop: ${loop}; crossFadeDuration: 0.4`);
}

// ─── Interaction Runtime ──────────────────────────────────
function setupInteractions() {
  if (!arScene) return;
  const models = arScene.querySelectorAll('.clickable');

  models.forEach(model => {
    let ix = {};
    try { ix = JSON.parse(model.dataset.ix || '{}'); } catch(e){}

    // Tap to toggle animation
    if (ix.tapToggleAnim) {
      let playing = true;
      model.addEventListener('click', () => {
        const mixer = model.getAttribute('animation-mixer');
        if (playing) {
          model.setAttribute('animation-mixer', 'timeScale: 0');
        } else {
          model.setAttribute('animation-mixer', mixer ? mixer.replace('timeScale: 0','timeScale: 1') : 'timeScale: 1');
        }
        playing = !playing;
      });
    }

    // Tap to open URL
    if (ix.tapOpenUrl && ix.tapUrl) {
      model.addEventListener('click', () => {
        window.open(ix.tapUrl, '_blank');
      });
    }

    // Pinch to scale
    if (ix.pinchScale) {
      let startScale = 1;
      model.sceneEl.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
          startScale = model.object3D.scale.x;
        }
      });
      model.sceneEl.addEventListener('touchmove', e => {
        if (e.touches.length === 2) {
          const dx = e.touches[0].pageX - e.touches[1].pageX;
          const dy = e.touches[0].pageY - e.touches[1].pageY;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const s = Math.max(0.1, Math.min(5, startScale * (dist / 200)));
          model.object3D.scale.set(s, s, s);
        }
      });
    }

    // Drag to rotate
    if (ix.dragRotate) {
      let lastX = 0;
      model.sceneEl.addEventListener('touchstart', e => {
        if (e.touches.length === 1) lastX = e.touches[0].pageX;
      });
      model.sceneEl.addEventListener('touchmove', e => {
        if (e.touches.length === 1) {
          const dx = e.touches[0].pageX - lastX;
          lastX = e.touches[0].pageX;
          model.object3D.rotation.y += dx * 0.01;
        }
      });
    }
  });
}

// ─── Start ────────────────────────────────────────────────
function loadScript(src) { return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
