<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>4E AR Player</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<script src="config.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<!-- 8th Wall Engine + 8-Frame (modified A-Frame) + XR Extras -->
<script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1.0.0-alpha.0/dist/xrextras.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam,face"></script>
<!-- Animation mixer for GLB animations -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#060a18;--purple:#8b5cf6;--text:#e2e8f0;--muted:#8899b0}
body{background:var(--navy);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;height:100vh;width:100vw}
#splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity .5s}
#splash.hidden{opacity:0;pointer-events:none}
.splash-logo{font-size:48px;margin-bottom:12px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.splash-name{font-size:20px;font-weight:700;margin-bottom:6px}
.splash-sub{font-size:13px;opacity:.6;margin-bottom:12px}
.splash-status{font-size:12px;color:var(--muted)}
#error-screen{position:fixed;inset:0;background:var(--navy);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:40px;text-align:center}
#error-screen.show{display:flex}
.err-title{font-size:20px;font-weight:700;color:#f87171;margin-bottom:8px}
.err-msg{font-size:14px;color:var(--muted);max-width:320px}
#ar-ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:none}
#ar-ui.show{display:block}
.ar-top{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;pointer-events:auto;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent)}
.ar-title{font-size:14px;font-weight:700}
.ar-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer}
#scan-hint{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;padding:7px 18px;border-radius:18px;font-size:12px;white-space:nowrap;transition:opacity .3s}
#scan-hint.hidden{opacity:0}
#anim-bar{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:auto}
.anim-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 13px;border-radius:18px;font-size:11px;font-family:'Syne',sans-serif;cursor:pointer}
.anim-pill.active{background:var(--purple);border-color:var(--purple)}
</style>
</head>
<body>

<div id="splash" style="background:var(--navy)">
  <div class="splash-logo">◈</div>
  <div class="splash-name" id="splash-name">Loading…</div>
  <div class="splash-sub" id="splash-sub"></div>
  <div class="splash-status" id="splash-status">Connecting…</div>
</div>

<div id="error-screen">
  <div style="font-size:48px;margin-bottom:16px">⚠️</div>
  <div class="err-title" id="err-title">Error</div>
  <div class="err-msg" id="err-msg"></div>
</div>

<div id="ar-ui">
  <div class="ar-top">
    <span class="ar-title" id="ar-title">AR</span>
    <button class="ar-close" onclick="location.reload()">✕</button>
  </div>
  <div id="scan-hint">Point camera at target</div>
  <div id="anim-bar"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const el = id => document.getElementById(id);
let APP = null, arScene = null;

function setSplashStatus(msg) { el('splash-status').textContent = msg; }
function hideSplash() { el('splash').classList.add('hidden'); }
function showError(t, m) { el('err-title').textContent = t; el('err-msg').textContent = m; el('error-screen').classList.add('show'); hideSplash(); }
function showARUI() { el('ar-ui').classList.add('show'); }

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  const appId = new URLSearchParams(location.search).get('id');
  if (!appId) { showError('No App ID', 'Scan a valid 4E AR QR code.'); return; }

  setSplashStatus('Connecting…');
  const cfg = window.AR_FIREBASE_CONFIG;
  if (!cfg?.apiKey) { showError('Config missing', 'Firebase not configured.'); return; }

  try {
    firebase.initializeApp(cfg);
    const db = firebase.firestore();
    setSplashStatus('Loading experience…');
    const doc = await db.collection('ar_apps').doc(appId).get();
    if (!doc.exists) { showError('Not found', 'Experience does not exist.'); return; }

    APP = doc.data();
    APP.id = appId;

    // Custom splash
    applySplash(APP);

    setSplashStatus('Waiting for AR engine…');
    await waitForXR8(12000);

    const mode = APP.trackingMode || 'image';
    setSplashStatus('Building scene…');

    if (mode === 'slam') buildSLAM();
    else if (mode === 'face') buildFace();
    else buildImage();

  } catch(e) { showError('Error', e.message); }
}

function waitForXR8(timeout=10000) {
  return new Promise(res => {
    if (window.XR8) { res(); return; }
    const t0 = Date.now();
    const check = () => {
      if (window.XR8 || Date.now()-t0 > timeout) { res(); return; }
      setTimeout(check, 100);
    };
    check();
  });
}

function applySplash(app) {
  const sp = app.splash || {};
  const splash = el('splash');
  if (sp.bgColor) splash.style.background = sp.bgColor;
  if (sp.textColor) { el('splash-name').style.color = sp.textColor; el('splash-status').style.color = sp.textColor; }
  if (sp.logoUrl) splash.querySelector('.splash-logo').innerHTML = `<img src="${sp.logoUrl}" style="max-height:56px">`;
  el('splash-name').textContent = sp.title || app.name || 'AR Experience';
  if (sp.subtitle) el('splash-sub').textContent = sp.subtitle;
  el('ar-title').textContent = sp.title || app.name || 'AR';
}

// ═══════════════════════════════════════════════════════════
// OBJECT BUILDER (shared across all modes)
// ═══════════════════════════════════════════════════════════
function getObjects() {
  if (APP.objects?.length) return APP.objects.filter(o => o.glbUrl && o.visible !== false);
  if (APP.glbUrl) return [{
    id:'legacy', glbUrl:APP.glbUrl,
    transform:{ position:{x:APP.posX||0,y:APP.posY||0,z:APP.posZ||0}, rotation:{x:APP.rotX||0,y:APP.rotY||0,z:APP.rotZ||0}, scale:{x:APP.scale||1,y:APP.scale||1,z:APP.scale||1} },
    defaultAnim:APP.defaultAnimation||'', loop:APP.loopMode||'repeat', clips:APP.animations||[], presets:{}, interactions:{}
  }];
  return [];
}

function buildAssets(objects) {
  return objects.map((o,i) => `<a-asset-item id="m${i}" src="${o.glbUrl}"></a-asset-item>`).join('\n');
}

function buildEntity(obj, i) {
  const t = obj.transform || {position:{x:0,y:0,z:0},rotation:{x:0,y:0,z:0},scale:{x:1,y:1,z:1}};
  const pos = `${t.position.x} ${t.position.y} ${t.position.z}`;
  const rot = `${t.rotation.x} ${t.rotation.y} ${t.rotation.z}`;
  const sc = `${t.scale.x} ${t.scale.y} ${t.scale.z}`;

  // GLB animation
  let attrs = '';
  if (obj.defaultAnim && obj.loop !== 'none') {
    attrs += ` animation-mixer="clip: ${obj.defaultAnim}; loop: ${obj.loop||'repeat'}; crossFadeDuration: 0.4"`;
  } else if (obj.clips?.length) {
    attrs += ` animation-mixer="clip: *; loop: repeat"`;
  }

  // Preset animations
  const p = obj.presets || {};
  if (p.spin) {
    const dur = Math.round(2000/(p.spin.speed||1));
    const axis = p.spin.axis||'y';
    attrs += ` animation__spin="property: rotation.${axis}; from: ${t.rotation[axis]||0}; to: ${(parseFloat(t.rotation[axis])||0)+360}; dur: ${dur}; loop: true; easing: linear"`;
  }
  if (p.bob) {
    const h = p.bob.height||0.05, dur = Math.round(2000/(p.bob.speed||2));
    attrs += ` animation__bob="property: position.y; from: ${t.position.y-h}; to: ${t.position.y+h}; dur: ${dur}; loop: true; dir: alternate; easing: easeInOutSine"`;
  }
  if (p.pulse) {
    const a = p.pulse.amount||0.08, dur = Math.round(2000/(p.pulse.speed||3)), s = t.scale.x;
    attrs += ` animation__pulse="property: scale; from: ${s*(1-a)} ${s*(1-a)} ${s*(1-a)}; to: ${s*(1+a)} ${s*(1+a)} ${s*(1+a)}; dur: ${dur}; loop: true; dir: alternate; easing: easeInOutSine"`;
  }

  // 8th Wall native interactions from legacy interactions{} field
  const ix = obj.interactions || {};
  if (ix.holdDrag) attrs += ' xrextras-hold-drag';
  if (ix.pinchScale) attrs += ' xrextras-pinch-scale';
  if (ix.oneFingerRotate) attrs += ' xrextras-one-finger-rotate';
  if (ix.twoFingerRotate) attrs += ' xrextras-two-finger-rotate';
  if (ix.autoSpin) attrs += ' xrextras-spin';
  if (ix.faceCamera) attrs += ' look-at="[camera]"';
  if (ix.castShadow !== false) attrs += ' shadow="cast: true"';

  // xrComponents{} — new format with config values
  const xr = obj.xrComponents || {};
  Object.entries(xr).forEach(([key, config]) => {
    // Skip if already added from interactions above
    if (attrs.includes(key)) return;
    if (config === true) {
      attrs += ` ${key}`;
    } else if (config && typeof config === 'object') {
      const pairs = Object.entries(config).map(([k,v]) => `${k}: ${v}`).join('; ');
      if (pairs) {
        attrs += ` ${key}="${pairs}"`;
      } else {
        attrs += ` ${key}`;
      }
    }
  });

  return `<a-gltf-model id="gltf-${i}" class="cantap" src="#m${i}" position="${pos}" rotation="${rot}" scale="${sc}"${attrs}></a-gltf-model>`;
}

// ═══════════════════════════════════════════════════════════
// SLAM / WORLD TRACKING
// ═══════════════════════════════════════════════════════════
function buildSLAM() {
  const objects = getObjects();
  if (!objects.length) { showError('Empty', 'No models in this experience.'); return; }

  const ambInt = APP.ambientIntensity ?? 0.5;
  const dirInt = APP.directIntensity ?? 0.8;
  const showShadow = APP.shadowCatcher !== false;

  const entities = objects.map((o,i) => buildEntity(o,i)).join('\n');

  const html = `
    <a-scene
      xrextras-gesture-detector
      xrweb="allowedDevices: any"
      renderer="colorManagement: true">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera id="camera" position="0 8 0"
        raycaster="objects: .cantap"
        cursor="fuse: false; rayOrigin: mouse;">
      </a-camera>

      <!-- Directional light following camera with shadows -->
      <a-entity
        light="type: directional; intensity: ${dirInt}; castShadow: true;
          shadowMapHeight: 2048; shadowMapWidth: 2048;
          shadowCameraTop: 20; shadowCameraBottom: -20;
          shadowCameraRight: 20; shadowCameraLeft: -20;
          target: #camera"
        xrextras-attach="target: camera; offset: 8 15 4"
        shadow>
      </a-entity>

      <a-light type="ambient" intensity="${ambInt}"></a-light>

      ${showShadow ? `
      <a-box id="ground" class="cantap"
        scale="1000 2 1000" position="0 -1 0"
        material="shader: shadow; transparent: true; opacity: 0.4"
        shadow>
      </a-box>` : ''}

      ${entities}
    </a-scene>`;

  mountScene(html, objects, 'Look around to detect surfaces');
}

// ═══════════════════════════════════════════════════════════
// IMAGE TRACKING (8th Wall native or MindAR fallback)
// ═══════════════════════════════════════════════════════════
function buildImage() {
  const objects = getObjects();
  if (!objects.length) { showError('Empty', 'No models.'); return; }

  const mindUrl = APP.mindUrl || APP.target?.mindUrl || '';
  if (!mindUrl) { showError('No target', 'No image target configured.'); return; }

  // Use MindAR for .mind file compatibility
  loadMindAR(objects, mindUrl);
}

async function loadMindAR(objects, mindUrl) {
  try {
    setSplashStatus('Loading image tracker…');
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js';
    document.head.appendChild(s);
    await new Promise((res,rej) => { s.onload=res; s.onerror=rej; });
  } catch(e) { showError('Load failed', 'Could not load MindAR.'); return; }

  const entities = objects.map((o,i) => buildEntity(o,i)).join('\n');

  const html = `
    <a-scene
      mindar-image="imageTargetSrc: ${mindUrl}; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;
        filterMinCF: 0.001; filterBeta: 1000; missTolerance: 5; warmupTolerance: 5;"
      renderer="colorManagement: true; physicallyCorrectLights: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      style="width:100%;height:100vh">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-light type="ambient" intensity="${APP.ambientIntensity ?? 0.8}"></a-light>
      <a-light type="directional" intensity="${APP.directIntensity ?? 1.0}" position="2 4 3"></a-light>

      <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
        <a-entity rotation="90 0 0">
          ${entities}
        </a-entity>
      </a-entity>
    </a-scene>`;

  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0';
  container.innerHTML = html;
  document.body.appendChild(container);
  arScene = container.querySelector('a-scene');

  arScene.addEventListener('loaded', () => { hideSplash(); showARUI(); buildAnimBar(objects); });

  const target = arScene.querySelector('#ar-target');
  if (target) {
    target.addEventListener('targetFound', () => el('scan-hint').classList.add('hidden'));
    target.addEventListener('targetLost', () => el('scan-hint').classList.remove('hidden'));
  }
}

// ═══════════════════════════════════════════════════════════
// FACE TRACKING (8th Wall)
// ═══════════════════════════════════════════════════════════
function buildFace() {
  const objects = getObjects();
  if (!objects.length) { showError('Empty', 'No models.'); return; }

  const entities = objects.map((o,i) => {
    const facePoint = o.interactions?.facePoint || 'forehead';
    return `<a-entity xrextras-face-attachment="point: ${facePoint}">${buildEntity(o,i)}</a-entity>`;
  }).join('\n');

  const html = `
    <a-scene
      xrface="allowedDevices: any"
      xrextras-gesture-detector
      renderer="colorManagement: true">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-light type="ambient" intensity="1.0"></a-light>
      <a-light type="directional" intensity="0.6" position="0 2 2"></a-light>

      <a-entity xrextras-faceanchor="index: 0">
        ${entities}
      </a-entity>
    </a-scene>`;

  mountScene(html, objects, 'Position your face in camera');
}

// ═══════════════════════════════════════════════════════════
// MOUNT SCENE (shared for SLAM + Face)
// ═══════════════════════════════════════════════════════════
function mountScene(html, objects, hint) {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0';
  container.innerHTML = html;
  document.body.appendChild(container);
  arScene = container.querySelector('a-scene');
  el('scan-hint').textContent = hint;

  arScene.addEventListener('loaded', () => {
    hideSplash();
    showARUI();
    buildAnimBar(objects);
  });
}

// ═══════════════════════════════════════════════════════════
// ANIMATION BAR
// ═══════════════════════════════════════════════════════════
function buildAnimBar(objects) {
  const bar = el('anim-bar');
  bar.innerHTML = '';
  const first = objects[0];
  const clips = first?.clips || [];
  if (clips.length < 2) return;
  clips.forEach(name => {
    const pill = document.createElement('button');
    pill.className = 'anim-pill' + (name === first?.defaultAnim ? ' active' : '');
    pill.textContent = name;
    pill.onclick = () => {
      const m = arScene?.querySelector('a-gltf-model');
      if (m) m.setAttribute('animation-mixer', `clip: ${name}; loop: ${first.loop||'repeat'}; crossFadeDuration: 0.4`);
      bar.querySelectorAll('.anim-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    };
    bar.appendChild(pill);
  });
}

// ═══════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
