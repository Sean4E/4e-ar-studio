<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a18">
<title>4E AR Player</title>
<meta name="version" content="3.4.2">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<script src="config.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<!-- 8th Wall Engine + 8-Frame (modified A-Frame) + XR Extras -->
<script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1.0.0-alpha.0/dist/xrextras.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam,face"></script>
<!-- Animation mixer for GLB animations -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#060a18;--purple:#8b5cf6;--text:#e2e8f0;--muted:#8899b0}
body{background:var(--navy);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;height:100vh;width:100vw}
/* Single-layer splash — NEVER has its DOM structure changed after first
   paint. applySplash() only updates text content and the logo's
   background-image URL (browsers swap bg-images seamlessly, unlike
   <img src> which goes blank during the swap). Colors transition via
   CSS custom properties. This avoids any layout reflow or frame drop
   during 8th Wall camera init. */
:root{--sp-bg:#060a18;--sp-text:#e2e8f0;--sp-accent:#8b5cf6}
#splash{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:opacity .5s ease,background .5s ease;background:var(--sp-bg);color:var(--sp-text)}
#splash.hidden{opacity:0;pointer-events:none}
#sp-logo{width:140px;height:56px;margin-bottom:14px;background-image:url(samples/logo_WHT.png);background-size:contain;background-position:center;background-repeat:no-repeat;opacity:.85}
#sp-title{font-size:20px;font-weight:700;font-family:'Syne',system-ui,sans-serif;text-align:center;padding:0 20px;line-height:1.3;min-height:26px}
#sp-subtitle{opacity:.4;font-size:12px;margin-top:6px;text-align:center;display:none}
#sp-spinner-row{margin-top:20px;display:flex;align-items:center;gap:6px}
#sp-spinner{width:16px;height:16px;border:2px solid transparent;border-top-color:var(--sp-accent);border-right-color:color-mix(in srgb,var(--sp-accent) 30%,transparent);border-bottom-color:color-mix(in srgb,var(--sp-accent) 30%,transparent);border-left-color:color-mix(in srgb,var(--sp-accent) 30%,transparent);border-radius:50%;animation:spin .8s linear infinite}
#sp-status{opacity:.3;font-size:11px}
#sp-branding{position:absolute;bottom:14px;font-size:10px;opacity:.45}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85}}
#error-screen{position:fixed;inset:0;background:var(--navy);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:40px;text-align:center}
#error-screen.show{display:flex}
.err-title{font-size:20px;font-weight:700;color:#f87171;margin-bottom:8px}
.err-msg{font-size:14px;color:var(--muted);max-width:320px}
#ar-ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:none}
#ar-ui.show{display:block}
.ar-top{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;pointer-events:auto;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent)}
.ar-title{font-size:14px;font-weight:700}
.ar-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer}
#scan-hint{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;padding:7px 18px;border-radius:18px;font-size:12px;white-space:nowrap;transition:opacity .3s}
#scan-hint.hidden{opacity:0}
#anim-bar{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:auto}
.anim-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 13px;border-radius:18px;font-size:11px;font-family:'Syne',sans-serif;cursor:pointer}
.anim-pill.active{background:var(--purple);border-color:var(--purple)}
</style>
<script>
// ─── Sync splash primer ─────────────────────────────────
// Runs BEFORE <body> paints. Reads cached splash config and sets CSS
// custom properties + a background-image preload, so the very first
// paint already has the project's branded colors and logo. No DOM
// mutation after this point = no layout shift during camera init.
(function() {
  try {
    var id = new URLSearchParams(location.search).get('id');
    if (!id) return;
    var cached = localStorage.getItem('4e-splash-' + id);
    if (!cached) return;
    var sp = JSON.parse(cached);
    var r = document.documentElement.style;
    if (sp.bgColor) r.setProperty('--sp-bg', sp.bgColor);
    if (sp.textColor) r.setProperty('--sp-text', sp.textColor);
    if (sp.accentColor) r.setProperty('--sp-accent', sp.accentColor);
    // Preload logo bytes so the background-image swap on paint is instant
    if (sp.logoUrl) { var img = new Image(); img.src = sp.logoUrl; }
    // Stash for body-phase script (title/subtitle/toggles/logo URL)
    window.__4E_CACHED_SPLASH = sp;
  } catch(e) {}
})();
</script>
</head>
<body>

<div id="splash">
  <!-- Single source of truth: this splash is ALWAYS the project's
       splash (as configured in the studio's splash editor). The
       studio editor defaults to 4E-style values, so uncustomized
       projects render a 4E-themed splash; customized projects render
       their own. There is no separate "default vs custom" flow. These
       stable-ID elements are populated from localStorage cache (first
       paint on repeat visits) and from Firestore (first-time visits)
       — applySplash() updates them in place without touching the DOM
       structure. -->
  <div id="sp-logo" role="img" aria-label="Logo"></div>
  <div id="sp-title"></div>
  <div id="sp-subtitle"></div>
  <div id="sp-spinner-row">
    <div id="sp-spinner"></div>
    <span id="sp-status" class="splash-status-text">Loading…</span>
  </div>
  <div id="sp-branding">Powered by 4E AR Studio</div>
</div>
<script>
// Apply cached splash content to stable-ID elements. Runs immediately
// after the splash DOM parses — before Firestore, before 8th Wall.
// Mutates text content / bg-image URL only; no structure change.
(function() {
  var sp = window.__4E_CACHED_SPLASH;
  if (!sp) return;
  var setText = function(id, v) { var e = document.getElementById(id); if (e && v) e.textContent = v; };
  var setShown = function(id, v) { var e = document.getElementById(id); if (!e) return; e.style.display = v ? '' : 'none'; };
  // Title: user-set title OR project name (matches applySplash fallback)
  setText('sp-title', sp.title || sp.name);
  if (sp.subtitle) { setText('sp-subtitle', sp.subtitle); setShown('sp-subtitle', true); }
  if (sp.logoUrl) {
    var logo = document.getElementById('sp-logo');
    if (logo) logo.style.backgroundImage = "url('" + sp.logoUrl.replace(/'/g, "\\'") + "')";
  }
  if (sp.showLogo === false) setShown('sp-logo', false);
  if (sp.showTitle === false) setShown('sp-title', false);
  if (sp.showSpinner === false) setShown('sp-spinner-row', false);
  if (sp.showBranding === false) setShown('sp-branding', false);
  // Apply gradient (fully opaque — never reveals the camera feed)
  if (sp.gradient && sp.bgColor) {
    var splashEl = document.getElementById('splash');
    var acc = sp.accentColor || '#8b5cf6';
    if (splashEl) splashEl.style.background =
      'linear-gradient(145deg,' + sp.bgColor + ',color-mix(in srgb,' + sp.bgColor + ' 72%,' + acc + '))';
  }
})();
</script>

<div id="error-screen">
  <div style="font-size:48px;margin-bottom:16px">⚠️</div>
  <div class="err-title" id="err-title">Error</div>
  <div class="err-msg" id="err-msg"></div>
</div>

<div id="ar-ui">
  <div class="ar-top">
    <span class="ar-title" id="ar-title">AR</span>
    <button class="ar-close" onclick="location.reload()">✕</button>
  </div>
  <div id="scan-hint">Point camera at target</div>
  <div id="anim-bar"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const PLAYER_VERSION = '3.4.2';
const el = id => document.getElementById(id);
let APP = null, arScene = null;

// Direct audio control — simple <audio> elements, controlled by image targets
// or as global ambient. Pauses/plays based on 8th Wall xrimagefound/xrimagelost
// or scene loaded events.
if (typeof AFRAME !== 'undefined') {

  // Ambient audio — registered, plays when iOS audio is unlocked
  AFRAME.registerComponent('ambient-audio-direct', {
    schema: {
      src: { type: 'string', default: '' },
      volume: { type: 'number', default: 0.5 },
      loop: { type: 'boolean', default: true }
    },
    init() {
      const src = this.data.src;
      if (!src) return;
      this._audio = document.createElement('audio');
      this._audio.src = src;
      this._audio.loop = this.data.loop;
      this._audio.volume = this.data.volume;
      this._audio.muted = true;  // start muted (matches button default)
      this._audio.preload = 'auto';
      this._audio.crossOrigin = 'anonymous';
      this._audio.autoplay = false;
      document.body.appendChild(this._audio);
      if (window._4E_AUDIO) window._4E_AUDIO.ambient.push(this._audio);
    },
    remove() { if (this._audio) { this._audio.pause(); this._audio.remove(); } }
  });

  AFRAME.registerComponent('target-audio-direct', {
    schema: {
      src: { type: 'string', default: '' },
      volume: { type: 'number', default: 0.8 },
      loop: { type: 'boolean', default: true },
      fadeIn: { type: 'number', default: 0.5 },
      fadeOut: { type: 'number', default: 1.0 }
    },
    init() {
      const src = this.data.src;
      if (!src) return;

      // Create <audio> element — paused, no autoplay, muted by default
      this._audio = document.createElement('audio');
      this._audio.src = src;
      this._audio.loop = this.data.loop;
      this._audio.volume = 0;
      this._audio.muted = true;  // start muted (matches button default)
      this._audio.preload = 'auto';
      this._audio.crossOrigin = 'anonymous';
      this._audio.autoplay = false;
      document.body.appendChild(this._audio);

      // Register so the global mute button can control it
      if (window._4E_AUDIO) window._4E_AUDIO.onTarget.push(this._audio);

      this._fadeId = null;
      this._isPlaying = false;

      // Find our target name from parent
      const targetEl = this.el.closest('xrextras-named-image-target');
      const tName = targetEl?.getAttribute('name') || '';
      this._targetName = tName;

      const onFound = (e) => {
        const n = e?.detail?.name || '';
        if (tName && n !== tName) return;
        this._play();
      };
      const onLost = (e) => {
        const n = e?.detail?.name || '';
        if (tName && n !== tName) return;
        this._stop();
      };

      // Wait for scene to be ready before listening
      const sceneEl = this.el.sceneEl;
      const attach = () => {
        sceneEl.addEventListener('xrimagefound', onFound);
        sceneEl.addEventListener('xrimagelost', onLost);
      };
      if (sceneEl.hasLoaded) attach();
      else sceneEl.addEventListener('loaded', attach);
    },
    _play() {
      if (!this._audio || this._isPlaying) return;
      this._isPlaying = true;
      this._audio.play().catch(err => {
        console.warn('[target-audio-direct] play failed:', err);
        this._isPlaying = false;
      });
      this._fadeTo(this.data.volume, this.data.fadeIn);
    },
    _stop() {
      if (!this._audio || !this._isPlaying) return;
      this._fadeTo(0, this.data.fadeOut, () => {
        this._audio.pause();
        this._isPlaying = false;
      });
    },
    _fadeTo(target, dur, done) {
      if (this._fadeId) clearInterval(this._fadeId);
      if (!this._audio || dur <= 0) {
        if (this._audio) this._audio.volume = target;
        if (done) done();
        return;
      }
      const start = this._audio.volume;
      const steps = Math.max(1, Math.round(dur * 20));
      let i = 0;
      this._fadeId = setInterval(() => {
        i++;
        this._audio.volume = Math.max(0, Math.min(1, start + (target - start) * (i / steps)));
        if (i >= steps) {
          clearInterval(this._fadeId);
          this._fadeId = null;
          this._audio.volume = target;
          if (done) done();
        }
      }, dur * 1000 / steps);
    },
    remove() {
      if (this._fadeId) clearInterval(this._fadeId);
      if (this._audio) { this._audio.pause(); this._audio.remove(); }
    }
  });

  // ─── video-on-target ────────────────────────────────────
  // Attaches a child <a-plane> with a video texture to the host entity.
  // Plane is auto-sized to the video's natural aspect ratio (width stays
  // fixed, height = width × videoHeight/videoWidth). The video plays
  // when the target is found and fades out when lost. Muted by default
  // so it joins the global audio button's control list — tapping the
  // button unmutes all target media at once (iOS gesture-unlock).
  AFRAME.registerComponent('video-on-target', {
    schema: {
      src: { type: 'string', default: '' },
      volume: { type: 'number', default: 1.0 },
      loop: { type: 'boolean', default: true },
      fadeIn: { type: 'number', default: 0.5 },
      fadeOut: { type: 'number', default: 1.0 },
      resumeOnFound: { type: 'boolean', default: true },
      muted: { type: 'boolean', default: false },
      width: { type: 'number', default: 1.0 },        // plane width in metres
      chromaKey: { type: 'color', default: '' }        // optional green-screen (future)
    },
    init() {
      const src = this.data.src;
      if (!src) return;

      // Resolve #asset-id reference (created by buildAssets) or build one
      let video;
      if (src.charAt(0) === '#') {
        video = document.querySelector(src);
      }
      if (!video) {
        video = document.createElement('video');
        video.src = src;
        video.crossOrigin = 'anonymous';
        video.setAttribute('playsinline', '');
        video.setAttribute('webkit-playsinline', '');
        video.preload = 'auto';
        document.body.appendChild(video);
      }
      video.loop = this.data.loop;
      // Always start muted (iOS autoplay requirement). If muted:false in
      // the studio, register with _4E_AUDIO so the global button can
      // unmute it. If muted:true, it stays silent — visual-only.
      video.muted = true;
      video.volume = 0;
      video.autoplay = false;
      this._video = video;

      // Register for global mute-button control (same list as audio)
      if (window._4E_AUDIO && !this.data.muted) window._4E_AUDIO.onTarget.push(video);

      // Determine where the video texture should render. If the host
      // entity is already a plane (<a-plane>), apply the video material
      // to it directly and resize it. Otherwise (Empty, GLB, etc.)
      // create a child plane so the video has something to render on.
      const width = this.data.width || 1;
      const initialHeight = width * 9 / 16;
      const isHostPlane = this.el.tagName.toLowerCase() === 'a-plane';

      if (isHostPlane) {
        this._plane = this.el;
        this._ownsPlane = false;
        this._plane.setAttribute('width', width);
        this._plane.setAttribute('height', initialHeight);
      } else {
        this._plane = document.createElement('a-plane');
        this._ownsPlane = true;
        this._plane.setAttribute('width', width);
        this._plane.setAttribute('height', initialHeight);
        // Child plane lies flat on the image target by default (image
        // target's Y axis is the normal, so -90° on X makes the plane
        // coplanar with the image).
        this._plane.setAttribute('rotation', '-90 0 0');
        this.el.appendChild(this._plane);
      }

      // Apply video texture using A-Frame's material component — passing
      // the video element directly (not a selector) bypasses the loading
      // race condition that was causing the white plane. A-Frame then
      // creates the VideoTexture internally and keeps it in sync.
      const applyMaterial = () => {
        this._plane.setAttribute('material', {
          shader: 'flat',
          src: video,
          side: 'double',
          transparent: true,
          opacity: 0,
          npot: true
        });
        // Grab the mesh reference for direct opacity updates during fade
        this._mesh = this._plane.getObject3D('mesh');
      };

      if (this._plane.hasLoaded) applyMaterial();
      else this._plane.addEventListener('loaded', applyMaterial, { once: true });

      // Auto-resize to match video's true aspect ratio
      const syncAspect = () => {
        const vw = video.videoWidth, vh = video.videoHeight;
        if (vw > 0 && vh > 0) {
          this._plane.setAttribute('height', width * (vh / vw));
        }
      };
      if (video.readyState >= 1) syncAspect();
      else video.addEventListener('loadedmetadata', syncAspect, { once: true });

      this._fadeId = null;
      this._opacityFadeId = null;
      this._isPlaying = false;

      // Scope to this entity's own target (in multi-target scenes)
      const targetEl = this.el.closest('xrextras-named-image-target');
      const tName = targetEl ? targetEl.getAttribute('name') : '';
      this._targetName = tName;

      const onFound = (e) => {
        const n = e && e.detail && e.detail.name || '';
        if (tName && n !== tName) return;
        this._play();
      };
      const onLost = (e) => {
        const n = e && e.detail && e.detail.name || '';
        if (tName && n !== tName) return;
        this._stop();
      };

      const sceneEl = this.el.sceneEl;
      const attach = () => {
        sceneEl.addEventListener('xrimagefound', onFound);
        sceneEl.addEventListener('xrimagelost', onLost);
      };
      if (sceneEl.hasLoaded) attach();
      else sceneEl.addEventListener('loaded', attach);
    },
    _play() {
      if (!this._video || this._isPlaying) return;
      this._isPlaying = true;
      if (!this.data.resumeOnFound) { try { this._video.currentTime = 0; } catch(e){} }
      const p = this._video.play();
      if (p && p.catch) p.catch(err => {
        console.warn('[video-on-target] play failed:', err && err.message);
        this._isPlaying = false;
      });
      this._fadeVolume(this.data.volume, this.data.fadeIn);
      this._fadePlane(1, this.data.fadeIn);
    },
    _stop() {
      if (!this._video || !this._isPlaying) return;
      this._fadeVolume(0, this.data.fadeOut);
      this._fadePlane(0, this.data.fadeOut, () => {
        try { this._video.pause(); } catch(e){}
        this._isPlaying = false;
      });
    },
    _fadeVolume(target, dur) {
      if (this._fadeId) clearInterval(this._fadeId);
      if (!this._video || dur <= 0) {
        if (this._video) this._video.volume = target;
        return;
      }
      const start = this._video.volume;
      const steps = Math.max(1, Math.round(dur * 20));
      let i = 0;
      this._fadeId = setInterval(() => {
        i++;
        this._video.volume = Math.max(0, Math.min(1, start + (target - start) * (i / steps)));
        if (i >= steps) { clearInterval(this._fadeId); this._fadeId = null; }
      }, dur * 1000 / steps);
    },
    _fadePlane(target, dur, done) {
      if (this._opacityFadeId) clearInterval(this._opacityFadeId);
      if (!this._plane) { if (done) done(); return; }
      const setOp = (o) => this._plane.setAttribute('material', 'opacity', o);
      if (dur <= 0) { setOp(target); if (done) done(); return; }
      const mat = this._plane.getAttribute('material') || {};
      const start = mat.opacity != null ? mat.opacity : 0;
      const steps = Math.max(1, Math.round(dur * 20));
      let i = 0;
      this._opacityFadeId = setInterval(() => {
        i++;
        const o = Math.max(0, Math.min(1, start + (target - start) * (i / steps)));
        setOp(o);
        if (i >= steps) {
          clearInterval(this._opacityFadeId);
          this._opacityFadeId = null;
          if (done) done();
        }
      }, dur * 1000 / steps);
    },
    remove() {
      if (this._fadeId) clearInterval(this._fadeId);
      if (this._opacityFadeId) clearInterval(this._opacityFadeId);
      if (this._video) { try { this._video.pause(); } catch(e){} }
      // Only remove the plane if we created it ourselves (child of Empty/GLB).
      // If the host entity IS the plane, leave it alone — it belongs to the scene.
      if (this._ownsPlane && this._plane && this._plane.parentNode) {
        this._plane.parentNode.removeChild(this._plane);
      }
    }
  });
}

function setSplashStatus(msg) {
  document.querySelectorAll('.splash-status-text').forEach(e => e.textContent = msg);
}

// Check if any object in the project uses audio or video components
function projectHasMedia() {
  if (!APP?.objects) return false;
  return APP.objects.some(o => {
    const xr = o.xrComponents || {};
    return Object.keys(xr).some(k =>
      k.includes('audio') || k.includes('Audio') || k.includes('sound') ||
      k.includes('Sound') || k.includes('video') || k.includes('Video'));
  });
}

function hideSplash() {
  const dur = (APP?.splash?.duration || 3) * 1000;
  setTimeout(() => {
    el('splash').classList.add('hidden');
    // Show audio button if project has media
    if (projectHasMedia()) showAudioButton();
  }, dur);
}

// Global audio state — used by all audio components
window._4E_AUDIO = {
  unlocked: false,    // iOS AudioContext unlocked
  muted: false,       // global mute toggle
  ambient: [],        // ambient audio elements (autoplay)
  onTarget: [],       // image-target audio elements (paused until found)
};

// 🔊 button — three states:
//   1. Muted (default) — tap to enable audio (also unlocks iOS)
//   2. Unmuted — tap to mute
//   3. Re-mute → unmute again
function showAudioButton() {
  // Start muted by default
  window._4E_AUDIO.muted = true;

  const btn = document.createElement('button');
  btn.id = 'audio-btn';
  btn.textContent = '🔇';
  btn.style.cssText = 'position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:rgba(0,0,0,0.6);color:#fff;font-size:22px;cursor:pointer;z-index:100;backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;animation:pulse 2s infinite';

  const updateBtn = () => {
    if (window._4E_AUDIO.muted) {
      btn.textContent = '🔇';
      btn.title = 'Tap to enable audio';
      btn.style.borderColor = 'rgba(255,255,255,0.4)';
    } else {
      btn.textContent = '🔊';
      btn.title = 'Tap to mute';
      btn.style.borderColor = 'rgba(139,92,246,0.8)';
      btn.style.animation = 'none';
    }
  };

  btn.onclick = () => {
    window._4E_AUDIO.muted = !window._4E_AUDIO.muted;

    // Apply mute to all registered audios
    const allAudios = [...window._4E_AUDIO.ambient, ...window._4E_AUDIO.onTarget];
    allAudios.forEach(a => { a.muted = window._4E_AUDIO.muted; });

    // Unlock + start ambient on first unmute
    if (!window._4E_AUDIO.muted && !window._4E_AUDIO.unlocked) {
      window._4E_AUDIO.unlocked = true;
      window._4E_AUDIO.ambient.forEach(a => a.play().catch(() => {}));
    }
    updateBtn();
  };
  document.body.appendChild(btn);
  updateBtn();
}
function showError(t, m) { el('err-title').textContent = t; el('err-msg').textContent = m; el('error-screen').classList.add('show'); hideSplash(); }
function showARUI() { el('ar-ui').classList.add('show'); }

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  const appId = new URLSearchParams(location.search).get('id');
  if (!appId) { showError('No App ID', 'Scan a valid 4E AR QR code.'); return; }

  setSplashStatus('Connecting…');
  const cfg = window.AR_FIREBASE_CONFIG;
  if (!cfg?.apiKey) { showError('Config missing', 'Firebase not configured.'); return; }

  try {
    firebase.initializeApp(cfg);
    const db = firebase.firestore();
    setSplashStatus('Loading experience…');
    const doc = await db.collection('ar_apps').doc(appId).get();
    if (!doc.exists) { showError('Not found', 'Experience does not exist.'); return; }

    APP = doc.data();
    APP.id = appId;

    // PWA: inject per-project manifest + touch icon + theme color, register SW
    applyPWA(APP);

    // Custom splash
    applySplash(APP);

    // Preload ALL assets in parallel during splash — targets, audio, GLB, video
    setSplashStatus('Preloading assets…');
    const preloads = [];

    // Image target luminance images
    if (APP.targets && APP.targets.length > 0) {
      APP.targets.forEach(t => {
        if (t.luminanceUrl) preloads.push(new Promise(res => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = img.onerror = () => res();
          img.src = t.luminanceUrl;
        }));
      });
    }

    // GLB models, audio files, video files from xrComponents
    (APP.objects || []).forEach(o => {
      if (o.glbUrl) preloads.push(fetch(o.glbUrl, { mode: 'cors' }).catch(() => {}));
      const xr = o.xrComponents || {};
      Object.values(xr).forEach(cfg => {
        if (cfg && typeof cfg === 'object') {
          const url = cfg.src || cfg.video;
          if (url && typeof url === 'string' && !url.startsWith('#')) {
            preloads.push(fetch(url, { mode: 'cors' }).catch(() => {}));
          }
        }
      });
    });

    if (preloads.length > 0) {
      setSplashStatus(`Preloading ${preloads.length} asset${preloads.length > 1 ? 's' : ''}…`);
      await Promise.all(preloads);
    }

    setSplashStatus('Waiting for AR engine…');
    await waitForXR8(12000);

    const mode = APP.trackingMode || 'image';
    setSplashStatus('Building scene…');

    if (mode === 'slam') buildSLAM();
    else if (mode === 'face') buildFace();
    else buildImage();

  } catch(e) { showError('Error', e.message); }
}

function waitForXR8(timeout=10000) {
  return new Promise(res => {
    if (window.XR8) { res(); return; }
    const t0 = Date.now();
    const check = () => {
      if (window.XR8 || Date.now()-t0 > timeout) { res(); return; }
      setTimeout(check, 100);
    };
    check();
  });
}

// ═══════════════════════════════════════════════════════════
// PWA — per-project manifest, apple-touch-icon, theme color, SW
// ═══════════════════════════════════════════════════════════
function applyPWA(app) {
  const sp = app.splash || {};
  const pwa = app.pwa || {};
  const name = sp.title || app.name || '4E AR';
  const shortName = (name || '4E AR').slice(0, 12);
  const bg = sp.bgColor || '#060a18';
  const theme = sp.accentColor || '#8b5cf6';

  // Update document title and theme color
  document.title = name;
  let themeMeta = document.querySelector('meta[name="theme-color"]');
  if (!themeMeta) {
    themeMeta = document.createElement('meta');
    themeMeta.name = 'theme-color';
    document.head.appendChild(themeMeta);
  }
  themeMeta.content = bg;

  // apple-mobile-web-app-title for iOS home screen
  let appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
  if (!appleTitle) {
    appleTitle = document.createElement('meta');
    appleTitle.name = 'apple-mobile-web-app-title';
    document.head.appendChild(appleTitle);
  }
  appleTitle.content = shortName;

  // apple-touch-icon
  if (pwa.appleIconUrl) {
    let touchIcon = document.querySelector('link[rel="apple-touch-icon"]');
    if (!touchIcon) {
      touchIcon = document.createElement('link');
      touchIcon.rel = 'apple-touch-icon';
      document.head.appendChild(touchIcon);
    }
    touchIcon.href = pwa.appleIconUrl;
  }

  // Build manifest
  const icons = [];
  if (pwa.icon192Url) icons.push({ src: pwa.icon192Url, sizes: '192x192', type: 'image/png', purpose: 'any' });
  if (pwa.icon512Url) icons.push({ src: pwa.icon512Url, sizes: '512x512', type: 'image/png', purpose: 'any' });

  const manifest = {
    name,
    short_name: shortName,
    start_url: location.pathname + '?id=' + encodeURIComponent(app.id),
    scope: '/',
    display: 'standalone',
    orientation: 'portrait',
    background_color: bg,
    theme_color: theme,
    icons,
  };

  // Inject manifest via data URL so there's no separate file to host
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const manifestUrl = URL.createObjectURL(manifestBlob);
  let linkManifest = document.querySelector('link[rel="manifest"]');
  if (!linkManifest) {
    linkManifest = document.createElement('link');
    linkManifest.rel = 'manifest';
    document.head.appendChild(linkManifest);
  }
  linkManifest.href = manifestUrl;

  // Register service worker (required for install prompt on Chromium)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => {});
  }
}

function applySplash(app) {
  const sp = app.splash || {};
  const title = sp.title || app.name || 'AR Experience';
  const rootStyle = document.documentElement.style;

  // Update CSS custom properties — colors transition smoothly via CSS
  if (sp.bgColor) rootStyle.setProperty('--sp-bg', sp.bgColor);
  if (sp.textColor) rootStyle.setProperty('--sp-text', sp.textColor);
  if (sp.accentColor) rootStyle.setProperty('--sp-accent', sp.accentColor);

  // Optional gradient background — apply to splash element directly.
  // CRITICAL: gradient stops must be fully opaque so the splash covers
  // the camera feed / AR UI underneath. color-mix blends bg+accent to
  // give a subtle tinted gradient rather than fading to transparency.
  if (sp.gradient && sp.bgColor) {
    const accent = sp.accentColor || '#8b5cf6';
    el('splash').style.background =
      'linear-gradient(145deg,' + sp.bgColor + ',' +
      'color-mix(in srgb,' + sp.bgColor + ' 72%,' + accent + '))';
  } else {
    // Clear any inline gradient so CSS var-driven bg applies
    el('splash').style.background = '';
  }

  // Text content — update in place (no structural DOM change)
  const setText = (id, v) => { const e = el(id); if (e) e.textContent = v; };
  const setShown = (id, v) => { const e = el(id); if (e) e.style.display = v ? '' : 'none'; };

  setText('sp-title', title);
  setShown('sp-title', sp.showTitle !== false);

  if (sp.subtitle) {
    setText('sp-subtitle', sp.subtitle);
    setShown('sp-subtitle', sp.showSubtitle !== false);
  } else {
    setShown('sp-subtitle', false);
  }

  setShown('sp-logo', sp.showLogo !== false);
  setShown('sp-spinner-row', sp.showSpinner !== false);
  setShown('sp-branding', sp.showBranding !== false);

  // Logo — background-image swap is seamless (old image stays until new
  // one is decoded), so no blank frame / layout reflow.
  if (sp.logoUrl && sp.showLogo !== false) {
    const logoEl = el('sp-logo');
    if (logoEl) {
      const newBg = "url('" + sp.logoUrl.replace(/'/g, "\\'") + "')";
      if (logoEl.style.backgroundImage !== newBg) logoEl.style.backgroundImage = newBg;
    }
  }

  el('ar-title').textContent = title;

  // Cache for next visit — everything needed to render the splash in
  // its final form on first paint (head primer + body-phase script).
  try {
    localStorage.setItem('4e-splash-' + app.id, JSON.stringify({
      title: sp.title, subtitle: sp.subtitle,
      bgColor: sp.bgColor, textColor: sp.textColor, accentColor: sp.accentColor,
      logoUrl: sp.logoUrl, gradient: sp.gradient,
      showLogo: sp.showLogo, showTitle: sp.showTitle, showSubtitle: sp.showSubtitle,
      showSpinner: sp.showSpinner, showBranding: sp.showBranding,
      name: app.name,
    }));
  } catch(e) {}
}
function _esc(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════════════════
// OBJECT BUILDER (shared across all modes)
// ═══════════════════════════════════════════════════════════
function getObjects() {
  if (APP.objects?.length) return APP.objects.filter(o => (o.glbUrl || o.type === 'primitive') && o.visible !== false);
  if (APP.glbUrl) return [{
    id:'legacy', glbUrl:APP.glbUrl,
    transform:{ position:{x:APP.posX||0,y:APP.posY||0,z:APP.posZ||0}, rotation:{x:APP.rotX||0,y:APP.rotY||0,z:APP.rotZ||0}, scale:{x:APP.scale||1,y:APP.scale||1,z:APP.scale||1} },
    defaultAnim:APP.defaultAnimation||'', loop:APP.loopMode||'repeat', clips:APP.animations||[], presets:{}, interactions:{}
  }];
  return [];
}

function buildAssets(objects) {
  let assets = '';
  let mediaIdx = 0;

  objects.forEach((o, i) => {
    // GLB model assets
    if (o.type !== 'primitive' && o.glbUrl) {
      assets += `<a-asset-item id="m${i}" src="${o.glbUrl}"></a-asset-item>\n`;
    }

    // Video/Audio assets from xrComponents
    const xr = o.xrComponents || {};
    Object.entries(xr).forEach(([key, config]) => {
      if (!config || typeof config !== 'object') return;

      // Video sources (xrextras-target-video-fade, xrextras-target-video-sound, xrextras-play-video, xrextras-video-material)
      const videoUrl = config.video || config.src;
      if (videoUrl && (key.includes('video') || key.includes('Video'))) {
        const vid = `vid-${i}-${mediaIdx++}`;
        assets += `<video id="${vid}" src="${videoUrl}" preload="auto" loop playsinline webkit-playsinline crossorigin="anonymous"></video>\n`;
        // Replace the URL with the asset ID so A-Frame can reference it
        if (config.video) config.video = `#${vid}`;
        if (config.src) config.src = `#${vid}`;
      }

      // Audio components create their own <audio> elements (target-audio-direct,
      // ambient-audio-direct). No asset needed here.
    });
  });

  return assets;
}

// Map primitive types to A-Frame elements
function buildPrimitive(obj, i) {
  const t = obj.transform || {position:{x:0,y:0,z:0},rotation:{x:0,y:0,z:0},scale:{x:1,y:1,z:1}};
  const pos = `${t.position.x} ${t.position.y} ${t.position.z}`;
  const rot = `${t.rotation.x} ${t.rotation.y} ${t.rotation.z}`;
  const sc = `${t.scale.x} ${t.scale.y} ${t.scale.z}`;
  const color = obj.primitiveColor || '#8b5cf6';

  const primMap = {
    cube:     `<a-box position="${pos}" rotation="${rot}" scale="${sc}" color="${color}" shadow="cast: true"></a-box>`,
    sphere:   `<a-sphere position="${pos}" rotation="${rot}" scale="${sc}" color="${color}" radius="0.18" shadow="cast: true"></a-sphere>`,
    cylinder: `<a-cylinder position="${pos}" rotation="${rot}" scale="${sc}" color="${color}" radius="0.15" height="0.35" shadow="cast: true"></a-cylinder>`,
    plane:    `<a-plane position="${pos}" rotation="${rot}" scale="${sc}" color="${color}" width="0.5" height="0.5"></a-plane>`,
    cone:     `<a-cone position="${pos}" rotation="${rot}" scale="${sc}" color="${color}" radius-bottom="0.18" height="0.35" shadow="cast: true"></a-cone>`,
    torus:    `<a-torus position="${pos}" rotation="${rot}" scale="${sc}" color="${color}" radius="0.15" radius-tubular="0.05" shadow="cast: true"></a-torus>`,
  };
  return primMap[obj.primitiveType] || '';
}

function buildEntity(obj, i) {
  // Plane primitives with a video component should flow through the
  // full buildEntity logic so the video-on-target attribute is included
  // — the component then applies the video texture to the plane itself.
  const hasVideoComp = obj.xrComponents && obj.xrComponents['video-on-target'];
  const isPlaneWithVideo = obj.primitiveType === 'plane' && hasVideoComp;

  // Primitive objects (except empty and plane-with-video) use A-Frame built-ins
  if (obj.type === 'primitive' && obj.primitiveType && obj.primitiveType !== 'empty' && !isPlaneWithVideo) {
    return buildPrimitive(obj, i);
  }

  // Empty primitives fall through to here — rendered as invisible <a-entity>
  // with xrComponents (audio, video, etc.) attached

  const t = obj.transform || {position:{x:0,y:0,z:0},rotation:{x:0,y:0,z:0},scale:{x:1,y:1,z:1}};
  const pos = `${t.position.x} ${t.position.y} ${t.position.z}`;
  const rot = `${t.rotation.x} ${t.rotation.y} ${t.rotation.z}`;
  const sc = `${t.scale.x} ${t.scale.y} ${t.scale.z}`;

  // GLB animation
  let attrs = '';
  if (obj.defaultAnim && obj.loop !== 'none') {
    attrs += ` animation-mixer="clip: ${obj.defaultAnim}; loop: ${obj.loop||'repeat'}; crossFadeDuration: 0.4"`;
  } else if (obj.clips?.length) {
    attrs += ` animation-mixer="clip: *; loop: repeat"`;
  }

  // Preset animations
  const p = obj.presets || {};
  if (p.spin) {
    const dur = Math.round(2000/(p.spin.speed||1));
    const axis = p.spin.axis||'y';
    attrs += ` animation__spin="property: rotation.${axis}; from: ${t.rotation[axis]||0}; to: ${(parseFloat(t.rotation[axis])||0)+360}; dur: ${dur}; loop: true; easing: linear"`;
  }
  if (p.bob) {
    const h = p.bob.height||0.05, dur = Math.round(2000/(p.bob.speed||2));
    attrs += ` animation__bob="property: position.y; from: ${t.position.y-h}; to: ${t.position.y+h}; dur: ${dur}; loop: true; dir: alternate; easing: easeInOutSine"`;
  }
  if (p.pulse) {
    const a = p.pulse.amount||0.08, dur = Math.round(2000/(p.pulse.speed||3)), s = t.scale.x;
    attrs += ` animation__pulse="property: scale; from: ${s*(1-a)} ${s*(1-a)} ${s*(1-a)}; to: ${s*(1+a)} ${s*(1+a)} ${s*(1+a)}; dur: ${dur}; loop: true; dir: alternate; easing: easeInOutSine"`;
  }

  // 8th Wall native interactions from legacy interactions{} field
  const ix = obj.interactions || {};
  if (ix.holdDrag) attrs += ' xrextras-hold-drag';
  if (ix.pinchScale) attrs += ' xrextras-pinch-scale';
  if (ix.oneFingerRotate) attrs += ' xrextras-one-finger-rotate';
  if (ix.twoFingerRotate) attrs += ' xrextras-two-finger-rotate';
  if (ix.autoSpin) attrs += ' xrextras-spin';
  if (ix.faceCamera) attrs += ' look-at="[camera]"';
  if (ix.castShadow !== false) attrs += ' shadow="cast: true"';

  // xrComponents{} — convert to A-Frame attributes
  const xr = obj.xrComponents || {};
  Object.entries(xr).forEach(([key, config]) => {
    if (attrs.includes(key)) return;

    // Audio on target — uses raw <audio> element via target-audio-direct.
    // Skip A-Frame sound entirely (it's unreliable for pause/play on visibility).
    if (key === 'audio-on-target' && config && typeof config === 'object') {
      const src = config.src || '';
      if (src) {
        const vol = config.volume != null ? config.volume : 0.8;
        const loop = config.loop !== false;
        const fIn = config.fadeIn != null ? config.fadeIn : 0.5;
        const fOut = config.fadeOut != null ? config.fadeOut : 1.0;
        attrs += ` target-audio-direct="src: ${src}; volume: ${vol}; loop: ${loop}; fadeIn: ${fIn}; fadeOut: ${fOut}"`;
      }
      return;
    }

    // Ambient audio — direct element controlled by global mute state
    if (key === 'audio-ambient' && config && typeof config === 'object') {
      const src = config.src || '';
      if (src) {
        const vol = config.volume != null ? config.volume : 0.5;
        const loop = config.loop !== false;
        attrs += ` ambient-audio-direct="src: ${src}; volume: ${vol}; loop: ${loop}"`;
      }
      return;
    }

    // All other components pass through as-is
    if (config === true) {
      attrs += ` ${key}`;
    } else if (config && typeof config === 'object') {
      const pairs = Object.entries(config).map(([k,v]) => `${k}: ${v}`).join('; ');
      if (pairs) {
        attrs += ` ${key}="${pairs}"`;
      } else {
        attrs += ` ${key}`;
      }
    }
  });

  // Plane primitive + video-on-target: render as <a-plane> so the video
  // component can apply its texture directly to the host mesh.
  if (isPlaneWithVideo) {
    return `<a-plane id="ent-${i}" class="cantap" position="${pos}" rotation="${rot}" scale="${sc}" width="1" height="1"${attrs}></a-plane>`;
  }

  // Empty objects or objects with no GLB → <a-entity> (invisible container for components)
  if (!obj.glbUrl && (obj.primitiveType === 'empty' || obj.type === 'primitive')) {
    return `<a-entity id="ent-${i}" class="cantap" position="${pos}" rotation="${rot}" scale="${sc}"${attrs}></a-entity>`;
  }

  return `<a-gltf-model id="gltf-${i}" class="cantap" src="#m${i}" position="${pos}" rotation="${rot}" scale="${sc}"${attrs}></a-gltf-model>`;
}

// ═══════════════════════════════════════════════════════════
// SLAM / WORLD TRACKING
// ═══════════════════════════════════════════════════════════
function buildSLAM() {
  const objects = getObjects();
  if (!objects.length) { showError('Empty', 'No models in this experience.'); return; }

  const ambInt = APP.ambientIntensity ?? 0.5;
  const dirInt = APP.directIntensity ?? 0.8;
  const showShadow = APP.shadowCatcher !== false;

  const entities = objects.map((o,i) => buildEntity(o,i)).join('\n');

  const html = `
    <a-scene
      xrextras-gesture-detector
      xrweb="allowedDevices: any"
      renderer="colorManagement: true">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera id="camera" position="0 8 0"
        raycaster="objects: .cantap"
        cursor="fuse: false; rayOrigin: mouse;">
      </a-camera>

      <!-- Directional light following camera with shadows -->
      <a-entity
        light="type: directional; intensity: ${dirInt}; castShadow: true;
          shadowMapHeight: 2048; shadowMapWidth: 2048;
          shadowCameraTop: 20; shadowCameraBottom: -20;
          shadowCameraRight: 20; shadowCameraLeft: -20;
          target: #camera"
        xrextras-attach="target: camera; offset: 8 15 4"
        shadow>
      </a-entity>

      <a-light type="ambient" intensity="${ambInt}"></a-light>

      ${showShadow ? `
      <a-box id="ground" class="cantap"
        scale="1000 2 1000" position="0 -1 0"
        material="shader: shadow; transparent: true; opacity: 0.4"
        shadow>
      </a-box>` : ''}

      ${entities}
    </a-scene>`;

  mountScene(html, objects, 'Look around to detect surfaces');
}

// ═══════════════════════════════════════════════════════════
// IMAGE TRACKING (8th Wall native or MindAR fallback)
// ═══════════════════════════════════════════════════════════
function buildImage() {
  const objects = getObjects();
  if (!objects.length) { showError('Empty', 'No models in scene.'); return; }

  // 8th Wall native image targets (primary and only path)
  if (APP.targets && APP.targets.length > 0) {
    buildImageNative(objects);
    return;
  }

  // Legacy single-target — try to use 8th Wall if we have image URLs
  if (APP.target?.imageUrl) {
    // Convert legacy target to native format
    APP.targets = [{
      id: 'legacy',
      name: 'target',
      type: 'PLANAR',
      luminanceUrl: APP.target.imageUrl,
      originalUrl: APP.target.imageUrl,
      thumbnailUrl: APP.target.imageUrl,
      properties: {},
      objectIds: objects.map(o => o.id),
    }];
    buildImageNative(objects);
    return;
  }

  showError('No target', 'No image target configured. Add a target in the studio.');
}

// ═══════════════════════════════════════════════════════════
// 8TH WALL NATIVE IMAGE TARGETS
// ═══════════════════════════════════════════════════════════
function buildImageNative(objects) {
  setSplashStatus('Configuring image targets…');

  // Build imageTargetData array for XR8
  const imageTargetData = APP.targets.map(t => ({
    imagePath: t.luminanceUrl,
    name: t.name,
    type: t.type || 'PLANAR',
    metadata: null,
    properties: t.properties || {},
    resources: {
      luminanceImage: t.luminanceUrl,
      originalImage: t.originalUrl || t.luminanceUrl,
      thumbnailImage: t.thumbnailUrl || t.luminanceUrl,
      croppedImage: t.luminanceUrl,
    },
    loadAutomatically: true,
    created: Date.now(),
    updated: Date.now(),
  }));

  // Configure XR8 with image targets
  const configureTargets = () => {
    XR8.XrController.configure({ imageTargetData });
  };
  if (window.XR8) configureTargets();
  else window.addEventListener('xrloaded', configureTargets);

  // Build A-Frame entities per target
  const ambInt = APP.scene?.ambientIntensity ?? APP.ambientIntensity ?? 0.8;
  const dirInt = APP.scene?.directIntensity ?? APP.directIntensity ?? 1.0;

  // Group objects by target
  let targetEntities = '';
  APP.targets.forEach(target => {
    const targetObjs = objects.filter(o => {
      if (o.targetId === target.id) return true;
      if (!o.targetId && (target.objectIds || []).includes(o.id)) return true;
      return false;
    });
    // If no explicit assignment, put all objects on first target
    const useObjs = targetObjs.length > 0 ? targetObjs : (target === APP.targets[0] ? objects.filter(o => !o.targetId) : []);

    if (useObjs.length > 0) {
      const ents = useObjs.map((o, i) => buildEntity(o, objects.indexOf(o))).join('\n');
      targetEntities += `
        <xrextras-named-image-target name="${target.name}">
          ${ents}
        </xrextras-named-image-target>`;
    }
  });

  const html = `
    <a-scene
      xrextras-gesture-detector
      xrweb="disableWorldTracking: true; allowedDevices: any"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      style="width:100%;height:100vh">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-light type="ambient" intensity="${ambInt}"></a-light>
      <a-light type="directional" intensity="${dirInt}" position="2 4 3"></a-light>

      ${targetEntities}
    </a-scene>`;

  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0';
  container.innerHTML = html;
  document.body.appendChild(container);
  arScene = container.querySelector('a-scene');

  arScene.addEventListener('loaded', () => {
    hideSplash(); showARUI(); buildAnimBar(objects);
    // Wire target-audio-control on entities marked with data-audio-on-target
    arScene.querySelectorAll('[data-audio-on-target]').forEach(el => {
      const targetEl = el.closest('xrextras-named-image-target');
      const tName = targetEl?.getAttribute('name') || '';
      const fIn = parseFloat(el.getAttribute('data-fade-in')) || 0.5;
      const fOut = parseFloat(el.getAttribute('data-fade-out')) || 1.0;
      el.setAttribute('target-audio-control', `targetName: ${tName}; fadeIn: ${fIn}; fadeOut: ${fOut}`);
    });
  });

  // Listen for image target events
  const targetNames = APP.targets.map(t => t.name);
  const foundTargets = new Set();
  const hintEl = el('scan-hint');
  hintEl.textContent = 'Point camera at image target';

  arScene.addEventListener('loaded', () => {
    if (!window.XR8) return;
    const onFound = (e) => {
      foundTargets.add(e.detail?.name || e.name);
      hintEl.classList.add('hidden');
    };
    const onLost = (e) => {
      foundTargets.delete(e.detail?.name || e.name);
      if (foundTargets.size === 0) hintEl.classList.remove('hidden');
    };
    // XR8 engine events
    try {
      arScene.addEventListener('xrimagefound', onFound);
      arScene.addEventListener('xrimagelost', onLost);
    } catch(e) {}
  });
}

async function loadMindAR(objects, mindUrl) {
  try {
    setSplashStatus('Loading image tracker…');
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js';
    document.head.appendChild(s);
    await new Promise((res,rej) => { s.onload=res; s.onerror=rej; });
  } catch(e) { showError('Load failed', 'Could not load MindAR.'); return; }

  const entities = objects.map((o,i) => buildEntity(o,i)).join('\n');

  const html = `
    <a-scene
      mindar-image="imageTargetSrc: ${mindUrl}; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;
        filterMinCF: 0.001; filterBeta: 1000; missTolerance: 5; warmupTolerance: 5;"
      renderer="colorManagement: true; physicallyCorrectLights: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      style="width:100%;height:100vh">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-light type="ambient" intensity="${APP.ambientIntensity ?? 0.8}"></a-light>
      <a-light type="directional" intensity="${APP.directIntensity ?? 1.0}" position="2 4 3"></a-light>

      <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
        <a-entity rotation="90 0 0">
          ${entities}
        </a-entity>
      </a-entity>
    </a-scene>`;

  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0';
  container.innerHTML = html;
  document.body.appendChild(container);
  arScene = container.querySelector('a-scene');

  arScene.addEventListener('loaded', () => { hideSplash(); showARUI(); buildAnimBar(objects); });

  const target = arScene.querySelector('#ar-target');
  if (target) {
    target.addEventListener('targetFound', () => el('scan-hint').classList.add('hidden'));
    target.addEventListener('targetLost', () => el('scan-hint').classList.remove('hidden'));
  }
}

// ═══════════════════════════════════════════════════════════
// FACE TRACKING (8th Wall)
// ═══════════════════════════════════════════════════════════
function buildFace() {
  const objects = getObjects();
  if (!objects.length) { showError('Empty', 'No models.'); return; }

  const entities = objects.map((o,i) => {
    const facePoint = o.interactions?.facePoint || 'forehead';
    return `<a-entity xrextras-face-attachment="point: ${facePoint}">${buildEntity(o,i)}</a-entity>`;
  }).join('\n');

  const html = `
    <a-scene
      xrface="allowedDevices: any"
      xrextras-gesture-detector
      renderer="colorManagement: true">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-light type="ambient" intensity="1.0"></a-light>
      <a-light type="directional" intensity="0.6" position="0 2 2"></a-light>

      <a-entity xrextras-faceanchor="index: 0">
        ${entities}
      </a-entity>
    </a-scene>`;

  mountScene(html, objects, 'Position your face in camera');
}

// ═══════════════════════════════════════════════════════════
// MOUNT SCENE (shared for SLAM + Face)
// ═══════════════════════════════════════════════════════════
function mountScene(html, objects, hint) {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0';
  container.innerHTML = html;
  document.body.appendChild(container);
  arScene = container.querySelector('a-scene');
  el('scan-hint').textContent = hint;

  arScene.addEventListener('loaded', () => {
    hideSplash();
    showARUI();
    buildAnimBar(objects);
  });
}

// ═══════════════════════════════════════════════════════════
// ANIMATION BAR
// ═══════════════════════════════════════════════════════════
function buildAnimBar(objects) {
  const bar = el('anim-bar');
  bar.innerHTML = '';
  const first = objects[0];
  const clips = first?.clips || [];
  if (clips.length < 2) return;
  clips.forEach(name => {
    const pill = document.createElement('button');
    pill.className = 'anim-pill' + (name === first?.defaultAnim ? ' active' : '');
    pill.textContent = name;
    pill.onclick = () => {
      const m = arScene?.querySelector('a-gltf-model');
      if (m) m.setAttribute('animation-mixer', `clip: ${name}; loop: ${first.loop||'repeat'}; crossFadeDuration: 0.4`);
      bar.querySelectorAll('.anim-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    };
    bar.appendChild(pill);
  });
}
