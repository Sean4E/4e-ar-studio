<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>4E AR Player</title>
<meta name="version" content="3.2.4">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<script src="config.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<!-- 8th Wall Engine + 8-Frame (modified A-Frame) + XR Extras -->
<script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1.0.0-alpha.0/dist/xrextras.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam,face"></script>
<!-- Animation mixer for GLB animations -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#060a18;--purple:#8b5cf6;--text:#e2e8f0;--muted:#8899b0}
body{background:var(--navy);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;height:100vh;width:100vw}
#splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity .5s}
#splash.hidden{opacity:0;pointer-events:none}
.splash-logo{font-size:48px;margin-bottom:12px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.splash-name{font-size:20px;font-weight:700;margin-bottom:6px}
.splash-sub{font-size:13px;opacity:.6;margin-bottom:12px}
.splash-status{font-size:12px;color:var(--muted)}
#error-screen{position:fixed;inset:0;background:var(--navy);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:40px;text-align:center}
#error-screen.show{display:flex}
.err-title{font-size:20px;font-weight:700;color:#f87171;margin-bottom:8px}
.err-msg{font-size:14px;color:var(--muted);max-width:320px}
#ar-ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:none}
#ar-ui.show{display:block}
.ar-top{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;pointer-events:auto;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent)}
.ar-title{font-size:14px;font-weight:700}
.ar-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer}
#scan-hint{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;padding:7px 18px;border-radius:18px;font-size:12px;white-space:nowrap;transition:opacity .3s}
#scan-hint.hidden{opacity:0}
#anim-bar{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:auto}
.anim-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 13px;border-radius:18px;font-size:11px;font-family:'Syne',sans-serif;cursor:pointer}
.anim-pill.active{background:var(--purple);border-color:var(--purple)}
</style>
</head>
<body>

<div id="splash" style="background:#060a18">
  <div id="splash-inner" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;position:relative;padding:20px"></div>
</div>

<div id="error-screen">
  <div style="font-size:48px;margin-bottom:16px">⚠️</div>
  <div class="err-title" id="err-title">Error</div>
  <div class="err-msg" id="err-msg"></div>
</div>

<div id="ar-ui">
  <div class="ar-top">
    <span class="ar-title" id="ar-title">AR</span>
    <button class="ar-close" onclick="location.reload()">✕</button>
  </div>
  <div id="scan-hint">Point camera at target</div>
  <div id="anim-bar"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const PLAYER_VERSION = '3.2.4';
const el = id => document.getElementById(id);
let APP = null, arScene = null;

// Single small component: pauses/plays the entity's <audio> based on
// 8th Wall xrimagefound/xrimagelost events for the parent target.
// Works alongside A-Frame's native 'sound' component.
if (typeof AFRAME !== 'undefined') {
  AFRAME.registerComponent('target-audio-control', {
    schema: {
      targetName: { type: 'string', default: '' },
      fadeIn: { type: 'number', default: 0.5 },
      fadeOut: { type: 'number', default: 1.0 }
    },
    init() {
      this._fadeId = null;
      // Wait for the sound component to be ready
      this.el.addEventListener('sound-loaded', () => this._setup());
      // Also try after a short delay in case sound-loaded already fired
      setTimeout(() => this._setup(), 500);
    },
    _setup() {
      if (this._setupDone) return;
      const sc = this.el.components.sound;
      if (!sc || !sc.pool || !sc.pool.children[0]) return;
      this._setupDone = true;
      this._sound = sc.pool.children[0];           // THREE.PositionalAudio or Audio
      this._gain = this._sound.gain || this._sound; // gainNode
      this._targetVol = sc.data.volume || 0.8;
      // Start silent
      if (this._sound.setVolume) this._sound.setVolume(0);

      const tName = this.data.targetName;
      const onFound = (e) => {
        const n = e?.detail?.name || '';
        if (tName && n !== tName) return;
        this._play();
      };
      const onLost = (e) => {
        const n = e?.detail?.name || '';
        if (tName && n !== tName) return;
        this._stop();
      };

      const sceneEl = this.el.sceneEl;
      sceneEl.addEventListener('xrimagefound', onFound);
      sceneEl.addEventListener('xrimagelost', onLost);
    },
    _play() {
      if (!this._sound) return;
      try {
        if (!this._sound.isPlaying) this._sound.play();
        this._fadeTo(this._targetVol, this.data.fadeIn);
      } catch(e) {}
    },
    _stop() {
      if (!this._sound) return;
      this._fadeTo(0, this.data.fadeOut, () => {
        try { this._sound.pause && this._sound.pause(); } catch(e) {}
      });
    },
    _fadeTo(target, dur, done) {
      if (this._fadeId) clearInterval(this._fadeId);
      if (!this._sound.setVolume) { if (done) done(); return; }
      const start = this._sound.getVolume ? this._sound.getVolume() : 0;
      const steps = Math.max(1, Math.round(dur * 20));
      let i = 0;
      this._fadeId = setInterval(() => {
        i++;
        const v = start + (target - start) * (i / steps);
        this._sound.setVolume(Math.max(0, Math.min(1, v)));
        if (i >= steps) {
          clearInterval(this._fadeId);
          this._fadeId = null;
          this._sound.setVolume(target);
          if (done) done();
        }
      }, dur * 1000 / steps);
    }
  });
}

function setSplashStatus(msg) { const s = el('splash-status'); if (s) s.textContent = msg; }

// Check if any object in the project uses audio or video components
function projectHasMedia() {
  if (!APP?.objects) return false;
  return APP.objects.some(o => {
    const xr = o.xrComponents || {};
    return Object.keys(xr).some(k =>
      k.includes('audio') || k.includes('Audio') || k.includes('sound') ||
      k.includes('Sound') || k.includes('video') || k.includes('Video'));
  });
}

function hideSplash() {
  const dur = (APP?.splash?.duration || 3) * 1000;
  setTimeout(() => {
    el('splash').classList.add('hidden');
    // Show audio button if project has media
    if (projectHasMedia()) showAudioButton();
  }, dur);
}

// Simple persistent audio button — iOS requires user gesture to play audio.
// This button sits in the corner, user taps it once, audio unlocks.
// Nothing else — no AudioContext hacks, no event listeners on the document.
function showAudioButton() {
  const btn = document.createElement('button');
  btn.id = 'audio-btn';
  btn.textContent = '🔊';
  btn.style.cssText = 'position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);color:#fff;font-size:22px;cursor:pointer;z-index:100;backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center';
  btn.onclick = () => {
    // This tap is the user gesture that unlocks audio on iOS
    const audios = document.querySelectorAll('audio');
    audios.forEach(a => { a.play().catch(() => {}); });
    btn.style.background = 'rgba(139,92,246,0.6)';
    btn.style.borderColor = 'rgba(139,92,246,0.8)';
    setTimeout(() => { btn.style.opacity = '0.4'; }, 2000);
  };
  document.body.appendChild(btn);
}
function showError(t, m) { el('err-title').textContent = t; el('err-msg').textContent = m; el('error-screen').classList.add('show'); hideSplash(); }
function showARUI() { el('ar-ui').classList.add('show'); }

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  const appId = new URLSearchParams(location.search).get('id');
  if (!appId) { showError('No App ID', 'Scan a valid 4E AR QR code.'); return; }

  setSplashStatus('Connecting…');
  const cfg = window.AR_FIREBASE_CONFIG;
  if (!cfg?.apiKey) { showError('Config missing', 'Firebase not configured.'); return; }

  try {
    firebase.initializeApp(cfg);
    const db = firebase.firestore();
    setSplashStatus('Loading experience…');
    const doc = await db.collection('ar_apps').doc(appId).get();
    if (!doc.exists) { showError('Not found', 'Experience does not exist.'); return; }

    APP = doc.data();
    APP.id = appId;

    // Custom splash
    applySplash(APP);

    setSplashStatus('Waiting for AR engine…');
    await waitForXR8(12000);

    const mode = APP.trackingMode || 'image';
    setSplashStatus('Building scene…');

    if (mode === 'slam') buildSLAM();
    else if (mode === 'face') buildFace();
    else buildImage();

  } catch(e) { showError('Error', e.message); }
}

function waitForXR8(timeout=10000) {
  return new Promise(res => {
    if (window.XR8) { res(); return; }
    const t0 = Date.now();
    const check = () => {
      if (window.XR8 || Date.now()-t0 > timeout) { res(); return; }
      setTimeout(check, 100);
    };
    check();
  });
}

function applySplash(app) {
  const sp = app.splash || {};
  const splash = el('splash');
  const inner = el('splash-inner');
  const bg = sp.bgColor || '#060a18';
  const text = sp.textColor || '#e2e8f0';
  const accent = sp.accentColor || '#8b5cf6';
  const title = sp.title || app.name || 'AR Experience';
  const logo = sp.logoUrl || '';

  // Background (with optional gradient)
  splash.style.background = sp.gradient
    ? 'linear-gradient(145deg, ' + bg + ', ' + accent + '18)'
    : bg;

  // Build splash HTML (mirrors studio designer — respects all element toggles)
  let html = '';
  if (sp.showLogo !== false) {
    html += logo
      ? '<img src="' + logo + '" style="max-height:56px;max-width:140px;margin-bottom:14px;object-fit:contain">'
      : '<img src="samples/logo_WHT.png" style="max-height:36px;margin-bottom:14px;opacity:.7" onerror="this.outerHTML=\'<div style=font-size:42px;margin-bottom:14px;opacity:.7>&#9670;</div>\'">';
  }
  if (sp.showTitle !== false) {
    html += '<div style="color:' + text + ';font-size:20px;font-weight:700;font-family:Syne,sans-serif;text-align:center;padding:0 20px;line-height:1.3">' + _esc(title) + '</div>';
  }
  if (sp.showSubtitle !== false && sp.subtitle) {
    html += '<div style="color:' + text + ';opacity:.4;font-size:12px;margin-top:6px;text-align:center">' + _esc(sp.subtitle) + '</div>';
  }
  if (sp.showSpinner !== false) {
    html += '<div style="margin-top:20px;display:flex;align-items:center;gap:6px"><div style="width:16px;height:16px;border:2px solid ' + accent + '44;border-top-color:' + accent + ';border-radius:50%;animation:pulse .8s linear infinite"></div><span id="splash-status" style="color:' + text + ';opacity:.3;font-size:11px">Loading…</span></div>';
  } else {
    html += '<div id="splash-status" style="color:' + text + ';opacity:.3;font-size:11px;margin-top:16px">Loading…</div>';
  }
  if (sp.showBranding !== false) {
    html += '<div style="position:absolute;bottom:14px;font-size:10px;color:' + text + ';opacity:.55">Powered by 4E AR Studio v' + PLAYER_VERSION + '</div>';
  }
  inner.innerHTML = html;
  el('ar-title').textContent = title;
}
function _esc(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════════════════
// OBJECT BUILDER (shared across all modes)
// ═══════════════════════════════════════════════════════════
function getObjects() {
  if (APP.objects?.length) return APP.objects.filter(o => (o.glbUrl || o.type === 'primitive') && o.visible !== false);
  if (APP.glbUrl) return [{
    id:'legacy', glbUrl:APP.glbUrl,
    transform:{ position:{x:APP.posX||0,y:APP.posY||0,z:APP.posZ||0}, rotation:{x:APP.rotX||0,y:APP.rotY||0,z:APP.rotZ||0}, scale:{x:APP.scale||1,y:APP.scale||1,z:APP.scale||1} },
    defaultAnim:APP.defaultAnimation||'', loop:APP.loopMode||'repeat', clips:APP.animations||[], presets:{}, interactions:{}
  }];
  return [];
}

function buildAssets(objects) {
  let assets = '';
  let mediaIdx = 0;

  objects.forEach((o, i) => {
    // GLB model assets
    if (o.type !== 'primitive' && o.glbUrl) {
      assets += `<a-asset-item id="m${i}" src="${o.glbUrl}"></a-asset-item>\n`;
    }

    // Video/Audio assets from xrComponents
    const xr = o.xrComponents || {};
    Object.entries(xr).forEach(([key, config]) => {
      if (!config || typeof config !== 'object') return;

      // Video sources (xrextras-target-video-fade, xrextras-target-video-sound, xrextras-play-video, xrextras-video-material)
      const videoUrl = config.video || config.src;
      if (videoUrl && (key.includes('video') || key.includes('Video'))) {
        const vid = `vid-${i}-${mediaIdx++}`;
        assets += `<video id="${vid}" src="${videoUrl}" preload="auto" loop playsinline webkit-playsinline crossorigin="anonymous"></video>\n`;
        // Replace the URL with the asset ID so A-Frame can reference it
        if (config.video) config.video = `#${vid}`;
        if (config.src) config.src = `#${vid}`;
      }

      // Audio sources — create <audio> asset for A-Frame sound component
      const audioSrc = config.src;
      if (audioSrc && !audioSrc.startsWith('#') &&
          (key === 'audio-on-target' || key === 'audio-ambient')) {
        const aud = `aud-${i}-${mediaIdx++}`;
        assets += `<audio id="${aud}" src="${audioSrc}" preload="auto" crossorigin="anonymous"></audio>\n`;
        config.src = `#${aud}`;
      }
    });
  });

  return assets;
}

// Map primitive types to A-Frame elements
function buildPrimitive(obj, i) {
  const t = obj.transform || {position:{x:0,y:0,z:0},rotation:{x:0,y:0,z:0},scale:{x:1,y:1,z:1}};
  const pos = `${t.position.x} ${t.position.y} ${t.position.z}`;
  const rot = `${t.rotation.x} ${t.rotation.y} ${t.rotation.z}`;
  const sc = `${t.scale.x} ${t.scale.y} ${t.scale.z}`;
  const color = obj.primitiveColor || '#8b5cf6';

  const primMap = {
    cube:     `<a-box position="${pos}" rotation="${rot}" scale="${sc}" color="${color}" shadow="cast: true"></a-box>`,
    sphere:   `<a-sphere position="${pos}" rotation="${rot}" scale="${sc}" color="${color}" radius="0.18" shadow="cast: true"></a-sphere>`,
    cylinder: `<a-cylinder position="${pos}" rotation="${rot}" scale="${sc}" color="${color}" radius="0.15" height="0.35" shadow="cast: true"></a-cylinder>`,
    plane:    `<a-plane position="${pos}" rotation="${rot}" scale="${sc}" color="${color}" width="0.5" height="0.5"></a-plane>`,
    cone:     `<a-cone position="${pos}" rotation="${rot}" scale="${sc}" color="${color}" radius-bottom="0.18" height="0.35" shadow="cast: true"></a-cone>`,
    torus:    `<a-torus position="${pos}" rotation="${rot}" scale="${sc}" color="${color}" radius="0.15" radius-tubular="0.05" shadow="cast: true"></a-torus>`,
  };
  return primMap[obj.primitiveType] || '';
}

function buildEntity(obj, i) {
  // Primitive objects (except empty) use A-Frame built-in elements
  if (obj.type === 'primitive' && obj.primitiveType && obj.primitiveType !== 'empty') {
    return buildPrimitive(obj, i);
  }

  // Empty primitives fall through to here — rendered as invisible <a-entity>
  // with xrComponents (audio, video, etc.) attached

  const t = obj.transform || {position:{x:0,y:0,z:0},rotation:{x:0,y:0,z:0},scale:{x:1,y:1,z:1}};
  const pos = `${t.position.x} ${t.position.y} ${t.position.z}`;
  const rot = `${t.rotation.x} ${t.rotation.y} ${t.rotation.z}`;
  const sc = `${t.scale.x} ${t.scale.y} ${t.scale.z}`;

  // GLB animation
  let attrs = '';
  if (obj.defaultAnim && obj.loop !== 'none') {
    attrs += ` animation-mixer="clip: ${obj.defaultAnim}; loop: ${obj.loop||'repeat'}; crossFadeDuration: 0.4"`;
  } else if (obj.clips?.length) {
    attrs += ` animation-mixer="clip: *; loop: repeat"`;
  }

  // Preset animations
  const p = obj.presets || {};
  if (p.spin) {
    const dur = Math.round(2000/(p.spin.speed||1));
    const axis = p.spin.axis||'y';
    attrs += ` animation__spin="property: rotation.${axis}; from: ${t.rotation[axis]||0}; to: ${(parseFloat(t.rotation[axis])||0)+360}; dur: ${dur}; loop: true; easing: linear"`;
  }
  if (p.bob) {
    const h = p.bob.height||0.05, dur = Math.round(2000/(p.bob.speed||2));
    attrs += ` animation__bob="property: position.y; from: ${t.position.y-h}; to: ${t.position.y+h}; dur: ${dur}; loop: true; dir: alternate; easing: easeInOutSine"`;
  }
  if (p.pulse) {
    const a = p.pulse.amount||0.08, dur = Math.round(2000/(p.pulse.speed||3)), s = t.scale.x;
    attrs += ` animation__pulse="property: scale; from: ${s*(1-a)} ${s*(1-a)} ${s*(1-a)}; to: ${s*(1+a)} ${s*(1+a)} ${s*(1+a)}; dur: ${dur}; loop: true; dir: alternate; easing: easeInOutSine"`;
  }

  // 8th Wall native interactions from legacy interactions{} field
  const ix = obj.interactions || {};
  if (ix.holdDrag) attrs += ' xrextras-hold-drag';
  if (ix.pinchScale) attrs += ' xrextras-pinch-scale';
  if (ix.oneFingerRotate) attrs += ' xrextras-one-finger-rotate';
  if (ix.twoFingerRotate) attrs += ' xrextras-two-finger-rotate';
  if (ix.autoSpin) attrs += ' xrextras-spin';
  if (ix.faceCamera) attrs += ' look-at="[camera]"';
  if (ix.castShadow !== false) attrs += ' shadow="cast: true"';

  // xrComponents{} — convert to A-Frame attributes
  const xr = obj.xrComponents || {};
  Object.entries(xr).forEach(([key, config]) => {
    if (attrs.includes(key)) return;

    // Audio on target — A-Frame sound + our target-audio-control
    // The control component listens for xrimagefound/lost on the scene
    // and pauses/plays/fades the sound based on the parent target name.
    if (key === 'audio-on-target' && config && typeof config === 'object') {
      const src = config.src || '';
      if (src) {
        const vol = config.volume != null ? config.volume : 0.8;
        attrs += ` sound="src: ${src}; autoplay: false; loop: ${config.loop !== false}; volume: ${vol}; positional: false"`;
        // target-audio-control attribute is added later when we know targetName
        attrs += ` data-audio-on-target="1"`;
        attrs += ` data-fade-in="${config.fadeIn != null ? config.fadeIn : 0.5}"`;
        attrs += ` data-fade-out="${config.fadeOut != null ? config.fadeOut : 1.0}"`;
      }
      return;
    }

    // Convert audio-ambient to native A-Frame sound with autoplay
    if (key === 'audio-ambient' && config && typeof config === 'object') {
      const src = config.src || '';
      if (src) {
        attrs += ` sound="src: ${src}; autoplay: ${config.autoplay !== false}; loop: ${config.loop !== false}; volume: ${config.volume || 0.5}"`;
      }
      return;
    }

    // All other components pass through as-is
    if (config === true) {
      attrs += ` ${key}`;
    } else if (config && typeof config === 'object') {
      const pairs = Object.entries(config).map(([k,v]) => `${k}: ${v}`).join('; ');
      if (pairs) {
        attrs += ` ${key}="${pairs}"`;
      } else {
        attrs += ` ${key}`;
      }
    }
  });

  // Empty objects or objects with no GLB → <a-entity> (invisible container for components)
  if (!obj.glbUrl && (obj.primitiveType === 'empty' || obj.type === 'primitive')) {
    return `<a-entity id="ent-${i}" class="cantap" position="${pos}" rotation="${rot}" scale="${sc}"${attrs}></a-entity>`;
  }

  return `<a-gltf-model id="gltf-${i}" class="cantap" src="#m${i}" position="${pos}" rotation="${rot}" scale="${sc}"${attrs}></a-gltf-model>`;
}

// ═══════════════════════════════════════════════════════════
// SLAM / WORLD TRACKING
// ═══════════════════════════════════════════════════════════
function buildSLAM() {
  const objects = getObjects();
  if (!objects.length) { showError('Empty', 'No models in this experience.'); return; }

  const ambInt = APP.ambientIntensity ?? 0.5;
  const dirInt = APP.directIntensity ?? 0.8;
  const showShadow = APP.shadowCatcher !== false;

  const entities = objects.map((o,i) => buildEntity(o,i)).join('\n');

  const html = `
    <a-scene
      xrextras-gesture-detector
      xrweb="allowedDevices: any"
      renderer="colorManagement: true">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera id="camera" position="0 8 0"
        raycaster="objects: .cantap"
        cursor="fuse: false; rayOrigin: mouse;">
      </a-camera>

      <!-- Directional light following camera with shadows -->
      <a-entity
        light="type: directional; intensity: ${dirInt}; castShadow: true;
          shadowMapHeight: 2048; shadowMapWidth: 2048;
          shadowCameraTop: 20; shadowCameraBottom: -20;
          shadowCameraRight: 20; shadowCameraLeft: -20;
          target: #camera"
        xrextras-attach="target: camera; offset: 8 15 4"
        shadow>
      </a-entity>

      <a-light type="ambient" intensity="${ambInt}"></a-light>

      ${showShadow ? `
      <a-box id="ground" class="cantap"
        scale="1000 2 1000" position="0 -1 0"
        material="shader: shadow; transparent: true; opacity: 0.4"
        shadow>
      </a-box>` : ''}

      ${entities}
    </a-scene>`;

  mountScene(html, objects, 'Look around to detect surfaces');
}

// ═══════════════════════════════════════════════════════════
// IMAGE TRACKING (8th Wall native or MindAR fallback)
// ═══════════════════════════════════════════════════════════
function buildImage() {
  const objects = getObjects();
  if (!objects.length) { showError('Empty', 'No models in scene.'); return; }

  // 8th Wall native image targets (primary and only path)
  if (APP.targets && APP.targets.length > 0) {
    buildImageNative(objects);
    return;
  }

  // Legacy single-target — try to use 8th Wall if we have image URLs
  if (APP.target?.imageUrl) {
    // Convert legacy target to native format
    APP.targets = [{
      id: 'legacy',
      name: 'target',
      type: 'PLANAR',
      luminanceUrl: APP.target.imageUrl,
      originalUrl: APP.target.imageUrl,
      thumbnailUrl: APP.target.imageUrl,
      properties: {},
      objectIds: objects.map(o => o.id),
    }];
    buildImageNative(objects);
    return;
  }

  showError('No target', 'No image target configured. Add a target in the studio.');
}

// ═══════════════════════════════════════════════════════════
// 8TH WALL NATIVE IMAGE TARGETS
// ═══════════════════════════════════════════════════════════
function buildImageNative(objects) {
  setSplashStatus('Configuring image targets…');

  // Build imageTargetData array for XR8
  const imageTargetData = APP.targets.map(t => ({
    imagePath: t.luminanceUrl,
    name: t.name,
    type: t.type || 'PLANAR',
    metadata: null,
    properties: t.properties || {},
    resources: {
      luminanceImage: t.luminanceUrl,
      originalImage: t.originalUrl || t.luminanceUrl,
      thumbnailImage: t.thumbnailUrl || t.luminanceUrl,
      croppedImage: t.luminanceUrl,
    },
    loadAutomatically: true,
    created: Date.now(),
    updated: Date.now(),
  }));

  // Configure XR8 with image targets
  const configureTargets = () => {
    XR8.XrController.configure({ imageTargetData });
  };
  if (window.XR8) configureTargets();
  else window.addEventListener('xrloaded', configureTargets);

  // Build A-Frame entities per target
  const ambInt = APP.scene?.ambientIntensity ?? APP.ambientIntensity ?? 0.8;
  const dirInt = APP.scene?.directIntensity ?? APP.directIntensity ?? 1.0;

  // Group objects by target
  let targetEntities = '';
  APP.targets.forEach(target => {
    const targetObjs = objects.filter(o => {
      if (o.targetId === target.id) return true;
      if (!o.targetId && (target.objectIds || []).includes(o.id)) return true;
      return false;
    });
    // If no explicit assignment, put all objects on first target
    const useObjs = targetObjs.length > 0 ? targetObjs : (target === APP.targets[0] ? objects.filter(o => !o.targetId) : []);

    if (useObjs.length > 0) {
      const ents = useObjs.map((o, i) => buildEntity(o, objects.indexOf(o))).join('\n');
      targetEntities += `
        <xrextras-named-image-target name="${target.name}">
          ${ents}
        </xrextras-named-image-target>`;
    }
  });

  const html = `
    <a-scene
      xrextras-gesture-detector
      xrweb="disableWorldTracking: true; allowedDevices: any"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      style="width:100%;height:100vh">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-light type="ambient" intensity="${ambInt}"></a-light>
      <a-light type="directional" intensity="${dirInt}" position="2 4 3"></a-light>

      ${targetEntities}
    </a-scene>`;

  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0';
  container.innerHTML = html;
  document.body.appendChild(container);
  arScene = container.querySelector('a-scene');

  arScene.addEventListener('loaded', () => {
    hideSplash(); showARUI(); buildAnimBar(objects);
    // Wire target-audio-control on entities marked with data-audio-on-target
    arScene.querySelectorAll('[data-audio-on-target]').forEach(el => {
      const targetEl = el.closest('xrextras-named-image-target');
      const tName = targetEl?.getAttribute('name') || '';
      const fIn = parseFloat(el.getAttribute('data-fade-in')) || 0.5;
      const fOut = parseFloat(el.getAttribute('data-fade-out')) || 1.0;
      el.setAttribute('target-audio-control', `targetName: ${tName}; fadeIn: ${fIn}; fadeOut: ${fOut}`);
    });
  });

  // Listen for image target events
  const targetNames = APP.targets.map(t => t.name);
  const foundTargets = new Set();
  const hintEl = el('scan-hint');
  hintEl.textContent = 'Point camera at image target';

  arScene.addEventListener('loaded', () => {
    if (!window.XR8) return;
    const onFound = (e) => {
      foundTargets.add(e.detail?.name || e.name);
      hintEl.classList.add('hidden');
    };
    const onLost = (e) => {
      foundTargets.delete(e.detail?.name || e.name);
      if (foundTargets.size === 0) hintEl.classList.remove('hidden');
    };
    // XR8 engine events
    try {
      arScene.addEventListener('xrimagefound', onFound);
      arScene.addEventListener('xrimagelost', onLost);
    } catch(e) {}
  });
}

async function loadMindAR(objects, mindUrl) {
  try {
    setSplashStatus('Loading image tracker…');
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js';
    document.head.appendChild(s);
    await new Promise((res,rej) => { s.onload=res; s.onerror=rej; });
  } catch(e) { showError('Load failed', 'Could not load MindAR.'); return; }

  const entities = objects.map((o,i) => buildEntity(o,i)).join('\n');

  const html = `
    <a-scene
      mindar-image="imageTargetSrc: ${mindUrl}; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;
        filterMinCF: 0.001; filterBeta: 1000; missTolerance: 5; warmupTolerance: 5;"
      renderer="colorManagement: true; physicallyCorrectLights: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      style="width:100%;height:100vh">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-light type="ambient" intensity="${APP.ambientIntensity ?? 0.8}"></a-light>
      <a-light type="directional" intensity="${APP.directIntensity ?? 1.0}" position="2 4 3"></a-light>

      <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
        <a-entity rotation="90 0 0">
          ${entities}
        </a-entity>
      </a-entity>
    </a-scene>`;

  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0';
  container.innerHTML = html;
  document.body.appendChild(container);
  arScene = container.querySelector('a-scene');

  arScene.addEventListener('loaded', () => { hideSplash(); showARUI(); buildAnimBar(objects); });

  const target = arScene.querySelector('#ar-target');
  if (target) {
    target.addEventListener('targetFound', () => el('scan-hint').classList.add('hidden'));
    target.addEventListener('targetLost', () => el('scan-hint').classList.remove('hidden'));
  }
}

// ═══════════════════════════════════════════════════════════
// FACE TRACKING (8th Wall)
// ═══════════════════════════════════════════════════════════
function buildFace() {
  const objects = getObjects();
  if (!objects.length) { showError('Empty', 'No models.'); return; }

  const entities = objects.map((o,i) => {
    const facePoint = o.interactions?.facePoint || 'forehead';
    return `<a-entity xrextras-face-attachment="point: ${facePoint}">${buildEntity(o,i)}</a-entity>`;
  }).join('\n');

  const html = `
    <a-scene
      xrface="allowedDevices: any"
      xrextras-gesture-detector
      renderer="colorManagement: true">

      <a-assets timeout="30000">
        ${buildAssets(objects)}
      </a-assets>

      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-light type="ambient" intensity="1.0"></a-light>
      <a-light type="directional" intensity="0.6" position="0 2 2"></a-light>

      <a-entity xrextras-faceanchor="index: 0">
        ${entities}
      </a-entity>
    </a-scene>`;

  mountScene(html, objects, 'Position your face in camera');
}

// ═══════════════════════════════════════════════════════════
// MOUNT SCENE (shared for SLAM + Face)
// ═══════════════════════════════════════════════════════════
function mountScene(html, objects, hint) {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0';
  container.innerHTML = html;
  document.body.appendChild(container);
  arScene = container.querySelector('a-scene');
  el('scan-hint').textContent = hint;

  arScene.addEventListener('loaded', () => {
    hideSplash();
    showARUI();
    buildAnimBar(objects);
  });
}

// ═══════════════════════════════════════════════════════════
// ANIMATION BAR
// ═══════════════════════════════════════════════════════════
function buildAnimBar(objects) {
  const bar = el('anim-bar');
  bar.innerHTML = '';
  const first = objects[0];
  const clips = first?.clips || [];
  if (clips.length < 2) return;
  clips.forEach(name => {
    const pill = document.createElement('button');
    pill.className = 'anim-pill' + (name === first?.defaultAnim ? ' active' : '');
    pill.textContent = name;
    pill.onclick = () => {
      const m = arScene?.querySelector('a-gltf-model');
      if (m) m.setAttribute('animation-mixer', `clip: ${name}; loop: ${first.loop||'repeat'}; crossFadeDuration: 0.4`);
      bar.querySelectorAll('.anim-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    };
    bar.appendChild(pill);
  });
}
